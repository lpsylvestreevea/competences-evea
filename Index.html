<script>
// =====================================================================
// CONFIG — remplacez les valeurs ci-dessous
// =====================================================================
const CONFIG = {
  clientId: '1a14a45e-5e2d-4dc9-b09a-faae6b2c89f2',        // ID d'application Azure
  tenantId: '66314798-99de-48f9-9cc0-006167b79041',        // ID de l'annuaire Azure
  siteUrl:   'https://jbpuyou.sharepoint.com/sites/evea-intranet',
  adminEmails: ['lp.sylvestre@evea-conseil.com','a.filliatre@evea-conseil.com','l.nerdeux@evea-conseil.com','g.martinho@evea-conseil.com'], // ajoutez vos adresses admin ici
  lists: {
    collaborateurs: 'Collaborateurs',
    competences:    'Competences',
    commentaires:   'Commentaires',
    historique:     'Historique',
    equipes:        'Equipes',
    postes:         'Postes'
  }
};
// =====================================================================

// =====================================================================
// MSAL — authentification Microsoft
// =====================================================================
const msalInstance = new msal.PublicClientApplication({
  auth: {
    clientId:    CONFIG.clientId,
    authority:   `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: { cacheLocation: 'sessionStorage' }
});

const SCOPES_GRAPH = ['User.Read'];
const SCOPES_SP    = ['https://jbpuyou.sharepoint.com/.default'];

async function getToken() {
  const account = msalInstance.getAllAccounts()[0];
  if (!account) {
    await msalInstance.loginRedirect({ scopes: SCOPES_GRAPH });
    return null;
  }
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES_SP, account });
    return r.accessToken;
  } catch {
    await msalInstance.acquireTokenRedirect({ scopes: SCOPES_SP });
    return null;
  }
}

// =====================================================================
// SHAREPOINT API
// =====================================================================
async function spGet(listName, filter = '', select = '') {
  const token = await getToken();
  if (!token) return [];
  let url = `${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items?$top=5000`;
  if (filter) url += `&$filter=${encodeURIComponent(filter)}`;
  if (select) url += `&$select=${select}`;
  const r = await fetch(url, {
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata'
    }
  });
  if (!r.ok) throw new Error(`spGet ${listName} → ${r.status}`);
  const d = await r.json();
  return d.value || [];
}

async function spPost(listName, data) {
  const token = await getToken();
  if (!token) return null;
  const r = await fetch(`${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=nometadata'
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) {
    const errBody = await r.text();
    console.error(`spPost ${listName} erreur détail :`, errBody);
    throw new Error(`spPost ${listName} → ${r.status}`);
  }
  return await r.json();
}

async function spPatch(listName, id, data) {
  const token = await getToken();
  if (!token) return;
  const r = await fetch(`${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items(${id})`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=nometadata',
      'IF-MATCH': '*',
      'X-HTTP-Method': 'MERGE'
    },
    body: JSON.stringify(data)
  });
if (!r.ok) {
  const errBody = await r.text();
  console.error(`spPatch ${listName}(${id}) erreur détail :`, errBody);
  throw new Error(`spPatch ${listName}(${id}) → ${r.status}`);
}
}

async function spDelete(listName, id) {
  const token = await getToken();
  if (!token) return;
  const r = await fetch(`${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items(${id})`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      'IF-MATCH': '*',
      'X-HTTP-Method': 'DELETE'
    }
  });
  if (!r.ok) throw new Error(`spDelete ${listName}(${id}) → ${r.status}`);
}

function showSave(msg = 'Enregistrement...') {
  document.getElementById('save-msg').textContent = msg;

function hideSave(msg = 'Enregistré ✓') {
  document.getElementById('save-msg').textContent = msg;
  setTimeout(() => document.getElementById('save-indicator').classList.remove('show'), 2000);
}

}

async function loadData() {
  document.getElementById('loading-msg').textContent = 'Chargement des données...';
  const [collabs, comps, coms, hist, equipes, postesRaw] = await Promise.all([
  spGet(CONFIG.lists.collaborateurs),
  spGet(CONFIG.lists.competences),
  spGet(CONFIG.lists.commentaires),
  spGet(CONFIG.lists.historique),
  spGet(CONFIG.lists.equipes),
  spGet(CONFIG.lists.postes)
]);

// Remplace le tableau POSTES statique si des données existent en base
if (postesRaw.length) {
  POSTES.length = 0;
  postesRaw.forEach(p => {
    POSTES.push({
      id:      String(p.Id),
      name:    p.Title || '',
      targets: p.Targets ? JSON.parse(p.Targets) : {}
    });
  });
  POSTES_STATE.length = 0;
  POSTES_STATE.push(...POSTES);
}
  db.collaborateurs = collabs.map(c => ({
    ...c,
    prenom:  c.Title || '',
    Nom:     c.Prenom || '',
    teamIds: c.TeamIds ? c.TeamIds.split(',').filter(Boolean) : []
  }));
  db.competences  = comps;
  db.commentaires = coms;
  db.historique   = hist;
  db.equipes = equipes.map(e => ({
  ...e,
  id: String(e.Id),
  name: e.Title || e.Nom || '',
  managerIds: e.ManagersIds ? e.ManagersIds.split(',').filter(Boolean) : []
}));
}

function getCollabComps(collabId) {
  const r = {};
  db.competences.filter(c => String(c.CollabId) === String(collabId)).forEach(c => {
    const sid = (c.SkillId || c.Title) || c.Title;
    r[sid] = parseInt(c.Niveau) || 0;
  });
  return r;
}

function getCollabComments(collabId) {
  const r = {};
  db.commentaires.filter(c => String(c.Title) === String(collabId)).forEach(c => {
    if (!r[(c.SkillId || c.Title)]) r[(c.SkillId || c.Title)] = {};
    r[(c.SkillId || c.Title)][c.TypeAuteur] = c.Contenu;
    r[(c.SkillId || c.Title)][c.TypeAuteur + 'Ts'] = new Date(c.DateSaisie).getTime();
    r[(c.SkillId || c.Title)][c.TypeAuteur + 'SpId'] = c.Id;
  });
  return r;
}

function getCollabHistory(collabId) {
  return db.historique
    .filter(h => String(h.Title) === String(collabId))
    .map(h => ({ ts: new Date(h.DateAction).getTime(), role: h.Role, desc: h.Description }))
    .sort((a, b) => b.ts - a.ts);
}

function getUserRole(email) {
  if (CONFIG.adminEmails.map(e => e.toLowerCase()).includes(email.toLowerCase())) return 'admin';
  const c = db.collaborateurs.find(c => (c.Email || '').toLowerCase() === email.toLowerCase());
  if (!c) return 'collaborateur';
  const manages = db.collaborateurs.some(x => String(x.ManagerID) === String(c.Id));
  return manages ? 'manager' : 'collaborateur';
}

function visibleCollabs() {
  if (!currentUser) return [];
  if (currentUser.role === 'admin') return db.collaborateurs;
  if (currentUser.role === 'manager') {
    const me = db.collaborateurs.find(c => (c.Email || '').toLowerCase() === currentUser.email.toLowerCase());
    const myTeams = me ? (me.teamIds || []) : [];
    return db.collaborateurs.filter(c =>
      (c.Email || '').toLowerCase() === currentUser.email.toLowerCase() ||
      c.teamIds.some(t => myTeams.includes(t)) ||
      String(c.ManagerID) === String(me?.Id)
    );
  }
  return db.collaborateurs.filter(c => (c.Email || '').toLowerCase() === currentUser.email.toLowerCase());
}

function getRareSkills() {
  const total = db.collaborateurs.length;
  const threshold = Math.max(2, Math.round(total * 0.2));
  const counts = {};
  db.competences.forEach(c => { if (c.Niveau > 0) counts[(c.SkillId || c.Title)] = (counts[(c.SkillId || c.Title)] || 0) + 1; });
  const rare = {};
  Object.entries(counts).forEach(([sid, n]) => { if (n <= threshold) rare[sid] = n; });
  return rare;
}

    <div class="nav-item" onclick="showView('import')" id="nav-import"><i class="ti ti-upload"></i>Import / Export</div>`;
}
  document.getElementById('sidebar-nav').innerHTML = nav;
}

function showView(v) {
  currentView = v;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + v)?.classList.add('active');
  const titles = {
    matrix:'Matrice globale', collabs:'Collaborateurs',
    'admin-collabs':'Gestion des collaborateurs', 'admin-teams':'Équipes',
    'admin-postes':'Postes', 'admin-skills':'Compétences', import:'Import / Export',
    'search-skills':'Recherche par compétence'
  };
  document.getElementById('topbar-title').textContent = titles[v] || v;
  const addLabels = {
    matrix:'Collaborateur', collabs:'Collaborateur',
    'admin-collabs':'Collaborateur', 'admin-teams':'Équipe', 'admin-postes':'Poste'
  };
  document.getElementById('btn-add-label').textContent = addLabels[v] || 'Ajouter';
  document.getElementById('btn-add').style.display    = v === 'import' ? 'none' : 'inline-flex';
  document.getElementById('btn-export').style.display = ['matrix','collabs','import'].includes(v) ? 'inline-flex' : 'none';
  document.getElementById('search-wrap').style.display = ['matrix','collabs'].includes(v) ? 'flex' : 'none';
  if      (v === 'matrix')        renderMatrix();
  else if (v === 'search-skills') renderSearchSkills();  
  else if (v === 'collabs')       renderCollabs();
  else if (v === 'admin-collabs') renderAdminCollabs();
  else if (v === 'admin-teams')   renderAdminTeams();
  else if (v === 'admin-postes')  renderAdminPostes();
  else if (v === 'admin-skills') renderAdminSkills();
  else if (v === 'import')        renderImport();
}

function handleAddBtn() {
  const map = {
    matrix:         () => openCollabModal(null),
    collabs:        () => openCollabModal(null),
    'admin-collabs':() => openCollabModal(null),
    'admin-teams':  () => openTeamModal(null),
    'admin-postes': () => openPosteModal(null)
  };
  (map[currentView] || function(){})();
}
function applyFilters() {
  if (currentView === 'matrix')  renderMatrix();
  else if (currentView === 'collabs') renderCollabs();
}

// =====================================================================
// MATRIX
// =====================================================================
function renderMatrix() {
  const q = (document.getElementById('search-input') || {value:''}).value.toLowerCase();
  const rareMap = getRareSkills();
  const skills = SKILLS.filter(s => (!filterDomain || s.did === filterDomain) && (!q || s.name.toLowerCase().includes(q)));
  let collabs = visibleCollabs();
  if (filterTeam) collabs = collabs.filter(c => c.teamIds && c.teamIds.includes(filterTeam));
  const grouped = {};
  skills.forEach(s => { if (!grouped[s.did]) grouped[s.did] = []; grouped[s.did].push(s); });

  let h = `<div class="legend">
    <span class="legend-item"><span class="ldot l1">1</span>Débutant</span>
    <span class="legend-item"><span class="ldot l2">2</span>Inter.</span>
    <span class="legend-item"><span class="ldot l3">3</span>Avancé</span>
    <span class="legend-item"><span class="ldot l4">4</span>Expert</span>
    <span style="font-size:11px;color:#7A3A28;margin-left:6px">■ compétence rare</span>
    <span style="font-size:11px;color:#aaa;margin-left:6px">● encerclé = cible du poste</span>
  </div>
  <div class="filters">
    <select onchange="filterTeam=this.value;applyFilters()">
      <option value="">Toutes les équipes</option>
      ${db.equipes.map(t => `<option value="${t.id}"${filterTeam===t.id?' selected':''}>${t.name}</option>`).join('')}
    </select>
    <select onchange="filterDomain=this.value;applyFilters()">
      <option value="">Tous les domaines</option>
      ${DOMAINS.map(d => `<option value="${d.id}"${filterDomain===d.id?' selected':''}>${d.name}</option>`).join('')}
    </select>
  </div>
  <div class="matrix-wrap"><table class="mx"><thead><tr>
    <th>Compétence</th>
    ${collabs.map(c => `<th title="${c.prenom} ${c.Nom||''}">${(c.prenom||'?')[0]}${(c.Nom||'?')[0]}<br><span style="font-size:10px;font-weight:400">${c.prenom}</span></th>`).join('')}
  </tr></thead><tbody>`;

  DOMAINS.forEach(dom => {
    const list = grouped[dom.id];
    if (!list || !list.length) return;
    h += `<tr><td colspan="${collabs.length+1}" class="dr" style="background:${dom.bg};color:${dom.c}">${dom.name}</td></tr>`;
    list.forEach(sk => {
      const isRare = !!rareMap[sk.id];
      h += `<tr><td><span class="twrap${isRare?' sk-rare':''}">${sk.name}${isRare?`<span class="rare-pill">rare</span>`:''}${skillTT(sk)}</span></td>`;
      collabs.forEach(c => {
        const comps  = getCollabComps(c.Id);
        const lvl    = comps[sk.id] || 0;
        const poste  = posteById(c.PosteId);
        const target = poste && poste.targets[sk.id] !== undefined ? poste.targets[sk.id] : null;
        h += `<td><div class="cell" onclick="openCollabModal('${c.Id}','${sk.id}')">`;
        if (lvl > 0)      h += `<span class="twrap"><span class="lb l${lvl}${target!=null&&lvl===target?' l-ring':''}">${lvl}</span>${levelTT(sk,lvl,'tup')}</span>`;
        else if (target!=null) h += `<span class="lb" style="border:1.5px dashed #ccc;color:#ccc;font-size:10px">—</span>`;
        else              h += `<span style="color:#e0ded8;font-size:18px">·</span>`;
        h += `</div></td>`;
      });
      h += `</tr>`;
    });
  });
  h += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = h;
}

// =====================================================================
// COLLABS
// =====================================================================
function renderCollabs() {
  const q = (document.getElementById('search-input') || {value:''}).value.toLowerCase();
  let list = visibleCollabs().filter(c => {
    const fn = ((c.prenom||'') + ' ' + (c.Nom||'')).toLowerCase();
    const p  = posteById(c.PosteId);
    return (!filterTeam || c.teamIds && c.teamIds.includes(filterTeam))
        && (!filterPoste || c.PosteId === filterPoste)
        && (!q || fn.includes(q) || (p && p.name.toLowerCase().includes(q)));
  });
  let h = `<div class="filters">
    <select onchange="filterTeam=this.value;applyFilters()">
      <option value="">Toutes les équipes</option>
      ${db.equipes.map(t => `<option value="${t.id}"${filterTeam===t.id?' selected':''}>${t.name}</option>`).join('')}
    </select>
    <select onchange="filterPoste=this.value;applyFilters()">
      <option value="">Tous les postes</option>
      ${POSTES.map(p => `<option value="${p.id}"${filterPoste===p.id?' selected':''}>${p.name}</option>`).join('')}
    </select>
  </div><div class="collab-grid">`;
  list.forEach(c => {
    const p = posteById(c.PosteId);
    const comps   = getCollabComps(c.Id);
    const targets = p ? Object.entries(p.targets).filter(([,v]) => v != null) : [];
    const ok  = targets.filter(([k,v]) => (comps[k]||0) >= v).length;
    const pct = targets.length ? Math.round(ok / targets.length * 100) : null;
    const teams = (c.teamIds||[]).map(tid => { const t = teamById(tid); return t ? `<span class="team-tag">${t.name}</span>` : ''; }).join('');
    h += `<div class="collab-card" onclick="openCollabModal('${c.Id}')">
      <div class="av">${(c.prenom||'?')[0]}${(c.Nom||'?')[0]}</div>
      <div class="cname">${c.prenom||''} ${c.Nom||''}</div>
      <div class="cposte">${p ? p.name : '—'}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px">${teams}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <span class="stat-pill">${Object.keys(comps).length} compétences</span>
        ${pct != null ? `<span class="stat-pill">${pct}% objectifs</span>` : ''}
      </div>
      ${pct != null ? `<div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>` : ''}
    </div>`;
  });
  if (!list.length) h += `<div class="empty" style="grid-column:1/-1"><i class="ti ti-users"></i>Aucun collaborateur trouvé</div>`;
  h += `</div>`;
  document.getElementById('content').innerHTML = h;
}

function openCollabModal(id, focusSkill) {
  if (currentUser.role === 'collaborateur' && id && String(id) !== String(db.collaborateurs.find(c => (c.Email||'').toLowerCase() === currentUser.email.toLowerCase())?.Id)) return;
  const c = id ? db.collaborateurs.find(x => String(x.Id) === String(id)) : null;
  collabEdit = c ? JSON.parse(JSON.stringify(c)) : { Id:null, prenom:'', Nom:'', Email:'', PosteId:'', teamIds:[], ManagerID:'' };
  collabEdit._comps    = id ? getCollabComps(id) : {};
  collabEdit._comments = id ? getCollabComments(id) : {};
  collabEdit._history  = id ? getCollabHistory(id) : [];
  collabEdit._changes  = {};

  document.getElementById('m-av').textContent = (collabEdit.prenom||'?')[0] + (collabEdit.Nom||'?')[0];
  document.getElementById('m-title').textContent = id ? `${collabEdit.prenom} ${collabEdit.Nom||''}` : 'Nouveau collaborateur';
  const p = posteById(collabEdit.PosteId);
  document.getElementById('m-sub').textContent = p ? p.name : '—';
  renderCollabBody(focusSkill);
  document.getElementById('m-footer').innerHTML = `
    ${id && currentUser.role === 'admin' ? `<button class="btn btn-danger btn-sm" style="margin-right:auto" onclick="deleteCollab('${id}')"><i class="ti ti-trash"></i>Supprimer</button>` : ''}
    <button class="btn" onclick="closeModal()">Annuler</button>
    <button class="btn btn-primary" onclick="saveCollab('${id||''}')"><i class="ti ti-check"></i>Enregistrer</button>`;
  document.getElementById('modal').style.display = 'flex';
  if (focusSkill) setTimeout(() => document.querySelector('[data-focus]')?.scrollIntoView({block:'center',behavior:'smooth'}), 80);
}

  const tchecks = db.equipes.map(t => {
    const ck = (c.teamIds||[]).includes(String(t.id));
    return `<label class="tcheck${ck?' checked':''}" onclick="toggleTeam('${t.id}',this)"><input type="checkbox"${ck?' checked':''}>${t.name}</label>`;
  }).join('');

  let h = `<div class="fg">
    <div class="field"><label>Prénom</label><input type="text" id="c-prenom" value="${c.prenom||''}" oninput="collabEdit.prenom=this.value"></div>
    <div class="field"><label>Nom</label><input type="text" id="c-nom" value="${c.Nom||''}" oninput="collabEdit.Nom=this.value"></div>
    <div class="field"><label>Email</label><input type="text" id="c-email" value="${c.Email||''}" oninput="collabEdit.Email=this.value"></div>

      <select id="c-poste" onchange="collabEdit.PosteId=this.value;renderCollabBody()">

    <div class="field full"><label>Manager</label>
      <select id="c-manager">
        <option value="">— Aucun —</option>
        ${db.collaborateurs.filter(x => String(x.Id) !== String(c.Id)).map(x => `<option value="${x.Id}"${String(c.ManagerID)===String(x.Id)?' selected':''}>${x.prenom} ${x.Nom||''}</option>`).join('')}
      </select>
    </div>
  </div>
  <div style="font-size:12px;color:#5F5E5A;margin-bottom:10px">Niveaux de compétences — survolez pour voir la description.</div>`;

  DOMAINS.forEach(dom => {
    const list = grouped[dom.id] || [];
    const display = c.PosteId ? list.filter(s => poste.targets[s.id] !== undefined || c._comps[s.id] || (c._comments[s.id] && (c._comments[s.id].manager || c._comments[s.id].collaborateur))) : list;
    if (c.PosteId && !display.length) return;
    h += `<div class="csect"><div class="csect-lbl">${domTag(dom)}</div>`;
    (c.PosteId ? display : list).forEach(sk => {
      const lvl    = c._comps[sk.id] || 0;
      const target = poste.targets[sk.id];
      const isFocus = sk.id === focusSkill;
      const cm     = c._comments[sk.id] || {};
      const hasCm  = cm.manager || cm.collaborateur;
      h += `<div class="crow"${isFocus?' data-focus="1"':''}>
        <div class="crow-main"${isFocus?' style="background:#EEEDFE;border-radius:8px;margin:0 -6px;padding:6px"':''}>
          <span class="crow-name twrap">${sk.name}${target!=null?` <span class="tt-tag">cible:${target}</span>`:''}${skillTT(sk,'tup')}</span>
          <div class="lp">
            <button class="lvl-btn" onclick="setLvl('${sk.id}',0)"><i class="ti ti-x" style="font-size:11px"></i></button>

          ${currentUser.role==='manager'||currentUser.role==='admin' ? `<div class="cm-block">

          </div>` : ''}

    <div style="font-size:13px;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px"><i class="ti ti-history" style="color:#534AB7"></i>Historique</div>`;

  hist.forEach(h2 => { h += `<div class="hist-item"><div class="hist-dot"></div><div><div class="hist-date">${fmtDate(h2.ts)}</div><div>${h2.desc}</div></div></div>`; });

function toggleTeam(id, label) {
  const sid = String(id);
  const idx = (collabEdit.teamIds||[]).indexOf(sid);
  if (idx > -1) { collabEdit.teamIds.splice(idx, 1); label.classList.remove('checked'); }
  else          { if (!collabEdit.teamIds) collabEdit.teamIds = []; collabEdit.teamIds.push(sid); label.classList.add('checked'); }
}
function toggleCm(sid) { document.getElementById('cp-' + sid)?.classList.toggle('open'); }

function setLvl(sid, lvl) {
  const old = collabEdit._comps[sid] || 0;
  if (lvl === 0) delete collabEdit._comps[sid]; else collabEdit._comps[sid] = lvl;
  if (old !== lvl) {
    const sk = skillById(sid);
    collabEdit._changes[sid] = { old, new: lvl };
  }
  const poste  = posteById(collabEdit.PosteId) || { targets:{} };
  const target = poste.targets[sid];
  document.querySelectorAll(`[onclick^="setLvl('${sid}'"]`).forEach((btn, i) => {
    btn.className = 'lvl-btn';
    if (i === 0) return;
    const n = i;
    if ((collabEdit._comps[sid] || 0) === n) btn.className = `lvl-btn a${n}`;
    btn.style.outline = target === n ? '2px solid #534AB7' : '';
  });
}

async function saveCollab(id) {
  const prenom = document.getElementById('c-prenom').value.trim();
  const nom    = document.getElementById('c-nom').value.trim();
  if (!prenom || !nom) { alert('Veuillez renseigner prénom et nom.'); return; }
  showSave('Enregistrement...');
  try {
    const collabData = {
      Title:     prenom,
      Prenom:       nom,
      Email:     document.getElementById('c-email').value.trim(),
      PosteId:   document.getElementById('c-poste').value,
      TeamIds:   (collabEdit.teamIds || []).join(','),
      ManagerID: document.getElementById('c-manager').value || ''
    };
    let collabSpId = id;
    if (id) {
      await spPatch(CONFIG.lists.collaborateurs, id, collabData);
    } else {
      const res = await spPost(CONFIG.lists.collaborateurs, collabData);
      collabSpId = res.Id;
    }

    // Compétences
    for (const [sid, lvl] of Object.entries(collabEdit._comps)) {
      const existing = db.competences.find(c => String(c.CollabId) === String(collabSpId) && (c.SkillId || c.Title) === sid);
      if (existing) {
        if (parseInt(existing.Niveau) !== lvl) await spPatch(CONFIG.lists.competences, existing.Id, { Niveau: lvl });
      } else {
        await spPost(CONFIG.lists.competences, { Title: sid, CollabId: String(collabSpId), Niveau: lvl });
      }
    }
    // Supprime les compétences retirées
    for (const c of db.competences.filter(c => String(c.CollabId) === String(collabSpId) && !collabEdit._comps[(c.SkillId || c.Title)])) {
      await spDelete(CONFIG.lists.competences, c.Id);
    }

    // Commentaires
    for (const sk of SKILLS) {
      const mgrEl = document.getElementById('cm-mgr-' + sk.id);
      const colEl = document.getElementById('cm-col-' + sk.id);
      if (mgrEl && mgrEl.value.trim()) {
        await spPost(CONFIG.lists.commentaires, { Title: String(collabSpId), SkillId: sk.id, TypeAuteur: 'manager', Contenu: mgrEl.value.trim(), DateSaisie: new Date().toISOString() });
      }
      if (colEl && colEl.value.trim()) {
        await spPost(CONFIG.lists.commentaires, { Title: String(collabSpId), SkillId: sk.id, TypeAuteur: 'collaborateur', Contenu: colEl.value.trim(), DateSaisie: new Date().toISOString() });
      }
    }

    // Historique
    for (const [sid, ch] of Object.entries(collabEdit._changes)) {
      const sk = skillById(sid);
      await spPost(CONFIG.lists.historique, {
        Title:       String(collabSpId),
        Role:        currentUser.role,
        Description: `"${sk ? sk.name : sid}" : ${ch.old ? 'niveau '+ch.old : '—'} → ${ch.new ? 'niveau '+ch.new : 'retiré'}`,
        DateAction:  new Date().toISOString()
      });
    }

    await loadData();
    hideSave('Enregistré ✓');
    closeModal();
    if (currentView === 'matrix') renderMatrix();
    else if (currentView === 'admin-collabs') renderAdminCollabs();
    else renderCollabs();
  } catch (e) {
    hideSave('Erreur !');
    alert('Erreur lors de l\'enregistrement : ' + e.message);
  }
}

async function deleteCollab(id) {
  if (!confirm('Supprimer ce collaborateur ?')) return;
  showSave('Suppression...');
  await spDelete(CONFIG.lists.collaborateurs, id);
  await loadData();
  hideSave('Supprimé ✓');
  closeModal();
  if (currentView === 'matrix') renderMatrix(); else renderCollabs();
}

function renderImport() {
  document.getElementById('content').innerHTML = `<div style="max-width:580px">

  <p style="font-size:12px;color:#888;background:#f5f5f0;padding:8px 12px;border-radius:8px;margin-bottom:14px;font-family:monospace">Prénom | NOM | Mail | Poste | Compétence | Niveau | Commentaire</p>
  <div class="import-zone" onclick="document.getElementById('fi').click()">
    <i class="ti ti-file-spreadsheet"></i>
    <div style="font-weight:500;margin-bottom:4px">Cliquer pour importer (.xlsx, .xls)</div>
    <div style="font-size:12px">Une ligne par compétence — plusieurs lignes par collaborateur acceptées</div>
  </div>
  <input type="file" id="fi" style="display:none" accept=".xlsx,.xls" onchange="handleImport(event)">
  <div id="fb"></div>
  <h3 style="font-size:15px;font-weight:500;margin:26px 0 6px">Exporter la matrice</h3>
  <p style="font-size:13px;color:#5F5E5A;margin-bottom:12px">Format exporté : une colonne par compétence.</p>
  <button class="btn btn-primary" onclick="exportExcel()"><i class="ti ti-download"></i>Télécharger (.xlsx)</button>
  </div>`;
}

async function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const wb   = XLSX.read(ev.target.result, { type:'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
      showSave('Import en cours...');

      // Regrouper par email (ou prénom+nom si pas d'email)
      const collabMap = {};
      rows.forEach(row => {
        const prenom     = (row['Prénom'] || row['prenom'] || '').toString().trim();
        const nom        = (row['NOM']    || row['Nom']    || row['nom'] || '').toString().trim();
        const email      = (row['Mail']   || row['Email']  || row['email'] || '').toString().trim().toLowerCase();
        const posteName  = (row['Poste']  || row['poste']  || '').toString().trim();
        const skillName  = (row['Compétence'] || row['Competence'] || row['competence'] || '').toString().trim();
        const niveau     = parseInt(row['Niveau'] || row['niveau'] || 0);
        const commentaire = (row['Commentaire'] || row['commentaire'] || '').toString().trim();

        if (!prenom && !email) return;
        const key = email || `${prenom}_${nom}`;
        if (!collabMap[key]) collabMap[key] = { prenom, nom, email, posteName, comps:{}, comments:{} };

        // Résolution par nom de compétence
        const sk = skillByName(skillName);
        if (sk && niveau >= 1 && niveau <= 4) {
          // Garder le niveau le plus élevé si plusieurs lignes
          if (!collabMap[key].comps[sk.id] || collabMap[key].comps[sk.id] < niveau) {
            collabMap[key].comps[sk.id] = niveau;
          }
          if (commentaire && !collabMap[key].comments[sk.id]) {
            collabMap[key].comments[sk.id] = commentaire;
          }
        }
      });

      let added = 0, updated = 0;
      for (const c of Object.values(collabMap)) {
        const poste = POSTES.find(p => p.name.toLowerCase().trim() === c.posteName.toLowerCase().trim());
        const ex    = db.collaborateurs.find(x =>
          (c.email && (x.Email||'').toLowerCase() === c.email) ||
          ((x.prenom||'').toLowerCase() === c.prenom.toLowerCase() && (x.Nom||'').toLowerCase() === c.nom.toLowerCase())
        );
        let cid;
        if (ex) {
          await spPatch(CONFIG.lists.collaborateurs, ex.Id, {
            Title: c.prenom, Prenom: c.nom, Email: c.email,
            PosteId: poste ? poste.id : (ex.PosteId || '')
          });
          cid = ex.Id;
          updated++;
        } else {
          const res = await spPost(CONFIG.lists.collaborateurs, {
            Title: c.prenom, Prenom: c.nom, Email: c.email,
            PosteId: poste ? poste.id : '', TeamIds: '', ManagerID: ''
          });
          cid = res.Id;
          added++;
        }

        // Compétences
        for (const [sid, lvl] of Object.entries(c.comps)) {
          const existing = db.competences.find(x => String(x.CollabId) === String(cid) && x.SkillId === sid);
          if (existing) {
            if (parseInt(existing.Niveau) !== lvl) await spPatch(CONFIG.lists.competences, existing.Id, { Niveau: lvl });
          } else {
            await spPost(CONFIG.lists.competences, { Title: sid, CollabId: String(cid), Niveau: lvl });
          }
        }

        // Commentaires manager
        for (const [sid, com] of Object.entries(c.comments)) {
          const alreadyExists = db.commentaires.find(x => String(x.Title) === String(cid) && x.SkillId === sid && x.TypeAuteur === 'manager');
          if (!alreadyExists) {
            await spPost(CONFIG.lists.commentaires, {
              Title: String(cid), SkillId: sid,
              TypeAuteur: 'manager', Contenu: com,
              DateSaisie: new Date().toISOString()
            });
          }
        }
      }

      await loadData();
      hideSave('Import terminé ✓');
      document.getElementById('fb').innerHTML = `<div class="fb-ok"><i class="ti ti-check"></i> ${added} collaborateur(s) ajouté(s), ${updated} mis à jour.</div>`;
    } catch (err) {
      hideSave('Erreur !');
      document.getElementById('fb').innerHTML = `<div class="fb-err"><i class="ti ti-alert-triangle"></i> Erreur : ${err.message}</div>`;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function exportExcel() {
  const headers = ['Prénom','Nom','Email','Poste','Équipes', ...SKILLS.map(s => s.id)];
  const rows = db.collaborateurs.map(c => {
    const p     = posteById(c.PosteId);
    const comps = getCollabComps(c.Id);
    const teams = (c.teamIds||[]).map(tid => { const t = teamById(tid); return t ? t.name : ''; }).filter(Boolean).join(', ');
    return [c.prenom||'', c.Nom||'', c.Email||'', p ? p.name : '', teams, ...SKILLS.map(s => comps[s.id] || '')];
  });
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, 'Matrice', ws);
  XLSX.writeFile(wb, 'matrice_competences_evea.xlsx');
}

// =====================================================================
// MODAL
// =====================================================================
function maybeClose(e) { if (e.target === document.getElementById('modal')) closeModal(); }
function closeModal()  { document.getElementById('modal').style.display = 'none'; }

// =====================================================================
// RECHERCHE PAR COMPÉTENCE
// =====================================================================
function renderSearchSkills() {
  const grouped = {};
  SKILLS.forEach(s => { if (!grouped[s.did]) grouped[s.did] = []; grouped[s.did].push(s); });

  // Calcul du nombre de personnes par compétence et par niveau
  function getStats(skillId) {
    const stats = { 1:[], 2:[], 3:[], 4:[] };
    db.collaborateurs.forEach(c => {
      const comps = getCollabComps(c.Id);
      const lvl = comps[skillId];
      if (lvl && stats[lvl]) stats[lvl].push(c);
    });
    return stats;
  }

  let h = `
    <div style="margin-bottom:14px">
      <div class="search-box" style="width:100%;max-width:400px">
        <i class="ti ti-search" style="color:#aaa"></i>
        <input type="text" id="skill-search-input" placeholder="Rechercher une compétence…"
          oninput="filterSkillSearch(this.value)" style="width:100%">
      </div>
    </div>
    <div id="skill-search-results"></div>
    <div id="skill-search-all">`;

  DOMAINS.forEach(dom => {
    const list = grouped[dom.id] || [];
    if (!list.length) return;
    h += `<div class="admin-card" style="margin-bottom:14px">
      <div style="padding:8px 16px;font-size:11px;font-weight:600;text-transform:uppercase;
        letter-spacing:.05em;background:${dom.bg};color:${dom.c};border-radius:8px 8px 0 0">${dom.name}</div>
      <table class="adm"><thead>
        <tr><th>Compétence</th><th style="text-align:center">Niveau 1</th><th style="text-align:center">Niveau 2</th>
        <th style="text-align:center">Niveau 3</th><th style="text-align:center">Niveau 4</th><th style="text-align:center">Total</th></tr>
      </thead><tbody>`;
    list.forEach(sk => {
      const stats = getStats(sk.id);
      const total = Object.values(stats).flat().length;
      h += `<tr style="cursor:pointer" onclick="showSkillDetail('${sk.id}')" title="Cliquer pour voir les personnes">
        <td style="font-weight:500">${sk.name}</td>
        ${[1,2,3,4].map(n => `
          <td style="text-align:center">
            ${stats[n].length > 0
              ? `<span class="stat-pill lb l${n}" style="cursor:pointer">${stats[n].length}</span>`
              : '<span style="color:#ccc">—</span>'}
          </td>`).join('')}
        <td style="text-align:center"><span class="stat-pill">${total}</span></td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  });

  h += `</div>`;
  document.getElementById('content').innerHTML = h;
}

function filterSkillSearch(query) {
  const resultsEl = document.getElementById('skill-search-results');
  const allEl = document.getElementById('skill-search-all');
  if (!query.trim()) {
    resultsEl.innerHTML = '';
    allEl.style.display = '';
    return;
  }
  allEl.style.display = 'none';
  const matches = SKILLS.filter(s => s.name.toLowerCase().includes(query.toLowerCase()));
  if (!matches.length) {
    resultsEl.innerHTML = `<p style="color:#aaa;font-size:13px">Aucune compétence trouvée.</p>`;
    return;
  }
  let h = `<div class="admin-card">
    <table class="adm"><thead>
      <tr><th>Compétence</th><th style="text-align:center">Niveau 1</th><th style="text-align:center">Niveau 2</th>
      <th style="text-align:center">Niveau 3</th><th style="text-align:center">Niveau 4</th><th style="text-align:center">Total</th></tr>
    </thead><tbody>`;
  matches.forEach(sk => {
    const stats = {};
    [1,2,3,4].forEach(n => { stats[n] = []; });
    db.collaborateurs.forEach(c => {
      const comps = getCollabComps(c.Id);
      const lvl = comps[sk.id];
      if (lvl && stats[lvl]) stats[lvl].push(c);
    });
    const total = Object.values(stats).flat().length;
    h += `<tr style="cursor:pointer" onclick="showSkillDetail('${sk.id}')" title="Cliquer pour voir les personnes">
      <td style="font-weight:500">${sk.name}</td>
      ${[1,2,3,4].map(n => `
        <td style="text-align:center">
          ${stats[n].length > 0
            ? `<span class="stat-pill lb l${n}" style="cursor:pointer">${stats[n].length}</span>`
            : '<span style="color:#ccc">—</span>'}
        </td>`).join('')}
      <td style="text-align:center"><span class="stat-pill">${total}</span></td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  resultsEl.innerHTML = h;
}

function showSkillDetail(skillId) {
  const sk = SKILLS.find(s => s.id === skillId);
  if (!sk) return;
  const dom = DOMAINS.find(d => d.id === sk.did);
  const byLevel = { 1:[], 2:[], 3:[], 4:[] };
  db.collaborateurs.forEach(c => {
    const comps = getCollabComps(c.Id);
    const lvl = comps[skillId];
    if (lvl && byLevel[lvl]) byLevel[lvl].push(c);
  });
  const total = Object.values(byLevel).flat().length;
  document.getElementById('m-av').innerHTML = `<i class="ti ti-award" style="font-size:20px"></i>`;
  document.getElementById('m-title').textContent = sk.name;
  document.getElementById('m-sub').textContent = `${dom ? dom.name : ''} · ${total} personne(s)`;
  let body = '';
  [4,3,2,1].forEach(n => {
    if (!byLevel[n].length) return;
    body += `<div style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span class="lb l${n}" style="width:20px;height:20px;font-size:11px">${n}</span>
        <span style="font-size:12px;font-weight:600;color:#5F5E5A">${sk.levels && sk.levels[n] ? sk.levels[n] : 'Niveau '+n}</span>
        <span class="stat-pill">${byLevel[n].length}</span>
      </div>`;
    byLevel[n].forEach(c => {
      const p = posteById(c.PosteId);
      body += `<div style="display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:6px;background:#f5f5f0;margin-bottom:4px">
        <div style="flex:1">
          <div style="font-weight:500;font-size:13px">${c.prenom} ${c.Nom||''}</div>
          <div style="font-size:11px;color:#5F5E5A">${p ? p.name : '—'}</div>
        </div>
      </div>`;
    });
    body += `</div>`;
  });
  if (!total) body = `<p style="color:#aaa;font-size:13px">Personne n'a encore cette compétence.</p>`;
  document.getElementById('m-body').innerHTML = body;
  document.getElementById('m-footer').innerHTML = `<button class="btn" onclick="closeModal()">Fermer</button>`;
  document.getElementById('modal').style.display = 'flex';
}
  
// =====================================================================
// LOGOUT
// =====================================================================
async function logout() {
  await msalInstance.logoutRedirect();
}

// =====================================================================
// INIT
// =====================================================================
async function init() {
  document.getElementById('loading').style.display = 'flex';
  try {
    await msalInstance.handleRedirectPromise();
    let account = msalInstance.getAllAccounts()[0];
    if (!account) {
    await msalInstance.loginRedirect({ scopes: SCOPES_GRAPH });  // ← Graph pour le login
    return;
}
const tokenGraph = await msalInstance.acquireTokenSilent({ scopes: SCOPES_GRAPH, account });
const meResp     = await fetch('https://graph.microsoft.com/v1.0/me', {
    headers: { Authorization: `Bearer ${tokenGraph.accessToken}` }  // ← token Graph pour /me
});
    if (!meResp.ok) throw new Error('Impossible de récupérer le profil Microsoft');
    const me = await meResp.json();

    // Chargement des données SharePoint
    await loadData();

    // Définition du rôle
    const email = me.mail || me.userPrincipalName || '';
    currentUser = { email, name: me.displayName || email, role: getUserRole(email) };

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    buildSidebar();
    showView('matrix');
  } catch (e) {
    document.getElementById('loading-msg').textContent = 'Erreur : ' + e.message;
    console.error(e);
  }
}

init();
</script>
