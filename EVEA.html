// Reconstruit dans SharePoint les domaines statiques manquants (DOM_01..DOM_07) et
// réassigne les compétences (CompetencesRef) qui référencent encore ces anciens
// identifiants vers les nouveaux identifiants numériques.
async function migrateDomains() {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux administrateurs.'); return; }
  if (!confirm(`Reconstruire les domaines manquants dans SharePoint et réassigner les compétences concernées ?\n\nCette opération est rapide. Ne fermez pas la page pendant son exécution.`)) return;
  showSave('Réparation des domaines...');
  try {
    const domainIdMap = {}; // DOM_0X -> nouvel id numérique SharePoint
    for (const [oldId, name, c, bg] of OLD_DOMAINS_REF) {
      const existing = DOMAINS.find(d => (d.name||'').trim().toLowerCase() === name.trim().toLowerCase());
      if (existing) {
        domainIdMap[oldId] = existing.id;
      } else {
        const res = await spPost(CONFIG.lists.domaines, { Title: name, Couleur: c, Fond: bg });
        domainIdMap[oldId] = String(res.Id);
      }
    }

    // Corrige le DomainId des compétences qui pointent encore vers un ancien identifiant
    let fixed = 0;
    for (const s of SKILLS) {
      if (domainIdMap[s.did] && !isNaN(Number(s.id))) {
        await spPatch(CONFIG.lists.competencesRef, s.id, { DomainId: domainIdMap[s.did] });
        fixed++;
      }
    }

    await loadData();
    hideSave('Domaines réparés ✓');
    renderAdminSkills();
    alert(`Réparation terminée.\n${fixed} compétence(s) réassignée(s) à leur domaine.`);
  } catch(e) {
    hideSave('Erreur !');
    alert('Erreur pendant la réparation : ' + e.message + '\n\nVérifiez la liste Domaines dans SharePoint avant de relancer (doublons possibles).');
    console.error(e);
  }
}

      <div class="field full"><label>Niveau 3</label><input type="text" id="sk-l3" value="${sk.levels[3]||''}" placeholder="Description niveau 3"></div>

async function saveSkill(id) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux administrateurs.'); return; }
  const name = document.getElementById('sk-name').value.trim();
  if (!name) return alert('Nom requis.');
  const did = document.getElementById('sk-did').value;
  const levels = {
    1: document.getElementById('sk-l1').value.trim(),
    2: document.getElementById('sk-l2').value.trim(),
    3: document.getElementById('sk-l3').value.trim(),
    4: document.getElementById('sk-l4').value.trim()
  };
  showSave();
  try {
    const data = { Title: name, DomainId: did, Niveaux: JSON.stringify(levels) };
    const isSpId = id && !isNaN(Number(id));
    if (isSpId) {
      await spPatch(CONFIG.lists.competencesRef, id, data);
    } else if (id) {
      // Compétence statique (COMP_xxx) : créer dans SharePoint puis mettre à jour les références
      const res = await spPost(CONFIG.lists.competencesRef, data);
      const newId = String(res.Id);
      // Mettre à jour toutes les entrées Competences qui référencent l'ancien ID
      const toUpdate = db.competences.filter(c => (c.SkillId || c.Title) === id);
      for (const c of toUpdate) {
        await spPatch(CONFIG.lists.competences, c.Id, { Title: newId });
      }
      // Mettre à jour les Commentaires
      const comsToUpdate = db.commentaires.filter(c => c.SkillId === id);
      for (const c of comsToUpdate) {
        await spPatch(CONFIG.lists.commentaires, c.Id, { SkillId: newId });
      }
    } else {
      await spPost(CONFIG.lists.competencesRef, data);
    }
    await loadData();
    closeModal();
    renderAdminSkills();
    hideSave('Compétence enregistrée ✓');
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}

async function deleteSkill(id) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux administrateurs.'); return; }
  if (!confirm('Supprimer cette compétence ? Les niveaux et commentaires associés seront également supprimés.')) return;
  showSave('Suppression...');
  try {
    const isSpId = id && !isNaN(Number(id));
    if (isSpId) {
      await spDelete(CONFIG.lists.competencesRef, id);
      // Supprimer les niveaux associés
      for (const c of db.competences.filter(c => (c.SkillId || c.Title) === id)) {
        await spDelete(CONFIG.lists.competences, c.Id);
      }
      // Supprimer les commentaires associés
      for (const c of db.commentaires.filter(c => c.SkillId === id)) {
        await spDelete(CONFIG.lists.commentaires, c.Id);
      }
    } else {
      // Compétence statique non encore migrée : retirer de la mémoire uniquement
      const idx = SKILLS.findIndex(s => s.id === id);
      if (idx >= 0) SKILLS.splice(idx, 1);
    }
    await loadData();
    hideSave('Supprimée ✓');
    renderAdminSkills();
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}

// Migration complète des compétences statiques vers SharePoint
// avec mise à jour des références dans Competences et Commentaires
async function migrateSkills() {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux administrateurs.'); return; }
  const staticSkills = SKILLS.filter(s => isNaN(Number(s.id)));
  if (!staticSkills.length) return alert('Toutes les compétences sont déjà dans SharePoint.');
  if (!confirm(`Migrer ${staticSkills.length} compétence(s) statique(s) vers SharePoint ?\n\nCette opération va :\n1. Créer les compétences dans CompetencesRef\n2. Mettre à jour toutes les références dans Competences\n3. Mettre à jour toutes les références dans Commentaires\n\nCela peut prendre plusieurs minutes.`)) return;

  showSave('Migration en cours...');
  try {
    // Construire une table de correspondance ancienId -> nouvelId
    const idMap = {};
    let i = 0;
    for (const sk of staticSkills) {
      i++;
      document.getElementById('save-msg').textContent = `Migration ${i}/${staticSkills.length}...`;
      const res = await spPost(CONFIG.lists.competencesRef, {
        Title:    sk.name,
        DomainId: sk.did,
        Niveaux:  JSON.stringify(sk.levels)
      });
      idMap[sk.id] = String(res.Id);
    }

    // Mettre à jour la liste Competences (niveaux des collaborateurs)
    const compsToUpdate = db.competences.filter(c => idMap[(c.SkillId || c.Title)]);
    document.getElementById('save-msg').textContent = `Mise à jour de ${compsToUpdate.length} entrées Competences...`;
    for (const c of compsToUpdate) {
      const oldId = c.SkillId || c.Title;
      await spPatch(CONFIG.lists.competences, c.Id, { Title: idMap[oldId] });
    }

    // Mettre à jour la liste Commentaires
    const comsToUpdate = db.commentaires.filter(c => idMap[c.SkillId]);
    document.getElementById('save-msg').textContent = `Mise à jour de ${comsToUpdate.length} commentaires...`;
    for (const c of comsToUpdate) {
      await spPatch(CONFIG.lists.commentaires, c.Id, { SkillId: idMap[c.SkillId] });
    }

    // Mettre à jour les targets des postes (JSON stocké dans SharePoint)
    document.getElementById('save-msg').textContent = 'Mise à jour des cibles de postes...';
    for (const poste of POSTES) {
      const isSpId = poste.id && !isNaN(Number(poste.id));
      if (!isSpId) continue;
      let updated = false;
      const newTargets = {};
      for (const [sid, lvl] of Object.entries(poste.targets || {})) {
        const newSid = idMap[sid] || sid;
        if (newSid !== sid) updated = true;
        newTargets[newSid] = lvl;
      }
      if (updated) {
        await spPatch(CONFIG.lists.postes, poste.id, { Targets: JSON.stringify(newTargets) });
      }
    }

    await loadData();
    hideSave('Migration terminée ✓');
    renderAdminSkills();
    alert(`Migration réussie !\n${staticSkills.length} compétences migrées.\n${compsToUpdate.length} niveaux mis à jour.\n${comsToUpdate.length} commentaires mis à jour.`);
  } catch(e) {
    hideSave('Erreur migration !');
    alert('Erreur pendant la migration : ' + e.message + '\n\nLa migration est partielle. Relancez-la pour continuer.');
    console.error(e);
  }
}

async function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const wb   = XLSX.read(ev.target.result, { type:'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
      showSave('Import en cours...');

      // Regrouper par email (ou prénom+nom si pas d'email)
      const collabMap = {};
      rows.forEach(row => {
        const prenom     = (row['Prénom'] || row['prenom'] || '').toString().trim();
        const nom        = (row['NOM']    || row['Nom']    || row['nom'] || '').toString().trim();
        const email      = (row['Mail']   || row['Email']  || row['email'] || '').toString().trim().toLowerCase();
        const posteName  = (row['Poste']  || row['poste']  || '').toString().trim();
        const skillName  = (row['Compétence'] || row['Competence'] || row['competence'] || '').toString().trim();
        const niveau     = parseInt(row['Niveau'] || row['niveau'] || 0);
        const commentaire = (row['Commentaire'] || row['commentaire'] || '').toString().trim();

        if (!prenom && !email) return;
        const key = email || `${prenom}_${nom}`;
        if (!collabMap[key]) collabMap[key] = { prenom, nom, email, posteName, comps:{}, comments:{} };

        // Résolution par nom de compétence
        const sk = skillByName(skillName);
        if (sk && niveau >= 1 && niveau <= 4) {
          // Garder le niveau le plus élevé si plusieurs lignes
          if (!collabMap[key].comps[sk.id] || collabMap[key].comps[sk.id] < niveau) {
            collabMap[key].comps[sk.id] = niveau;
          }
          if (commentaire && !collabMap[key].comments[sk.id]) {
            collabMap[key].comments[sk.id] = commentaire;
          }
        }
      });

      let added = 0, updated = 0;
      for (const c of Object.values(collabMap)) {
        const poste = POSTES.find(p => p.name.toLowerCase().trim() === c.posteName.toLowerCase().trim());
        const ex    = db.collaborateurs.find(x =>
          (c.email && (x.Email||'').toLowerCase() === c.email) ||
          ((x.prenom||'').toLowerCase() === c.prenom.toLowerCase() && (x.Nom||'').toLowerCase() === c.nom.toLowerCase())
        );
        let cid;
        if (ex) {
          await spPatch(CONFIG.lists.collaborateurs, ex.Id, {
            Title: c.prenom, Prenom: c.nom, Email: c.email,
            PosteId: poste ? poste.id : (ex.PosteId || '')
          });
          cid = ex.Id;
          updated++;
        } else {
          const res = await spPost(CONFIG.lists.collaborateurs, {
            Title: c.prenom, Prenom: c.nom, Email: c.email,
            PosteId: poste ? poste.id : '', TeamIds: '', ManagerID: ''
          });
          cid = res.Id;
          added++;
        }

        // Compétences
        for (const [sid, lvl] of Object.entries(c.comps)) {
          const existing = db.competences.find(x => String(x.CollabId) === String(cid) && x.SkillId === sid);
          if (existing) {
            if (parseInt(existing.Niveau) !== lvl) await spPatch(CONFIG.lists.competences, existing.Id, { Niveau: lvl });
          } else {
            await spPost(CONFIG.lists.competences, { Title: sid, CollabId: String(cid), Niveau: lvl });
          }
        }

        // Commentaires manager
        for (const [sid, com] of Object.entries(c.comments)) {
          const alreadyExists = db.commentaires.find(x => String(x.Title) === String(cid) && x.SkillId === sid && x.TypeAuteur === 'manager');
          if (!alreadyExists) {
            await spPost(CONFIG.lists.commentaires, {
              Title: String(cid), SkillId: sid,
              TypeAuteur: 'manager', Contenu: com,
              DateSaisie: new Date().toISOString()
            });
          }
        }
      }

      await loadData();
      hideSave('Import terminé ✓');
      document.getElementById('fb').innerHTML = `<div class="fb-ok"><i class="ti ti-check"></i> ${added} collaborateur(s) ajouté(s), ${updated} mis à jour.</div>`;
    } catch (err) {
      hideSave('Erreur !');
      document.getElementById('fb').innerHTML = `<div class="fb-err"><i class="ti ti-alert-triangle"></i> Erreur : ${err.message}</div>`;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function exportExcel(teamId = '') {
  try {
    let collabs = db.collaborateurs.slice();
    let teamName = 'toute_entreprise';
    if (teamId) {
      collabs = collabs.filter(c => (c.teamIds||[]).includes(String(teamId)));
      const t = teamById(teamId);
      teamName = t ? t.name : 'equipe';
    }
    if (!collabs.length) { alert('Aucun collaborateur à exporter pour ce périmètre.'); return; }

    const headers = ['Prénom','Nom','Email','Poste','Équipes', ...SKILLS.map(s => s.name)];
    const rows = collabs.map(c => {
      const p     = posteById(c.PosteId);
      const comps = getCollabComps(c.Id);
      const teams = (c.teamIds||[]).map(tid => { const t = teamById(tid); return t ? t.name : ''; }).filter(Boolean).join(', ');
      return [c.prenom||'', c.Nom||'', c.Email||'', p ? p.name : '', teams, ...SKILLS.map(s => comps[s.id] || '')];
    });
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Matrice');
    const safeName = teamName.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9_-]+/g, '_');
    XLSX.writeFile(wb, `matrice_competences_evea_${safeName}.xlsx`);
  } catch(e) {
    alert('Erreur lors de l\'export : ' + e.message);
    console.error(e);
  }
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function flashMessage(msg) {
  const el = document.getElementById('save-indicator');
  document.getElementById('save-msg').textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// Construit les lignes exportables pour le collaborateur en cours d'édition (collabEdit)
function getCollabExportRows() {
  const c     = collabEdit;
  const poste = posteById(c.PosteId) || { targets:{} };
  const grouped = {};
  SKILLS.forEach(s => { if (!grouped[s.did]) grouped[s.did] = []; grouped[s.did].push(s); });

  const rows = [];
  getSortedDomains().forEach(dom => {
    const list = grouped[dom.id] || [];
    list.forEach(sk => {
      const lvl    = c._comps[sk.id] || 0;
      const target = poste.targets[sk.id];
      const cm     = c._comments[sk.id] || {};
      const hasCm  = cm.manager || cm.collaborateur || cm.pending;
      const pendingLabel = cm.pending ? `${pendingLevelLabel(cm.pending)} — ${cm.pending.commentaire || ''}` : '';
      // On exporte uniquement les compétences pertinentes : ciblées par le poste,
      // renseignées (niveau > 0), ou commentées
      if (target == null && lvl === 0 && !hasCm) return;
      rows.push({
        domaine: dom.name,
        competence: sk.name,
        niveau: lvl || '',
        niveauLabel: lvl ? getLevelDesc(sk, lvl, c.PosteId) : '',
        cible: target != null ? target : '',
        cibleLabel: target != null ? getLevelDesc(sk, target, c.PosteId) : '',
        commentaireManager: cm.manager || '',
        commentaireCollaborateur: cm.collaborateur || '',
        propositionEnAttente: pendingLabel
      });
    });
  });
  return rows;
}

function buildHtmlTable(rows) {
  let html = `<table style="border-collapse:collapse;font-family:Arial,sans-serif;font-size:11pt">
    <tr>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:left">Domaine</th>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:left">Compétence</th>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:center">Niveau actuel</th>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:center">Niveau cible</th>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:left">Commentaires</th>
    </tr>`;
  rows.forEach(r => {
    const commentaire = [
      r.commentaireManager       ? `Manager : ${r.commentaireManager}` : '',
      r.commentaireCollaborateur ? `Collaborateur : ${r.commentaireCollaborateur}` : '',
      r.propositionEnAttente ? `En attente : ${r.propositionEnAttente}` : ''
    ].filter(Boolean).join(' — ');
    html += `<tr>
      <td style="border:1px solid #999;padding:5px 8px">${escapeHtml(r.domaine)}</td>
      <td style="border:1px solid #999;padding:5px 8px">${escapeHtml(r.competence)}</td>
      <td style="border:1px solid #999;padding:5px 8px;text-align:center">${r.niveau !== '' ? r.niveau : '—'}</td>
      <td style="border:1px solid #999;padding:5px 8px;text-align:center">${r.cible !== '' ? r.cible : '—'}</td>
      <td style="border:1px solid #999;padding:5px 8px">${escapeHtml(commentaire)}</td>
    </tr>`;
  });
  html += `</table>`;
  return html;
}

function buildPlainText(rows) {
  const lines = [['Domaine','Compétence','Niveau actuel','Niveau cible','Commentaires'].join('\t')];
  rows.forEach(r => {
    const commentaire = [
      r.commentaireManager       ? `Manager : ${r.commentaireManager}` : '',
      r.commentaireCollaborateur ? `Collaborateur : ${r.commentaireCollaborateur}` : '',
      r.propositionEnAttente ? `En attente : ${r.propositionEnAttente}` : ''
    ].filter(Boolean).join(' — ');
    lines.push([r.domaine, r.competence, r.niveau!==''?r.niveau:'—', r.cible!==''?r.cible:'—', commentaire].join('\t'));
  });
  return lines.join('\n');
}

// Copie un tableau HTML dans le presse-papier (collable directement dans Word)
function copyCollabTable() {
  const rows = getCollabExportRows();
  if (!rows.length) { alert('Aucune compétence à exporter pour ce collaborateur.'); return; }
  const html = buildHtmlTable(rows);
  const text = buildPlainText(rows);

  if (navigator.clipboard && window.ClipboardItem) {
    try {
      const item = new ClipboardItem({
        'text/html':  new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([text], { type: 'text/plain' })
      });
      navigator.clipboard.write([item]).then(
        () => flashMessage('Tableau copié ✓ — collez-le dans Word (Ctrl+V)'),
        () => fallbackCopy(html)
      );
      return;
    } catch (e) {
      fallbackCopy(html);
      return;
    }
  }
  fallbackCopy(html);
}

// Méthode de repli pour copier le tableau HTML (navigateurs sans Clipboard API moderne)
function fallbackCopy(html) {
  const div = document.createElement('div');
  div.contentEditable = 'true';
  div.style.position = 'fixed';
  div.style.left = '-9999px';
  div.innerHTML = html;
  document.body.appendChild(div);
  const range = document.createRange();
  range.selectNodeContents(div);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try {
    document.execCommand('copy');
    flashMessage('Tableau copié ✓ — collez-le dans Word (Ctrl+V)');
  } catch (e) {
    alert('La copie automatique a échoué. Sélectionnez manuellement le tableau et utilisez Ctrl+C.');
  } finally {
    sel.removeAllRanges();
    document.body.removeChild(div);
  }
}

// Export Excel des compétences d'un seul collaborateur

  const c = collabEdit;
  const rows = getCollabExportRows();
  if (!rows.length) { alert('Aucune compétence à exporter pour ce collaborateur.'); return; }
  try {
    const headers = ['Domaine','Compétence','Niveau actuel','Description niveau actuel','Niveau cible','Description niveau cible','Commentaire manager','Commentaire collaborateur','Proposition en attente'];
    const data = rows.map(r => [r.domaine, r.competence, r.niveau, r.niveauLabel, r.cible, r.cibleLabel, r.commentaireManager, r.commentaireCollaborateur, r.propositionEnAttente || '']);
    const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
    ws['!cols'] = [{wch:16},{wch:42},{wch:12},{wch:42},{wch:10},{wch:42},{wch:32},{wch:32},{wch:42}];
    const wb = XLSX.utils.book_new();
    let sheetName = `${c.prenom||''} ${c.Nom||''}`.trim() || 'Collaborateur';
    sheetName = sheetName.replace(/[\\/?*[\]:]/g, '').slice(0, 31) || 'Collaborateur';
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    const safeName = `${c.prenom||''}_${c.Nom||''}`.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9_-]+/g, '_');
    XLSX.writeFile(wb, `competences_${safeName}.xlsx`);
  } catch(e) {
    alert('Erreur lors de l\'export : ' + e.message);
    console.error(e);
  }
}

function maybeClose(e) { if (e.target === document.getElementById('modal')) closeModal(); }
function closeModal()  { document.getElementById('modal').style.display = 'none'; }

// =====================================================================
// RECHERCHE PAR COMPÉTENCE
// =====================================================================
function renderSearchSkills() {
  const grouped = {};
  SKILLS.forEach(s => { if (!grouped[s.did]) grouped[s.did] = []; grouped[s.did].push(s); });
  const scopedCollabs = getSearchSkillCollabs();

  let h = `
    ${levelLegendHtml()}
    <div class="filters">
      <div class="search-box" style="width:100%;max-width:400px">
        <i class="ti ti-search" style="color:#aaa"></i>
        <input type="text" id="skill-search-input" placeholder="Rechercher une compétence…"
          value="${escapeHtml(searchSkillQuery)}" oninput="filterSkillSearch(this.value)" style="width:100%">
      </div>
      <select onchange="searchSkillTeam=this.value;renderSearchSkills()">
        <option value="">Toutes les équipes accessibles</option>
        ${db.equipes.map(t => `<option value="${t.id}"${searchSkillTeam===String(t.id)?' selected':''}>${escapeHtml(t.name)}</option>`).join('')}
      </select>
      <span class="stat-pill">${scopedCollabs.length} personne(s)</span>
    </div>
    <div id="skill-search-results"></div>
    <div id="skill-search-all">`;

  getSortedDomains().forEach(dom => {
    const list = grouped[dom.id] || [];
    if (!list.length) return;
    h += `<div class="admin-card" style="margin-bottom:14px">
      <div style="padding:8px 16px;font-size:11px;font-weight:600;text-transform:uppercase;
        letter-spacing:.05em;background:${dom.bg};color:${dom.c};border-radius:8px 8px 0 0">${dom.name}</div>
      <table class="adm"><thead>
        <tr><th>Compétence</th><th style="text-align:center">Niveau 1</th><th style="text-align:center">Niveau 2</th>
        <th style="text-align:center">Niveau 3</th><th style="text-align:center">Niveau 4</th><th style="text-align:center">Total</th></tr>
      </thead><tbody>`;
    list.forEach(sk => {
      const stats = getSkillStats(sk.id, scopedCollabs);
      const total = Object.values(stats).flat().length;
      h += `<tr style="cursor:pointer" onclick="showSkillDetail('${sk.id}')" title="Cliquer pour voir les personnes">
        <td style="font-weight:500">${escapeHtml(sk.name)}</td>
        ${[1,2,3,4].map(n => `
          <td style="text-align:center">
            ${stats[n].length > 0
              ? `<span class="lb l${n} level-count" style="cursor:pointer">${stats[n].length}</span>`
              : '<span style="color:#ccc">—</span>'}
          </td>`).join('')}
        <td style="text-align:center"><span class="stat-pill">${total}</span></td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  });

  h += `</div>`;
  document.getElementById('content').innerHTML = h;
  if (searchSkillQuery.trim()) filterSkillSearch(searchSkillQuery);
}

function filterSkillSearch(query = searchSkillQuery) {
  searchSkillQuery = query;
  const resultsEl = document.getElementById('skill-search-results');
  const allEl = document.getElementById('skill-search-all');
  if (!resultsEl || !allEl) return;
  const clean = (query || '').trim();
  if (!clean) {
    resultsEl.innerHTML = '';
    allEl.style.display = '';
    return;
  }
  allEl.style.display = 'none';
  const matches = SKILLS.filter(s => s.name.toLowerCase().includes(clean.toLowerCase()));
  if (!matches.length) {
    resultsEl.innerHTML = `<p style="color:#aaa;font-size:13px">Aucune compétence trouvée.</p>`;
    return;
  }
  const scopedCollabs = getSearchSkillCollabs();
  let h = `<div class="admin-card">
    <table class="adm"><thead>
      <tr><th>Compétence</th><th style="text-align:center">Niveau 1</th><th style="text-align:center">Niveau 2</th>
      <th style="text-align:center">Niveau 3</th><th style="text-align:center">Niveau 4</th><th style="text-align:center">Total</th></tr>
    </thead><tbody>`;
  matches.forEach(sk => {
    const stats = getSkillStats(sk.id, scopedCollabs);
    const total = Object.values(stats).flat().length;
    h += `<tr style="cursor:pointer" onclick="showSkillDetail('${sk.id}')" title="Cliquer pour voir les personnes">
      <td style="font-weight:500">${escapeHtml(sk.name)}</td>
      ${[1,2,3,4].map(n => `
        <td style="text-align:center">
          ${stats[n].length > 0
            ? `<span class="lb l${n} level-count" style="cursor:pointer">${stats[n].length}</span>`
            : '<span style="color:#ccc">—</span>'}
        </td>`).join('')}
      <td style="text-align:center"><span class="stat-pill">${total}</span></td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  resultsEl.innerHTML = h;
}

function showSkillDetail(skillId) {
  const sk = SKILLS.find(s => s.id === skillId);
  if (!sk) return;
  const dom = DOMAINS.find(d => d.id === sk.did);
  const scopedCollabs = getSearchSkillCollabs();
  const byLevel = getSkillStats(skillId, scopedCollabs);
  const total = Object.values(byLevel).flat().length;
  const team = searchSkillTeam ? teamById(searchSkillTeam) : null;
  document.getElementById('m-av').innerHTML = `<i class="ti ti-award" style="font-size:20px"></i>`;
  document.getElementById('m-title').textContent = sk.name;
  document.getElementById('m-sub').textContent = `${dom ? dom.name : ''} · ${team ? team.name + ' · ' : ''}${total} personne(s)`;
  let body = levelLegendHtml();
  [4,3,2,1].forEach(n => {
    if (!byLevel[n].length) return;
    body += `<div style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span class="lb l${n}" style="width:20px;height:20px;font-size:11px">${n}</span>
        <span style="font-size:12px;font-weight:600;color:#5F5E5A">${sk.levels && sk.levels[n] ? escapeHtml(sk.levels[n]) : 'Niveau '+n}</span>
        <span class="stat-pill">${byLevel[n].length}</span>
      </div>`;
    byLevel[n].forEach(c => {
      const p = posteById(c.PosteId);
      const teams = (c.teamIds||[]).map(tid => { const t = teamById(tid); return t ? `<span class="team-tag">${escapeHtml(t.name)}</span>` : ''; }).join('');
      body += `<div style="display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:6px;background:#f5f5f0;margin-bottom:4px">
        <div style="flex:1">
          <div style="font-weight:500;font-size:13px">${escapeHtml((c.prenom||'') + ' ' + (c.Nom||''))}</div>
          <div style="font-size:11px;color:#5F5E5A">${p ? escapeHtml(p.name) : '—'}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">${teams}</div>
        </div>
      </div>`;
    });
    body += `</div>`;
  });
  if (!total) body += `<p style="color:#aaa;font-size:13px">Personne n'a encore cette compétence dans le périmètre sélectionné.</p>`;
  document.getElementById('m-body').innerHTML = body;
  document.getElementById('m-footer').innerHTML = `<button class="btn" onclick="closeModal()">Fermer</button>`;
  document.getElementById('modal').style.display = 'flex';
}

function renderAdminRoles() {
  if (!ensureStrictAdminAccess()) return;
  const rolesDef = [
    { name: 'admin',         label: 'Administrateur', icon: 'ti-shield-lock',  desc: 'Accès complet + paramètres' },
    { name: 'directeur',     label: 'Directeur',      icon: 'ti-crown',        desc: 'Toutes les fiches en lecture' },
    { name: 'manager',       label: 'Manager',        icon: 'ti-user-star',    desc: 'Fiches de son équipe + validation' },
    { name: 'collaborateur', label: 'Collaborateur',  icon: 'ti-user',         desc: 'Sa propre fiche uniquement' }
  ];
  let h = `<div class="admin-card"><div class="admin-hdr"><h3>Rôles utilisateurs</h3>
    <span style="font-size:12px;color:#5F5E5A">Cliquez sur Gérer pour modifier les droits ou ajouter des profils personnalisés</span>
  </div>`;
  rolesDef.forEach(rd => {
    const dbRole = db.roles.find(r => r.name === rd.name);
    const emails = dbRole ? dbRole.emails.join(', ') : '';
    const droits = getDroitsForRole(rd.name);
    const droitsActifs = Object.entries(DROITS_LABELS)
      .filter(([k]) => droits[k])
      .map(([,v]) => `<span style="background:#EEEDFE;color:#534AB7;border-radius:4px;padding:1px 6px;font-size:10px;margin:2px;display:inline-block">${v}</span>`)
      .join('');
    h += `<div style="padding:16px;border-bottom:.5px solid #D3D1C7">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <i class="ti ${rd.icon}" style="font-size:18px;color:#534AB7"></i>
        <div style="flex:1">
          <div style="font-weight:600">${rd.label}</div>
          <div style="font-size:12px;color:#5F5E5A">${rd.desc}</div>
        </div>
        <button class="btn btn-sm" onclick="openRoleModal('${rd.name}')">
          <i class="ti ti-edit"></i> Gérer
        </button>
      </div>
      <div style="margin-bottom:6px">${droitsActifs || '<span style="color:#aaa;font-size:11px">Aucun droit actif</span>'}</div>
      <div style="font-size:12px;color:#5F5E5A">
        ${emails ? `<b>Utilisateurs :</b> ${emails}` : '<i>Aucun utilisateur assigné</i>'}
      </div>
    </div>`;
  });
  h += `</div>`;
  document.getElementById('content').innerHTML = h;
}

function openRoleModal(roleName) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux administrateurs.'); return; }
  const labels = { admin:'Administrateur', directeur:'Directeur', manager:'Manager', collaborateur:'Collaborateur' };
  const dbRole = db.roles.find(r => r.name === roleName);
  const emails = dbRole ? dbRole.emails.join('\n') : '';
  const droits = getDroitsForRole(roleName);

  const droitsHtml = Object.entries(DROITS_LABELS).map(([key, label]) => {
    const adminOnly = ADMIN_ONLY_DROITS.includes(key);
    const locked = adminOnly;
    const checked = roleName === 'admin' && adminOnly ? true : !!droits[key];
    const note = adminOnly
      ? (roleName === 'admin' ? ' — réservé administrateur' : ' — indisponible pour ce rôle')
      : '';
    return `
    <label style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid #f0efe8;font-size:13px;${locked?'color:#aaa;':''}">
      <input type="checkbox" id="droit-${key}" ${checked ? 'checked' : ''} ${locked ? 'disabled' : ''}
        style="width:15px;height:15px;cursor:${locked?'not-allowed':'pointer'};flex-shrink:0">
      <span>${label}<span style="font-size:11px;color:#aaa">${note}</span></span>
    </label>`;
  }).join('');

  document.getElementById('m-av').innerHTML = '<i class="ti ti-shield" style="font-size:20px"></i>';
  document.getElementById('m-title').textContent = labels[roleName] || roleName;
  document.getElementById('m-sub').textContent = 'Configurer les droits et les utilisateurs';
  document.getElementById('m-body').innerHTML = `
    <div style="font-size:12px;font-weight:600;color:#5F5E5A;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Droits</div>
    <div style="margin-bottom:18px">${droitsHtml}</div>
    <div style="font-size:12px;font-weight:600;color:#5F5E5A;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">Utilisateurs (une adresse par ligne)</div>
    <textarea id="role-emails" style="width:100%;height:120px;font-size:13px;
      border:.5px solid #D3D1C7;border-radius:8px;padding:10px;resize:vertical"
      placeholder="prenom.nom@evea-conseil.com">${emails}</textarea>
    <div style="font-size:11px;color:#aaa;margin-top:4px">
      Les adresses doivent correspondre aux comptes Microsoft utilisés pour la connexion.
    </div>`;
  document.getElementById('m-footer').innerHTML = `
    <button class="btn" onclick="closeModal()">Annuler</button>
    <button class="btn btn-primary" onclick="saveRole('${roleName}')"><i class="ti ti-check"></i>Enregistrer</button>`;
  document.getElementById('modal').style.display = 'flex';
}

async function saveRole(roleName) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux administrateurs.'); return; }
  const emails = document.getElementById('role-emails').value
    .split('\n').map(e => e.trim().toLowerCase()).filter(Boolean).join(',');
  const droits = {};
  Object.keys(DROITS_LABELS).forEach(key => {
    droits[key] = document.getElementById('droit-' + key)?.checked || false;
  });
  const droitsSanitized = sanitizeDroitsForRole(roleName, droits);
  showSave();
  try {
    const dbRole = db.roles.find(r => r.name === roleName);
    const data = { Emails: emails, Droits: JSON.stringify(droitsSanitized) };
    if (dbRole) {
      await spPatch(CONFIG.lists.roles, dbRole.spId, data);
    } else {
      await spPost(CONFIG.lists.roles, { Title: roleName, ...data });
    }
    await loadData();
    closeModal();
    renderAdminRoles();
    hideSave('Rôle enregistré ✓');
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}

async function logout() {
  await msalInstance.logoutRedirect();
}

// =====================================================================
// INIT
// =====================================================================
async function init() {
  document.getElementById('loading').style.display = 'flex';
  try {
    await msalInstance.handleRedirectPromise();
    let account = msalInstance.getAllAccounts()[0];
    if (!account) {
    await msalInstance.loginRedirect({ scopes: SCOPES_GRAPH });  // ← Graph pour le login
    return;
}
const tokenGraph = await msalInstance.acquireTokenSilent({ scopes: SCOPES_GRAPH, account });
const meResp     = await fetch('https://graph.microsoft.com/v1.0/me', {
    headers: { Authorization: `Bearer ${tokenGraph.accessToken}` }  // ← token Graph pour /me
});
    if (!meResp.ok) throw new Error('Impossible de récupérer le profil Microsoft');
    const me = await meResp.json();

    // Chargement des données SharePoint
    await loadData();

    // Définition du rôle
    const email = me.mail || me.userPrincipalName || '';
    const realCollab = db.collaborateurs.find(c => (c.Email||'').toLowerCase() === email.toLowerCase());
    realUser = { email, name: me.displayName || email, role: getUserRole(email), collabId: realCollab ? String(realCollab.Id) : '', impersonated:false };
    currentUser = { ...realUser };

    const savedImpersonatedId = sessionStorage.getItem('evea_impersonated_collab_id');
    if (savedImpersonatedId && isRealAdmin()) {
      const simulated = db.collaborateurs.find(c => String(c.Id) === String(savedImpersonatedId));
      if (simulated) currentUser = makeUserFromCollab(simulated, true);
      else sessionStorage.removeItem('evea_impersonated_collab_id');
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    buildSidebar();
    showView(canAccessView('matrix') ? 'matrix' : getDefaultViewForCurrentUser());
  } catch (e) {
    document.getElementById('loading-msg').textContent = 'Erreur : ' + e.message;
    console.error(e);
  }
}

init();
