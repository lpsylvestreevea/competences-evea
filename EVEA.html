function openCollabModal(id, focusSkill) {
  const me = getCurrentCollab();
  const meId = String(me?.Id || '');
  const isMine = id && String(id) === meId;
  const isInMyScope = !isMine && getVisibleCollabs().some(c => String(c.Id) === String(id));

  // Vérification des droits d'accès
  if (id && !isMine && !isInMyScope) return;

  const c = id ? db.collaborateurs.find(x => String(x.Id) === String(id)) : null;
  collabEdit = c ? JSON.parse(JSON.stringify(c)) : { Id:null, prenom:'', Nom:'', Email:'', PosteId:'', PosteIds:'', FonctionsPonderation:'', fonctionIds:[], fonctionWeights:{}, teamIds:[], ManagerID:'' };
  ensureCollabFunctionState();
  collabEdit._comps    = id ? getCollabComps(id) : {};
  collabEdit._comments = id ? getCollabComments(id) : {};
  collabEdit._history  = id ? getCollabHistory(id) : [];
  collabEdit._lastUpdate = id ? getCollabLastUpdate(id) : { text:'', spId:null, ts:0 };
  collabEdit._changes  = {};

  document.getElementById('m-av').textContent = (collabEdit.prenom||'?')[0] + (collabEdit.Nom||'?')[0];
  document.getElementById('m-title').textContent = id ? `${collabEdit.prenom} ${collabEdit.Nom||''}` : 'Nouveau collaborateur';
  document.getElementById('m-sub').textContent = collabFunctionLabel(collabEdit, true);
  renderCollabBody(focusSkill);

  // Droits d'édition selon le contexte
  const canEdit = canSaveCollab(id || null);

  const departureBtn = id ? `<button class="btn btn-sm" style="margin-right:auto" onclick="openDepartureSimulation('${id}')"><i class="ti ti-door-exit"></i>Simuler le départ</button>` : '';
  const deleteBtn = id && hasStrictAdminAccess() ? `<button class="btn btn-danger btn-sm" onclick="deleteCollab('${id}')"><i class="ti ti-trash"></i>Supprimer</button>` : '';
  document.getElementById('m-footer').innerHTML = `
    ${departureBtn}${deleteBtn}
    <button class="btn" onclick="closeModal()">Fermer</button>
    ${canEdit ? `<button class="btn btn-primary" onclick="saveCollab('${id||''}')"><i class="ti ti-check"></i>Enregistrer</button>` : ''}`;
  document.getElementById('modal').style.display = 'flex';
  if (focusSkill) setTimeout(() => document.querySelector('[data-focus]')?.scrollIntoView({block:'center',behavior:'smooth'}), 80);
}
  
function pendingLevelLabel(pending) {
  if (!pending) return '';
  return pending.niveau > 0 ? `niveau ${pending.niveau}` : 'retrait de la compétence';
}

function ensureCollabFunctionState() {
  collabEdit.fonctionIds = getCollabFunctionIds(collabEdit);
  if (!collabEdit.fonctionIds.length && collabEdit.PosteId) collabEdit.fonctionIds = [String(collabEdit.PosteId)];
  collabEdit.fonctionWeights = normalizeCollabFunctionWeights(collabEdit.fonctionWeights || collabEdit.FonctionsPonderation || {}, collabEdit.fonctionIds);
  collabEdit.PosteId = collabEdit.fonctionIds[0] || '';
}
function totalCollabFunctionWeight() {
  ensureCollabFunctionState();
  return collabEdit.fonctionIds.reduce((sum,id) => sum + (Number(collabEdit.fonctionWeights[id]) || 0), 0);
}
function setCollabFunction(index, posteId) {
  ensureCollabFunctionState();
  const clean = String(posteId || '');
  if (clean && collabEdit.fonctionIds.some((id,i) => i !== index && String(id) === clean)) {
    alert('Cette fonction est déjà associée à la fiche.');
    renderCollabBody();
    return;
  }
  collabEdit.fonctionIds[index] = clean;
  collabEdit.fonctionIds = collabEdit.fonctionIds.filter(Boolean);
  collabEdit.fonctionWeights = normalizeCollabFunctionWeights(collabEdit.fonctionWeights, collabEdit.fonctionIds);
  collabEdit.PosteId = collabEdit.fonctionIds[0] || '';
  collabEdit._projectionPosteId = '';
  renderCollabBody();
}
function setCollabFunctionWeight(index, value) {
  ensureCollabFunctionState();
  const id = collabEdit.fonctionIds[index];
  if (!id) return;
  const n = Math.max(0, Math.min(100, parseFloat(value) || 0));
  collabEdit.fonctionWeights[id] = n;
  renderCollabFunctionWeightSummary();
}
function renderCollabFunctionWeightSummary() {
  const el = document.getElementById('function-weight-summary');
  if (!el) return;
  const total = totalCollabFunctionWeight();
  el.className = 'function-weight-summary' + (Math.round(total) === 100 ? '' : ' warn');
  el.innerHTML = Math.round(total) === 100
    ? 'Pondération totale : 100%.'
    : `Pondération totale : ${Math.round(total)}%. Le calcul de progression sera normalisé sur ce total.`;
}
function addCollabFunction() {
  ensureCollabFunctionState();
  const used = new Set(collabEdit.fonctionIds.map(String));
  const next = POSTES.find(p => !used.has(String(p.id)));
  if (!next) return alert('Toutes les fonctions sont déjà associées.');
  collabEdit.fonctionIds.push(String(next.id));
  collabEdit.fonctionWeights[String(next.id)] = collabEdit.fonctionIds.length === 1 ? 100 : 0;
  collabEdit.PosteId = collabEdit.fonctionIds[0] || '';
  renderCollabBody();
}
function removeCollabFunction(index) {
  ensureCollabFunctionState();
  const id = collabEdit.fonctionIds[index];
  collabEdit.fonctionIds.splice(index, 1);
  if (id) delete collabEdit.fonctionWeights[id];
  collabEdit.PosteId = collabEdit.fonctionIds[0] || '';
  collabEdit._projectionPosteId = '';
  renderCollabBody();
}
function rebalanceCollabFunctionWeights() {
  ensureCollabFunctionState();
  const ids = collabEdit.fonctionIds;
  if (!ids.length) return;
  const base = Math.floor(100 / ids.length);
  let remaining = 100;
  ids.forEach((id, i) => {
    const val = i === ids.length - 1 ? remaining : base;
    collabEdit.fonctionWeights[id] = val;
    remaining -= val;
  });
  renderCollabBody();
}
function collabFunctionsEditorHtml(c, canHeader) {
  ensureCollabFunctionState();
  const ids = collabEdit.fonctionIds;
  if (!canHeader) {
    const funcs = getCollabFunctions(collabEdit).filter(f => f.poste);
    return funcs.length
      ? `<div style="display:flex;gap:5px;flex-wrap:wrap">${funcs.map(f => `<span class="formation-chip"><i class="ti ti-briefcase"></i>${escapeHtml(f.poste.name)}${funcs.length>1 ? ' · '+(Number(f.weight)||0)+'%' : ''}</span>`).join('')}</div>`
      : `<span style="font-size:12px;color:#aaa">Aucune fonction renseignée</span>`;
  }
  const rows = (ids.length ? ids : ['']).map((id, i) => `<div class="function-weight-row">
    <select onchange="setCollabFunction(${i},this.value)">
      <option value="">— Sélectionner —</option>
      ${POSTES.map(p => `<option value="${p.id}"${String(id)===String(p.id)?' selected':''}>${escapeHtml(p.name)}</option>`).join('')}
    </select>
    <input type="number" min="0" max="100" step="1" value="${Number(collabEdit.fonctionWeights[id] ?? (ids.length===1?100:0)) || 0}" oninput="setCollabFunctionWeight(${i},this.value)" title="Poids de cette fonction dans le calcul de progression">
    <button type="button" class="btn btn-sm btn-danger" onclick="removeCollabFunction(${i})" ${ids.length<=1?'disabled':''} title="Retirer cette fonction"><i class="ti ti-trash"></i></button>
  </div>`).join('');
  return `${rows}
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
      <button type="button" class="btn btn-sm" onclick="addCollabFunction()"><i class="ti ti-plus"></i>Ajouter une fonction</button>
      <button type="button" class="btn btn-sm" onclick="rebalanceCollabFunctionWeights()"><i class="ti ti-percentage"></i>Répartir à 100%</button>
    </div>
    <div id="function-weight-summary" class="function-weight-summary"></div>`;
}

function renderSkillRow(sk, c, poste, focusSkill, isExtra, displayPosteId) {
  const lvl    = c._comps[sk.id] || 0;
  const target = poste.targets[sk.id];
  const targetSources = (poste._allBySkill && poste._allBySkill[sk.id]) || [];
  const isFocus = sk.id === focusSkill;
  const cm     = c._comments[sk.id] || {};
  const pending = cm.pending || null;
  const hasCm  = cm.manager || cm.collaborateur || pending;
  const posteIdForDesc = displayPosteId || (poste._sourceBySkill && poste._sourceBySkill[sk.id]) || getPrimaryPosteId(c);
  const canDirectLevelEdit = canEditCompetencesForCollab(c.Id);
  const canSuggestLevel = canSuggestCompetencesForCollab(c.Id);
  const canValidateLevel = pending && canValidateCompetencesForCollab(c.Id);
  const canEditMgrComment = canEditManagerCommentForCollab(c.Id);
  const canEditColComment = canEditCollaborateurCommentForCollab(c.Id);
  const pendingLevel = pending ? Number(pending.niveau || 0) : null;
  const devOptions = getDevelopmentOptionsForSkill(sk.id, lvl, target);
  const targetArg = target != null ? Number(target) : 'null';
  const devBtn = devOptions.length ? `<button class="cm-btn dev-btn has" title="Formations et moyens pour progresser" onclick="openSkillDevelopmentModal('${sk.id}',${Number(lvl)||0},${targetArg})"><i class="ti ti-school"></i><span class="dev-count">${devOptions.length}</span></button>` : '';
  const btnAction = n => {
    if (canDirectLevelEdit) return `setLvl('${sk.id}',${n})`;
    if (canSuggestLevel) return `requestLevelSuggestion('${sk.id}',${n})`;
    if (canValidateLevel && pendingLevel === Number(n)) return `toggleValidationActions('${sk.id}')`;
    return '';
  };
  const removeAction = btnAction(0);
  const pendingBox = pending ? `<div class="validation-box${isFocus?' open':''}" id="vp-${sk.id}" ${canValidateLevel ? `onclick="toggleValidationActions('${sk.id}')"` : ''}>
    <div class="validation-title"><i class="ti ti-clock-hour-4"></i> Proposition en attente : ${pendingLevelLabel(pending)}</div>
    <div>Ancien niveau officiel : ${pending.ancienNiveau ? 'niveau ' + pending.ancienNiveau : '—'}${pending.auteur ? ` · proposé par ${escapeHtml(pending.auteur)}` : ''}${pending.ts ? ` · ${fmtDate(pending.ts)}` : ''}</div>
    ${pending.commentaire ? `<div class="validation-comment"><b>Justification collaborateur :</b><br>${escapeHtml(pending.commentaire)}</div>` : ''}
    ${canValidateLevel ? `<div style="font-size:11px;color:#7A3A28;margin-top:6px">Cliquez sur la demande ou sur le niveau pointillé pour afficher les options.</div>
      <div class="validation-actions">
        <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();reviewPendingValidation('${sk.id}',true)"><i class="ti ti-check"></i>Valider</button>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();reviewPendingValidation('${sk.id}',false)"><i class="ti ti-x"></i>Refuser</button>
      </div>` : ''}
    ${canSuggestLevel ? `<div class="validation-actions" style="display:flex"><button class="btn btn-sm" onclick="event.stopPropagation();cancelPendingValidation('${sk.id}')"><i class="ti ti-trash"></i>Annuler ma proposition</button></div>` : ''}
  </div>` : '';
  return `<div class="crow"${isFocus?' data-focus="1"':''} ${isExtra?'style="opacity:0.75;border-left:2px dashed #D3D1C7;padding-left:6px"':''}>
    <div class="crow-main"${isFocus?' style="background:#EEEDFE;border-radius:8px;margin:0 -6px;padding:6px"':''}>
      <span class="crow-name twrap">${escapeHtml(sk.name)}
        ${isExtra ? '<span style="font-size:10px;color:#aaa;margin-left:4px">(hors fonction)</span>' : ''}
        ${target!=null?` <span class="tt-tag" title="${escapeHtml(targetSources.map(t => t.posteName + ' : niveau ' + t.niveau).join('\n'))}">cible:${target}</span>`:''}
        ${strategyTagsHtml(sk.id)}
        ${pending ? ` <span class="tt-tag" style="border:.5px dashed #A32D2D;color:#7A3A28;background:#fffaf5">en attente:${pendingLevelLabel(pending)}</span>` : ''}
        ${skillTT(sk,'tup',posteIdForDesc)}
      </span>
      <div class="lp">
        <button class="lvl-btn${pendingLevel===0?' pending-lvl pending-lvl-0':''}" ${removeAction ? `onclick="${removeAction}"` : 'disabled'}><i class="ti ti-x" style="font-size:11px"></i></button>
        ${[1,2,3,4].map(n => {
          const classes = ['lvl-btn'];
          if (lvl === n) classes.push('a' + n);
          if (target != null && Number(target) === n) classes.push('target-lvl', 'target-lvl-' + n);
          if (pendingLevel === n) classes.push('pending-lvl', 'pending-lvl-' + n);
          const action = btnAction(n);
          return `<button class="${classes.join(' ')}" ${action ? `onclick="${action}"` : 'disabled'}><span class="twrap">${n}${levelTT(sk,n,'tup',posteIdForDesc)}</span></button>`;
        }).join('')}
      </div>
      ${devBtn}
      <button class="cm-btn${hasCm?' has':''}" onclick="toggleCm('${sk.id}')"><i class="ti ti-message"></i></button>
    </div>
    ${pendingBox}
    <div class="cm-panel" id="cp-${sk.id}">
      ${hasDroit('equipe_validation') || hasStrictAdminAccess() ? `<div class="cm-block">
        <div class="cm-lbl mgr"><i class="ti ti-shield-check"></i> Manager</div>
        ${cm.manager ? `<div class="cm-meta">${fmtDate(cm.managerTs||0)}</div>
          <textarea class="cm-input" id="cm-mgr-${sk.id}" placeholder="Modifier le commentaire…"${canEditMgrComment ? '' : ' disabled'}>${escapeHtml(cm.manager)}</textarea>`
          : `<textarea class="cm-input" id="cm-mgr-${sk.id}" placeholder="Ajouter un commentaire manager…"${canEditMgrComment ? '' : ' disabled'}></textarea>`}
      </div>` : ''}
      <div class="cm-block">
        <div class="cm-lbl col"><i class="ti ti-user"></i> Collaborateur</div>
        ${cm.collaborateur ? `<div class="cm-meta">${fmtDate(cm.collaborateurTs||0)}</div>
          <textarea class="cm-input" id="cm-col-${sk.id}" placeholder="Modifier le commentaire…"${canEditColComment ? '' : ' disabled'}>${escapeHtml(cm.collaborateur)}</textarea>`
          : `<textarea class="cm-input" id="cm-col-${sk.id}" placeholder="Ajouter un commentaire collaborateur…"${canEditColComment ? '' : ' disabled'}></textarea>`}
      </div>
    </div>
  </div>`;
}

function openDepartureSimulation(collabId) {
  const c = db.collaborateurs.find(x => String(x.Id) === String(collabId));
  if (!c || !getVisibleCollabs().some(x => String(x.Id) === String(collabId))) return;
  const comps = Object.entries(getCollabComps(collabId)).filter(([,lvl]) => Number(lvl) > 0);
  const rows = comps.map(([sid, lvl]) => {
    const sk = skillById(sid);
    const holdersAtLeast = db.collaborateurs.filter(other => String(other.Id) !== String(collabId) && (getCollabComps(other.Id)[sid] || 0) >= Number(lvl));
    const holdersExact = db.collaborateurs.filter(other => String(other.Id) !== String(collabId) && Number(getCollabComps(other.Id)[sid] || 0) === Number(lvl));
    return { sid, lvl:Number(lvl), sk, holdersAtLeast, holdersExact };
  }).sort((a,b) => a.holdersAtLeast.length - b.holdersAtLeast.length || b.lvl - a.lvl || nameCompareFr(a.sk?.name || a.sid, b.sk?.name || b.sid));
  document.getElementById('m-av').innerHTML = '<i class="ti ti-door-exit" style="font-size:20px"></i>';
  document.getElementById('m-title').textContent = `Simulation de départ — ${getCollabDisplayName(c)}`;
  document.getElementById('m-sub').textContent = `${rows.length} compétence(s) détenue(s)`;
  let body = `<div class="projection-note"><i class="ti ti-info-circle"></i> Lecture : “couverture” compte les personnes qui ont la même compétence au même niveau ou à un niveau supérieur. Les lignes rouges signalent une compétence sans relais identifié.</div>`;
  if (!rows.length) {
    body += `<div class="empty"><i class="ti ti-award"></i>Aucune compétence renseignée pour cette personne.</div>`;
  }
  rows.forEach(r => {
    const riskClass = r.holdersAtLeast.length === 0 ? ' critical' : (r.holdersAtLeast.length <= 2 ? ' watch' : '');
    const dom = r.sk ? getSortedDomains().find(d => d.id === r.sk.did) : null;
    const people = r.holdersAtLeast.slice(0, 12).map(o => {
      const lvlOther = getCollabComps(o.Id)[r.sid] || 0;
      const teams = (o.teamIds||[]).map(tid => teamById(tid)).filter(Boolean).map(t => t.name).join(', ');
      return `<button class="formation-chip" style="cursor:pointer;font-family:inherit" onclick="openCollabModal('${o.Id}','${r.sid}')"><span>${escapeHtml(getCollabDisplayName(o))}</span><span class="ldot l${lvlOther}" style="width:16px;height:16px;font-size:9px">${lvlOther}</span>${teams ? `<span style="color:#888">${escapeHtml(teams)}</span>` : ''}</button>`;
    }).join('');
    body += `<div class="departure-row${riskClass}">
      <div class="departure-title">
        <div>${escapeHtml(r.sk ? r.sk.name : r.sid)}${dom ? `<div style="font-size:11px;color:#aaa;font-weight:400">${escapeHtml(dom.name)}</div>` : ''}</div>
        <span class="lb l${r.lvl}" style="width:24px;height:24px;font-size:12px;flex-shrink:0">${r.lvl}</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;font-size:12px;color:#5F5E5A">
        <span class="stat-pill">${r.holdersAtLeast.length} couverture(s) niveau ≥ ${r.lvl}</span>
        <span class="stat-pill">${r.holdersExact.length} au niveau exact</span>
        ${r.holdersAtLeast.length === 0 ? '<span class="formation-chip warn">Critique : aucun relais</span>' : r.holdersAtLeast.length <= 2 ? '<span class="formation-chip warn">À surveiller</span>' : ''}
      </div>
      <div class="departure-people">${people || '<span style="font-size:12px;color:#aaa">Aucune autre personne identifiée.</span>'}</div>
    </div>`;
  });
  document.getElementById('m-body').innerHTML = body;
  document.getElementById('m-footer').innerHTML = `<button class="btn" onclick="openCollabModal('${c.Id}')"><i class="ti ti-arrow-back-up"></i>Retour à la fiche</button><button class="btn btn-primary" onclick="closeModal()">Fermer</button>`;
  document.getElementById('modal').style.display = 'flex';
}

function setLvl(sid, lvl) {
  if (!canEditCompetencesForCollab(collabEdit.Id)) return;
  const old = collabEdit._comps[sid] || 0;
  if (lvl === 0) delete collabEdit._comps[sid]; else collabEdit._comps[sid] = lvl;
  if (old !== lvl) {
    collabEdit._changes[sid] = { old, new: lvl };
  }
  const displayPosteId = collabEdit._projectionPosteId || '';
  const poste  = displayPosteId ? buildVirtualPosteForFunctionIds([displayPosteId]) : buildVirtualPosteForCollab(collabEdit);
  const target = poste.targets[sid];
  const pending = collabEdit._comments[sid]?.pending || null;
  const pendingLevel = pending ? Number(pending.niveau || 0) : null;
  document.querySelectorAll(`[onclick^="setLvl('${sid}'"]`).forEach((btn, i) => {
    btn.className = 'lvl-btn';
    btn.style.outline = '';
    btn.style.background = '';
    btn.style.color = '';
    const n = i;
    const lvlActuel = collabEdit._comps[sid] || 0;
    if (i === 0) {
      if (pendingLevel === 0) btn.classList.add('pending-lvl', 'pending-lvl-0');
      return;
    }
    if (lvlActuel === n) btn.classList.add(`a${n}`);
    if (target != null && Number(target) === n) btn.classList.add('target-lvl', `target-lvl-${n}`);
    if (pendingLevel === n) btn.classList.add('pending-lvl', `pending-lvl-${n}`);
  });
}

function openTextPrompt({ title, subtitle = '', label = 'Commentaire', placeholder = '', defaultValue = '', required = true }) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.style.zIndex = '250';
    overlay.innerHTML = `<div class="prompt-card" onclick="event.stopPropagation()">
      <div class="mhead">
        <div class="mavat"><i class="ti ti-message-2" style="font-size:20px"></i></div>
        <div class="mtitle"><h2>${escapeHtml(title)}</h2><p>${escapeHtml(subtitle)}</p></div>
      </div>
      <div class="mbody">
        <div class="field full"><label>${escapeHtml(label)}</label>
          <textarea id="prompt-textarea" placeholder="${escapeHtml(placeholder)}">${escapeHtml(defaultValue)}</textarea>
        </div>
      </div>
      <div class="mfooter">
        <button class="btn" id="prompt-cancel">Annuler</button>
        <button class="btn btn-primary" id="prompt-ok"><i class="ti ti-check"></i>Valider</button>
      </div>
    </div>`;
    const close = value => { document.body.removeChild(overlay); resolve(value); };
    document.body.appendChild(overlay);
    const textarea = overlay.querySelector('#prompt-textarea');
    const ok = overlay.querySelector('#prompt-ok');
    const cancel = overlay.querySelector('#prompt-cancel');
    textarea.focus();
    textarea.setSelectionRange(textarea.value.length, textarea.value.length);
    cancel.addEventListener('click', e => { e.stopPropagation(); close(null); });
    ok.addEventListener('click', e => {
      e.stopPropagation();
      const value = textarea.value.trim();
      if (required && !value) { alert('Merci de renseigner un commentaire.'); return; }
      close(value);
    });
  });
}

async function requestLevelSuggestion(sid, lvl) {
  if (!canSuggestCompetencesForCollab(collabEdit.Id)) return;
  const sk = skillById(sid);
  const old = collabEdit._comps[sid] || 0;
  const cm = collabEdit._comments[sid] || {};
  const existingPending = cm.pending || null;
  if (Number(lvl) === Number(old)) {
    alert('Ce niveau est déjà le niveau officiel.');
    return;
  }
  const label = lvl > 0 ? `niveau ${lvl}` : 'retrait de la compétence';
  const commentaire = await openTextPrompt({
    title: 'Proposer un niveau de compétence',
    subtitle: `${sk ? sk.name : sid} — ${old ? 'niveau officiel ' + old : 'aucun niveau officiel'} → ${label}`,
    label: 'Justification collaborateur',
    placeholder: 'Expliquez dans quel contexte vous avez acquis ou mobilisé cette compétence…',
    defaultValue: existingPending ? existingPending.commentaire : '',
    required: true
  });
  if (commentaire === null) return;
  showSave('Suggestion enregistrée...');
  try {
    const payload = {
      niveau: Number(lvl) || 0,
      ancienNiveau: old,
      commentaire,
      auteur: getAuditName(),
      email: getAuditEmail(),
      date: new Date().toISOString(),
      ...getAuditContextFields()
    };
    await saveCommentValue(collabEdit.Id, sid, META_PENDING_VALIDATION_TYPE, JSON.stringify(payload), cm.pendingSpId);
    await spPost(CONFIG.lists.historique, {
      Title: String(collabEdit.Id),
      Role: getAuditRole(),
      Description: `Proposition collaborateur — "${sk ? sk.name : sid}" : ${old ? 'niveau '+old : '—'} → ${label}`,
      DateAction: new Date().toISOString()
    });
    await loadData();
    collabEdit._comments = getCollabComments(collabEdit.Id);
    collabEdit._history = getCollabHistory(collabEdit.Id);
    hideSave('Suggestion enregistrée ✓');
    renderCollabBody(sid);
  } catch(e) {
    hideSave('Erreur !');
    alert('Erreur lors de l\'enregistrement de la proposition : ' + e.message);
  }
}

async function cancelPendingValidation(sid) {

async function persistCompetenceLevel(collabSpId, sid, lvl) {
  const existing = db.competences.find(c => String(c.CollabId) === String(collabSpId) && (c.SkillId || c.Title) === sid);
  const n = Number(lvl) || 0;
  if (n > 0) {
    if (existing) {
      if (parseInt(existing.Niveau) !== n) await spPatch(CONFIG.lists.competences, existing.Id, { Niveau: n });
    } else {
      await spPost(CONFIG.lists.competences, { Title: sid, CollabId: String(collabSpId), Niveau: n });
    }
  } else if (existing) {
    await spDelete(CONFIG.lists.competences, existing.Id);
  }
}

async function reviewPendingValidation(sid, approved) {
  if (!canValidateCompetencesForCollab(collabEdit.Id)) return;
  const cm = collabEdit._comments[sid] || {};
  const pending = cm.pending;
  if (!pending) return;
  const sk = skillById(sid);
  const label = pendingLevelLabel(pending);
  const commentaire = await openTextPrompt({
    title: approved ? 'Valider la compétence' : 'Refuser la compétence',
    subtitle: `${sk ? sk.name : sid} — proposition : ${label}`,
    label: 'Commentaire manager',
    placeholder: approved ? 'Expliquez pourquoi le niveau est validé…' : 'Expliquez pourquoi la proposition est refusée…',
    required: true
  });
  if (commentaire === null) return;
  showSave(approved ? 'Validation...' : 'Refus...');
  try {
    const old = collabEdit._comps[sid] || 0;
    if (approved) await persistCompetenceLevel(collabEdit.Id, sid, pending.niveau);
    await saveCommentValue(collabEdit.Id, sid, 'manager', commentaire, cm.managerSpId);
    if (pending.commentaire) {
      const existingColComment = (cm.collaborateur || '').trim();
      const pendingComment = pending.commentaire.trim();
      const mergedColComment = existingColComment && existingColComment !== pendingComment
        ? `${existingColComment}

Proposition du ${pending.ts ? fmtDate(pending.ts) : ''} : ${pendingComment}`
        : pendingComment;
      await saveCommentValue(collabEdit.Id, sid, 'collaborateur', mergedColComment, cm.collaborateurSpId);
    }
    await saveCommentValue(collabEdit.Id, sid, META_PENDING_VALIDATION_TYPE, '', cm.pendingSpId);
    await spPost(CONFIG.lists.historique, {
      Title: String(collabEdit.Id),
      Role: getAuditRole(),
      Description: `${approved ? 'Validation' : 'Refus'} manager — "${sk ? sk.name : sid}" : proposition ${label}${approved ? ` (${old ? 'niveau '+old : '—'} → ${pending.niveau ? 'niveau '+pending.niveau : 'retiré'})` : ''}`,
      DateAction: new Date().toISOString()
    });
    await loadData();
    collabEdit._comps = getCollabComps(collabEdit.Id);
    collabEdit._comments = getCollabComments(collabEdit.Id);
    collabEdit._history = getCollabHistory(collabEdit.Id);
    hideSave(approved ? 'Compétence validée ✓' : 'Proposition refusée ✓');
    renderCollabBody(sid);
  } catch(e) {
    hideSave('Erreur !');
    alert('Erreur lors de la validation : ' + e.message);
  }
}

async function saveCommentValue(collabSpId, skillId, typeAuteur, value, existingSpId) {
  const clean = (value || '').trim();
  const data = { Title: String(collabSpId), SkillId: skillId, TypeAuteur: typeAuteur, Contenu: clean, DateSaisie: new Date().toISOString() };
  if (existingSpId) {
    if (clean) await spPatch(CONFIG.lists.commentaires, existingSpId, data);
    else await spDelete(CONFIG.lists.commentaires, existingSpId);
  } else if (clean) {
    await spPost(CONFIG.lists.commentaires, data);
  }
}

async function saveCollab(id) {
  if (!canSaveCollab(id || null)) { alert('Action non autorisée.'); return; }
  const canHeader = canEditCollabHeader();
  showSave('Enregistrement...');
  try {
    let collabSpId = id;
    const collabData = {};

    if (!id || canHeader) {
      const prenom = document.getElementById('c-prenom').value.trim();
      const nom    = document.getElementById('c-nom').value.trim();
      if (!prenom || !nom) { alert('Veuillez renseigner prénom et nom.'); hideSave('Erreur !'); return; }
      ensureCollabFunctionState();
      const fonctionIds = getCollabFunctionIds(collabEdit);
      const fonctionWeights = normalizeCollabFunctionWeights(collabEdit.fonctionWeights || {}, fonctionIds);
      Object.assign(collabData, {
        Title:     prenom,
        Prenom:    nom,
        Email:     document.getElementById('c-email').value.trim(),
        PosteId:   fonctionIds[0] || '',
        PosteIds:  JSON.stringify(fonctionIds),
        FonctionsPonderation: JSON.stringify(fonctionWeights),
        TeamIds:   (collabEdit.teamIds || []).join(','),
        ManagerID: document.getElementById('c-manager').value || ''
      });
    }

    if (id) {
      if (Object.keys(collabData).length) await spPatch(CONFIG.lists.collaborateurs, id, collabData);
    } else {
      const res = await spPost(CONFIG.lists.collaborateurs, collabData);
      collabSpId = res.Id;
    }

    const canCompetenceEdit = canEditCompetencesForCollab(collabSpId);
    const canMgrComment = canEditManagerCommentForCollab(collabSpId);
    const canColComment = canEditCollaborateurCommentForCollab(collabSpId);

    // Compétences
    if (canCompetenceEdit) {
    for (const [sid, lvl] of Object.entries(collabEdit._comps)) {
      const existing = db.competences.find(c => String(c.CollabId) === String(collabSpId) && (c.SkillId || c.Title) === sid);
      if (existing) {
        if (parseInt(existing.Niveau) !== lvl) await spPatch(CONFIG.lists.competences, existing.Id, { Niveau: lvl });
      } else {
        await spPost(CONFIG.lists.competences, { Title: sid, CollabId: String(collabSpId), Niveau: lvl });
      }
    }
    // Supprime les compétences retirées
    for (const c of db.competences.filter(c => String(c.CollabId) === String(collabSpId) && !collabEdit._comps[(c.SkillId || c.Title)])) {
      await spDelete(CONFIG.lists.competences, c.Id);
    }
    }

    // Commentaires visibles dans la fiche
    for (const sk of SKILLS) {
      const cm = collabEdit._comments[sk.id] || {};
      const mgrEl = document.getElementById('cm-mgr-' + sk.id);
      const colEl = document.getElementById('cm-col-' + sk.id);
      if (mgrEl && canMgrComment) await saveCommentValue(collabSpId, sk.id, 'manager', mgrEl.value, cm.managerSpId);
      if (colEl && canColComment) await saveCommentValue(collabSpId, sk.id, 'collaborateur', colEl.value, cm.collaborateurSpId);
    }

    // Dernière mise à jour officielle : seul le manager du collaborateur peut l'éditer.
    const lastUpdateEl = document.getElementById('c-last-update');
    if (lastUpdateEl && canEditOfficialUpdate(collabSpId)) {
      await saveCommentValue(collabSpId, META_LAST_UPDATE_SKILL_ID, 'manager', lastUpdateEl.value, collabEdit._lastUpdate?.spId);
    }

    // Historique
    if (canCompetenceEdit) {
    for (const [sid, ch] of Object.entries(collabEdit._changes)) {
      const sk = skillById(sid);
      await spPost(CONFIG.lists.historique, {
        Title:       String(collabSpId),
        Role:        getAuditRole(),
        Description: `"${sk ? sk.name : sid}" : ${ch.old ? 'niveau '+ch.old : '—'} → ${ch.new ? 'niveau '+ch.new : 'retiré'}`,
        DateAction:  new Date().toISOString()
      });
    }
    }

    await loadData();
    hideSave('Enregistré ✓');
    closeModal();
    if (currentView === 'matrix') renderMatrix();
    else if (currentView === 'admin-collabs') renderAdminCollabs();
    else if (currentView === 'search-skills') renderSearchSkills();
    else renderCollabs();
  } catch (e) {
    hideSave('Erreur !');
    alert('Erreur lors de l\'enregistrement : ' + e.message);
  }
}

    }).join('');

      ? db.collaborateurs.filter(x => teamManagerIds.includes(String(x.Id)) && String(x.Id) !== String(c.Id))

async function quickUpdateManager(collabId, managerId) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  const c = db.collaborateurs.find(x => String(x.Id) === String(collabId));
  if (c) c.ManagerID = managerId;
  hideSave('Manager mis à jour ✓');

  pendingSaves++;
  spPatch(CONFIG.lists.collaborateurs, collabId, { ManagerID: managerId })
    .catch(e => alert('Erreur enregistrement manager : ' + e.message))
    .finally(() => pendingSaves--);
}

async function quickUpdateRole(collabId, email, newRole) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  if (!email) return alert('Ce collaborateur n\'a pas d\'email renseigné.');
  const emailLow = email.toLowerCase();
  showSave('Mise à jour du rôle...');
  try {
    // Retirer l'email de tous les rôles existants
    for (const role of db.roles) {
      if (role.emails.includes(emailLow)) {
        const newEmails = role.emails.filter(e => e !== emailLow).join(',');
        await spPatch(CONFIG.lists.roles, role.spId, { Emails: newEmails });
      }
    }
    // Ajouter au nouveau rôle (sauf collaborateur = rôle par défaut, pas besoin de l'enregistrer)
    if (newRole !== 'collaborateur') {
      const targetRole = db.roles.find(r => r.name === newRole);
      if (targetRole) {
        const newEmails = [...targetRole.emails.filter(e => e !== emailLow), emailLow].join(',');
        await spPatch(CONFIG.lists.roles, targetRole.spId, { Emails: newEmails });
      } else {
        // Créer l'entrée de rôle si elle n'existe pas encore
        const droits = JSON.stringify(sanitizeDroitsForRole(newRole, DROITS_DEFAUT[newRole] || {}));
        await spPost(CONFIG.lists.roles, { Title: newRole, Emails: emailLow, Droits: droits });
      }
    }
    await loadData();
    hideSave('Rôle mis à jour ✓');
    renderAdminCollabs();
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}
  async function toggleTeam(collabId, teamId, el) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  const c = db.collaborateurs.find(x => String(x.Id) === String(collabId));
  if (!c) return;
  const isSelected = c.teamIds.includes(String(teamId));
  if (!isSelected && c.teamIds.length >= 2) {
    alert('Maximum 2 équipes.');
    return;
  }
  if (isSelected) {
    c.teamIds = c.teamIds.filter(t => t !== String(teamId));
    el.style.background = '#fff';
    el.style.borderColor = '#D3D1C7';
    el.style.color = '#5F5E5A';
  } else {
    c.teamIds.push(String(teamId));
    el.style.background = '#EEEDFE';
    el.style.borderColor = '#534AB7';
    el.style.color = '#534AB7';
  }
  pendingSaves++;
  spPatch(CONFIG.lists.collaborateurs, collabId, { TeamIds: c.teamIds.join(',') })
    .catch(e => alert('Erreur : ' + e.message))
    .finally(() => pendingSaves--);
}

function exportPostesReferentiel() {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  try {
    const rows = [];
    POSTES_STATE.forEach(p => {
      Object.entries(p.targets || {}).forEach(([sid, lvl]) => {
        const sk  = SKILLS.find(s => s.id === sid);
        const dom = sk ? DOMAINS.find(d => d.id === sk.did) : null;
        rows.push([
          p.name,
          dom ? dom.name : '',
          sk ? sk.name : sid,
          lvl != null ? lvl : '',
          (lvl != null && sk) ? getLevelDesc(sk, lvl, p.id) : '',
          p.id,
          sid
        ]);
      });
    });
    if (!rows.length) { alert('Aucune compétence cible définie pour les fonctions.'); return; }
    const headers = ['Fonction','Domaine','Compétence','Niveau cible','Description niveau cible','ID Fonction','ID Compétence'];
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    ws['!cols'] = [{wch:24},{wch:16},{wch:42},{wch:12},{wch:55},{wch:10},{wch:10}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Référentiel fonctions');
    XLSX.writeFile(wb, 'referentiel_fonctions_competences.xlsx');
  } catch(e) {
    alert('Erreur lors de l\'export : ' + e.message);
    console.error(e);
  }
}
  
  function showPosteSkills(id) {
  const p = POSTES_STATE.find(x => x.id === id);
  if (!p) return;
  const targets = Object.entries(p.targets||{});
  document.getElementById('m-av').innerHTML = '<i class="ti ti-briefcase" style="font-size:20px"></i>';
  document.getElementById('m-title').textContent = p.name;
  document.getElementById('m-sub').textContent = `${targets.length} compétence(s) cible(s)`;
  let body = '';
  if (!targets.length) {
    body = `<p style="color:#aaa;font-size:13px">Aucune compétence cible définie.</p>`;
  } else {
    getSortedDomains().forEach(dom => {
      const domTargets = targets.filter(([sid]) => {
        const sk = SKILLS.find(s => s.id === sid);
        return sk && sk.did === dom.id;
      });
      if (!domTargets.length) return;
      body += `<div style="padding:5px 8px;font-size:11px;font-weight:600;text-transform:uppercase;
        background:${dom.bg};color:${dom.c};border-radius:6px;margin-bottom:6px">${dom.name}</div>`;
      domTargets.forEach(([sid, lvl]) => {
  const sk   = SKILLS.find(s => s.id === sid);
  const desc = (lvl != null && sk) ? getLevelDesc(sk, lvl, id) : '';
  body += `<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
    padding:6px 8px;border-bottom:.5px solid #f0f0e8">
    <div style="flex:1">
      <div style="font-size:13px">${sk ? sk.name : sid}</div>
      ${desc

async function savePoste(id) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  const name = document.getElementById('p-name').value.trim();
  if (!name) return alert('Nom requis.');
  const targets = {};
  const customLevels = {};
  SKILLS.forEach(sk => {
    const v = document.getElementById('pt-' + sk.id).value;
    if (v !== '') targets[sk.id] = parseInt(v);
    const overrides = {};
    [1,2,3,4].forEach(n => {
      const el = document.getElementById(`ld-${sk.id}-${n}`);
      if (el) {
        const val = el.value.trim();
        if (val) overrides[n] = val;
      }
    });
    if (Object.keys(overrides).length) customLevels[sk.id] = overrides;
  });
  showSave();
  try {
    const data = { Title: name, Targets: JSON.stringify(targets), NiveauxPersos: JSON.stringify(customLevels) };
    const isSpId = id && !isNaN(Number(id));
    if (isSpId) {
      await spPatch(CONFIG.lists.postes, id, data);
    } else {
      // Fonction statique non encore migré : on en crée une version SharePoint.
      // Les collaborateurs référençant l'ancien identifiant statique devront être
      // mis à jour via "Migrer vers SharePoint" pour les autres fonctions restantes.
      await spPost(CONFIG.lists.postes, data);
    }
    await loadData();
    closeModal();
    renderAdminPostes();
    hideSave('Fonction enregistrée ✓');
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}

async function deletePoste(id) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  const isSpId = id && !isNaN(Number(id));
  if (!isSpId) {
    alert('Cette fonction n\'est pas encore enregistré dans SharePoint. Utilisez d\'abord "Migrer vers SharePoint" dans cet onglet.');
    return;
  }
  if (!confirm('Supprimer cette fonction ?')) return;
  showSave('Suppression...');
  try {
    await spDelete(CONFIG.lists.postes, id);
    await loadData();
    hideSave('Supprimé ✓');
    renderAdminPostes();
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}

// Migre les fonctions statiques (POST_xxx) vers SharePoint :
// - recalcule les cibles de compétences vers les nouveaux identifiants numériques (via le nom)
// - met à jour le PosteId des collaborateurs qui référencent les anciens identifiants statiques
async function migratePostes() {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  const staticPostes = POSTES.filter(p => isNaN(Number(p.id)));
  if (!staticPostes.length) return alert('Toutes les fonctions sont déjà dans SharePoint.');
  if (!confirm(`Migrer ${staticPostes.length} fonction(s) vers SharePoint ?\n\nLes niveaux cibles seront recalculés vers les identifiants actuels des compétences, et les fiches des collaborateurs concernés seront mises à jour.\n\nCette opération est rapide mais ne doit pas être interrompue (ne fermez pas la page).`)) return;

  showSave('Migration des fonctions...');
  try {
    // 1. Correspondance ancien id de compétence (COMP_xxx) -> nouvel id numérique, via le nom
    const nameToNewSkillId = {};
    SKILLS.forEach(s => { nameToNewSkillId[s.name.trim()] = s.id; });
    const skillIdMap = {};
    OLD_SKILLS_REF.forEach(([oldId, name]) => {
      const newId = nameToNewSkillId[name.trim()];
      if (newId) skillIdMap[oldId] = newId;
    });

    // 2. Création des fonctions dans SharePoint avec cibles corrigées
    const posteIdMap = {};
    let i = 0;
    for (const p of staticPostes) {
      i++;
      document.getElementById('save-msg').textContent = `Migration fonction ${i}/${staticPostes.length}...`;
      const newTargets = {};
      Object.entries(p.targets || {}).forEach(([sid, lvl]) => {
        newTargets[skillIdMap[sid] || sid] = lvl;
      });
      const res = await spPost(CONFIG.lists.postes, { Title: p.name, Targets: JSON.stringify(newTargets), NiveauxPersos: JSON.stringify(p.customLevels || {}) });
      posteIdMap[p.id] = String(res.Id);
    }

    // 3. Mise à jour du PosteId des collaborateurs concernés
    const collabsToUpdate = db.collaborateurs.filter(c => posteIdMap[c.PosteId]);
    for (let j = 0; j < collabsToUpdate.length; j++) {
      document.getElementById('save-msg').textContent = `Mise à jour des collaborateurs (${j+1}/${collabsToUpdate.length})...`;
      const c = collabsToUpdate[j];
      await spPatch(CONFIG.lists.collaborateurs, c.Id, { PosteId: posteIdMap[c.PosteId] });
    }

    await loadData();
    hideSave('Migration terminée ✓');
    renderAdminPostes();
    alert(`Migration réussie !\n${staticPostes.length} fonction(s) migrée(s) avec cibles corrigées.\n${collabsToUpdate.length} collaborateur(s) réassigné(s).`);
  } catch(e) {
    hideSave('Erreur migration !');
    alert('Erreur pendant la migration : ' + e.message + '\n\nLa migration est partielle. Vérifiez la liste Fonctions dans SharePoint (doublons possibles) avant de relancer.');
    console.error(e);
  }
}

// utilisée pour reconstruire les domaines manquants dans SharePoint et corriger

const OLD_DOMAINS_REF = [
  ['DOM_01','Soft-skill','#085041','#E1F5EE'],
  ['DOM_02','Métier','#3C3489','#EEEDFE'],
  ['DOM_03','Projet','#633806','#FAEEDA'],

// Reconstruit dans SharePoint les domaines statiques manquants (DOM_01..DOM_07) et
// réassigne les compétences (CompetencesRef) qui référencent encore ces anciens
// identifiants vers les nouveaux identifiants numériques.
async function migrateDomains() {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  if (!confirm(`Reconstruire les domaines manquants dans SharePoint et réassigner les compétences concernées ?\n\nCette opération est rapide. Ne fermez pas la page pendant son exécution.`)) return;
  showSave('Réparation des domaines...');
  try {
    const domainIdMap = {}; // DOM_0X -> nouvel id numérique SharePoint
    for (const [oldId, name, c, bg] of OLD_DOMAINS_REF) {
      const existing = DOMAINS.find(d => (d.name||'').trim().toLowerCase() === name.trim().toLowerCase());
      if (existing) {
        domainIdMap[oldId] = existing.id;
      } else {
        const res = await spPost(CONFIG.lists.domaines, { Title: name, Couleur: c, Fond: bg });
        domainIdMap[oldId] = String(res.Id);
      }
    }

    // Corrige le DomainId des compétences qui pointent encore vers un ancien identifiant
    let fixed = 0;
    for (const s of SKILLS) {
      if (domainIdMap[s.did] && !isNaN(Number(s.id))) {
        await spPatch(CONFIG.lists.competencesRef, s.id, { DomainId: domainIdMap[s.did] });
        fixed++;
      }
    }

    await loadData();
    hideSave('Domaines réparés ✓');
    renderAdminSkills();
    alert(`Réparation terminée.\n${fixed} compétence(s) réassignée(s) à leur domaine.`);
  } catch(e) {
    hideSave('Erreur !');
    alert('Erreur pendant la réparation : ' + e.message + '\n\nVérifiez la liste Domaines dans SharePoint avant de relancer (doublons possibles).');
    console.error(e);
  }
}

async function saveSkill(id) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  const name = document.getElementById('sk-name').value.trim();
  if (!name) return alert('Nom requis.');
  const did = document.getElementById('sk-did').value;
  const levels = {
    1: document.getElementById('sk-l1').value.trim(),
    2: document.getElementById('sk-l2').value.trim(),
    3: document.getElementById('sk-l3').value.trim(),
    4: document.getElementById('sk-l4').value.trim()
  };
  showSave();
  try {
    const data = { Title: name, DomainId: did, Niveaux: JSON.stringify(levels) };
    const isSpId = id && !isNaN(Number(id));
    if (isSpId) {
      await spPatch(CONFIG.lists.competencesRef, id, data);
    } else if (id) {
      // Compétence statique (COMP_xxx) : créer dans SharePoint puis mettre à jour les références
      const res = await spPost(CONFIG.lists.competencesRef, data);
      const newId = String(res.Id);
      // Mettre à jour toutes les entrées Competences qui référencent l'ancien ID
      const toUpdate = db.competences.filter(c => (c.SkillId || c.Title) === id);
      for (const c of toUpdate) {
        await spPatch(CONFIG.lists.competences, c.Id, { Title: newId });
      }
      // Mettre à jour les Commentaires
      const comsToUpdate = db.commentaires.filter(c => c.SkillId === id);
      for (const c of comsToUpdate) {
        await spPatch(CONFIG.lists.commentaires, c.Id, { SkillId: newId });
      }
    } else {
      await spPost(CONFIG.lists.competencesRef, data);
    }
    await loadData();
    closeModal();
    renderAdminSkills();
    hideSave('Compétence enregistrée ✓');
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}

async function deleteSkill(id) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  if (!confirm('Supprimer cette compétence ? Les niveaux et commentaires associés seront également supprimés.')) return;
  showSave('Suppression...');
  try {
    const isSpId = id && !isNaN(Number(id));
    if (isSpId) {
      await spDelete(CONFIG.lists.competencesRef, id);
      // Supprimer les niveaux associés
      for (const c of db.competences.filter(c => (c.SkillId || c.Title) === id)) {
        await spDelete(CONFIG.lists.competences, c.Id);
      }
      // Supprimer les commentaires associés
      for (const c of db.commentaires.filter(c => c.SkillId === id)) {
        await spDelete(CONFIG.lists.commentaires, c.Id);
      }
    } else {
      // Compétence statique non encore migrée : retirer de la mémoire uniquement
      const idx = SKILLS.findIndex(s => s.id === id);
      if (idx >= 0) SKILLS.splice(idx, 1);
    }
    await loadData();
    hideSave('Supprimée ✓');
    renderAdminSkills();
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}

// Migration complète des compétences statiques vers SharePoint
// avec mise à jour des références dans Competences et Commentaires
async function migrateSkills() {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  const staticSkills = SKILLS.filter(s => isNaN(Number(s.id)));
  if (!staticSkills.length) return alert('Toutes les compétences sont déjà dans SharePoint.');
  if (!confirm(`Migrer ${staticSkills.length} compétence(s) statique(s) vers SharePoint ?\n\nCette opération va :\n1. Créer les compétences dans CompetencesRef\n2. Mettre à jour toutes les références dans Competences\n3. Mettre à jour toutes les références dans Commentaires\n\nCela peut prendre plusieurs minutes.`)) return;

  showSave('Migration en cours...');
  try {
    // Construire une table de correspondance ancienId -> nouvelId
    const idMap = {};
    let i = 0;
    for (const sk of staticSkills) {
      i++;
      document.getElementById('save-msg').textContent = `Migration ${i}/${staticSkills.length}...`;
      const res = await spPost(CONFIG.lists.competencesRef, {
        Title:    sk.name,
        DomainId: sk.did,
        Niveaux:  JSON.stringify(sk.levels)
      });
      idMap[sk.id] = String(res.Id);
    }

    // Mettre à jour la liste Competences (niveaux des collaborateurs)
    const compsToUpdate = db.competences.filter(c => idMap[(c.SkillId || c.Title)]);
    document.getElementById('save-msg').textContent = `Mise à jour de ${compsToUpdate.length} entrées Competences...`;
    for (const c of compsToUpdate) {
      const oldId = c.SkillId || c.Title;
      await spPatch(CONFIG.lists.competences, c.Id, { Title: idMap[oldId] });
    }

    // Mettre à jour la liste Commentaires
    const comsToUpdate = db.commentaires.filter(c => idMap[c.SkillId]);
    document.getElementById('save-msg').textContent = `Mise à jour de ${comsToUpdate.length} commentaires...`;
    for (const c of comsToUpdate) {
      await spPatch(CONFIG.lists.commentaires, c.Id, { SkillId: idMap[c.SkillId] });
    }

    // Mettre à jour les targets des fonctions (JSON stocké dans SharePoint)
    document.getElementById('save-msg').textContent = 'Mise à jour des cibles de fonctions...';
    for (const poste of POSTES) {
      const isSpId = poste.id && !isNaN(Number(poste.id));
      if (!isSpId) continue;
      let updated = false;
      const newTargets = {};
      for (const [sid, lvl] of Object.entries(poste.targets || {})) {
        const newSid = idMap[sid] || sid;
        if (newSid !== sid) updated = true;
        newTargets[newSid] = lvl;
      }
      if (updated) {
        await spPatch(CONFIG.lists.postes, poste.id, { Targets: JSON.stringify(newTargets) });
      }
    }

    await loadData();
    hideSave('Migration terminée ✓');
    renderAdminSkills();
    alert(`Migration réussie !\n${staticSkills.length} compétences migrées.\n${compsToUpdate.length} niveaux mis à jour.\n${comsToUpdate.length} commentaires mis à jour.`);
  } catch(e) {
    hideSave('Erreur migration !');
    alert('Erreur pendant la migration : ' + e.message + '\n\nLa migration est partielle. Relancez-la pour continuer.');
    console.error(e);
  }
}

const LEVEL_DESCRIPTION_FIX_ALIASES = {
  "dimensionner les moyens humains et materiels pour un projet": "dimensionner les moyens humains et materiels pour un projet ou un chantier",
  "animer une formation et evaluer les acquis des apprenants": "animer une formation et evaluer les acquis des apprenan es"
};

function normalizeSkillLabelForLevelFix(value) {
  return String(value || '')
    .replace(/[’‘`]/g, "'")
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function getLevelDescriptionFixMap() {
  const map = {};
  LEVEL_DESCRIPTION_FIX_ROWS.forEach(row => {
    const key = normalizeSkillLabelForLevelFix(row.name);
    map[key] = row;
  });
  return map;
}

function findLevelDescriptionFixForSkill(sk, map = getLevelDescriptionFixMap()) {
  if (!sk) return null;
  const skillKey = normalizeSkillLabelForLevelFix(sk.name);
  const sourceKey = LEVEL_DESCRIPTION_FIX_ALIASES[skillKey] || skillKey;
  const row = map[sourceKey];
  return row ? { ...row, sourceKey, skillKey } : null;
}

function levelsEqual(a, b) {
  return [1,2,3,4].every(n => String((a && a[n]) || '').trim() === String((b && b[n]) || '').trim());
}

function getLevelDescriptionFixPlan() {
  const map = getLevelDescriptionFixMap();
  const matchedSourceKeys = new Set();
  const toUpdate = [];
  const unchanged = [];
  const staticOnly = [];
  const unmatchedSkills = [];

  SKILLS.forEach(sk => {
    const fix = findLevelDescriptionFixForSkill(sk, map);
    if (!fix) { unmatchedSkills.push(sk); return; }
    matchedSourceKeys.add(fix.sourceKey);
    const item = { skill: sk, fix };
    if (levelsEqual(sk.levels || {}, fix.levels || {})) {
      unchanged.push(item);
    } else if (!isNaN(Number(sk.id))) {
      toUpdate.push(item);
    } else {
      staticOnly.push(item);
    }
  });

  const unmatchedRows = LEVEL_DESCRIPTION_FIX_ROWS.filter(row =>
    !matchedSourceKeys.has(normalizeSkillLabelForLevelFix(row.name))
  );
  return { toUpdate, unchanged, staticOnly, unmatchedRows, unmatchedSkills };
}

function renderLevelDescriptionFixPreview() {
  if (!hasStrictAdminAccess()) return;
  const box = document.getElementById('level-fix-report');
  if (!box) return;
  const plan = getLevelDescriptionFixPlan();
  const totalMatched = plan.toUpdate.length + plan.unchanged.length + plan.staticOnly.length;
  const unmatchedHtml = plan.unmatchedRows.length
    ? `<details style="margin-top:8px"><summary style="cursor:pointer;color:#856404">${plan.unmatchedRows.length} ligne(s) sans correspondance</summary>
        <ul style="margin:6px 0 0 18px;color:#856404;font-size:12px;line-height:1.5">
          ${plan.unmatchedRows.map(r => `<li>${escapeHtml(r.name)}</li>`).join('')}
        </ul>
      </details>`
    : '';
  const updateHtml = plan.toUpdate.length
    ? `<details style="margin-top:8px"><summary style="cursor:pointer;color:#085041">${plan.toUpdate.length} compétence(s) à corriger</summary>
        <ul style="margin:6px 0 0 18px;color:#085041;font-size:12px;line-height:1.5">
          ${plan.toUpdate.map(x => `<li>${escapeHtml(x.skill.name)}</li>`).join('')}
        </ul>
      </details>`
    : '';
  const staticHtml = plan.staticOnly.length
    ? `<div class="fb-err" style="margin-top:8px"><i class="ti ti-alert-triangle"></i>
        ${plan.staticOnly.length} compétence(s) correspondante(s) ne sont pas encore migrées dans SharePoint. Elles sont corrigées dans le HTML fourni, mais pour appliquer le correctif en base il faut d'abord utiliser “Migrer vers SharePoint”.
      </div>`
    : '';
  const unmatchedSkillsHtml = plan.unmatchedSkills && plan.unmatchedSkills.length
    ? `<details style="margin-top:8px"><summary style="cursor:pointer;color:#5F5E5A">${plan.unmatchedSkills.length} compétence(s) de l'application sans correspondance — conservées telles quelles</summary>
        <ul style="margin:6px 0 0 18px;color:#5F5E5A;font-size:12px;line-height:1.5">
          ${plan.unmatchedSkills.map(sk => `<li>${escapeHtml(sk.name)}</li>`).join('')}
        </ul>
      </details>`
    : '';
  box.innerHTML = `<div class="fb-ok">
      <i class="ti ti-check"></i>
      ${LEVEL_DESCRIPTION_FIX_SOURCE_ROW_COUNT} ligne(s) source analysées, ${LEVEL_DESCRIPTION_FIX_ROWS.length} compétence(s) distincte(s), ${totalMatched} correspondance(s) avec le référentiel actuel.
      ${plan.toUpdate.length} mise(s) à jour à appliquer, ${plan.unchanged.length} déjà correcte(s).
    </div>${updateHtml}${unmatchedHtml}${unmatchedSkillsHtml}${staticHtml}`;
}

async function applyLevelDescriptionFix() {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  const plan = getLevelDescriptionFixPlan();
  if (!plan.toUpdate.length && !plan.staticOnly.length) {
    renderLevelDescriptionFixPreview();
    alert('Aucune description à corriger : les compétences correspondantes sont déjà à jour.');
    return;
  }
  if (!confirm(`Appliquer le correctif des descriptions de niveaux ?

${plan.toUpdate.length} compétence(s) SharePoint seront mises à jour.
${plan.staticOnly.length} compétence(s) statique(s) sont déjà corrigées dans ce fichier HTML, mais ne pourront pas être écrites dans SharePoint tant qu'elles ne sont pas migrées.

Les compétences sans correspondance ne seront pas modifiées.`)) return;

  showSave('Correctif des niveaux...');
  let updated = 0;
  try {
    for (let i = 0; i < plan.toUpdate.length; i++) {
      const item = plan.toUpdate[i];
      document.getElementById('save-msg').textContent = `Correctif ${i + 1}/${plan.toUpdate.length}...`;
      await spPatch(CONFIG.lists.competencesRef, item.skill.id, {
        Niveaux: JSON.stringify(item.fix.levels)
      });
      updated++;
    }
    plan.staticOnly.forEach(item => { item.skill.levels = item.fix.levels; });
    await loadData();
    hideSave('Descriptions corrigées ✓');
    renderImport();
    setTimeout(renderLevelDescriptionFixPreview, 0);
    alert(`Correctif terminé.
${updated} compétence(s) mise(s) à jour dans SharePoint.
${plan.staticOnly.length} compétence(s) statique(s) corrigée(s) dans le fichier HTML.`);
  } catch (e) {
    hideSave('Erreur !');
    alert('Erreur pendant le correctif : ' + e.message + '\n\nLe correctif peut être partiel. Relancez l’analyse avant de recommencer.');
    console.error(e);
  }
}

async function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const wb   = XLSX.read(ev.target.result, { type:'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
      showSave('Import en cours...');

      // Regrouper par email (ou prénom+nom si pas d'email)
      const collabMap = {};
      rows.forEach(row => {
        const prenom     = (row['Prénom'] || row['prenom'] || '').toString().trim();
        const nom        = (row['NOM']    || row['Nom']    || row['nom'] || '').toString().trim();
        const email      = (row['Mail']   || row['Email']  || row['email'] || '').toString().trim().toLowerCase();
        const posteName  = (row['Fonction'] || row['fonction'] || row['Poste'] || row['poste']  || '').toString().trim();
        const skillName  = (row['Compétence'] || row['Competence'] || row['competence'] || '').toString().trim();
        const niveau     = parseInt(row['Niveau'] || row['niveau'] || 0);
        const commentaire = (row['Commentaire'] || row['commentaire'] || '').toString().trim();

        if (!prenom && !email) return;
        const key = email || `${prenom}_${nom}`;
        if (!collabMap[key]) collabMap[key] = { prenom, nom, email, posteName, comps:{}, comments:{} };

        // Résolution par nom de compétence
        const sk = skillByName(skillName);
        if (sk && niveau >= 1 && niveau <= 4) {
          // Garder le niveau le plus élevé si plusieurs lignes
          if (!collabMap[key].comps[sk.id] || collabMap[key].comps[sk.id] < niveau) {
            collabMap[key].comps[sk.id] = niveau;
          }
          if (commentaire && !collabMap[key].comments[sk.id]) {
            collabMap[key].comments[sk.id] = commentaire;
          }
        }
      });

      let added = 0, updated = 0;
      for (const c of Object.values(collabMap)) {
        const poste = POSTES.find(p => p.name.toLowerCase().trim() === c.posteName.toLowerCase().trim());
        const ex    = db.collaborateurs.find(x =>
          (c.email && (x.Email||'').toLowerCase() === c.email) ||
          ((x.prenom||'').toLowerCase() === c.prenom.toLowerCase() && (x.Nom||'').toLowerCase() === c.nom.toLowerCase())
        );
        let cid;
        if (ex) {
          await spPatch(CONFIG.lists.collaborateurs, ex.Id, {
            Title: c.prenom, Prenom: c.nom, Email: c.email,
            PosteId: poste ? poste.id : (ex.PosteId || '')
          });
          cid = ex.Id;
          updated++;
        } else {
          const res = await spPost(CONFIG.lists.collaborateurs, {
            Title: c.prenom, Prenom: c.nom, Email: c.email,
            PosteId: poste ? poste.id : '', TeamIds: '', ManagerID: ''
          });
          cid = res.Id;
          added++;
        }

        // Compétences
        for (const [sid, lvl] of Object.entries(c.comps)) {
          const existing = db.competences.find(x => String(x.CollabId) === String(cid) && x.SkillId === sid);
          if (existing) {
            if (parseInt(existing.Niveau) !== lvl) await spPatch(CONFIG.lists.competences, existing.Id, { Niveau: lvl });
          } else {
            await spPost(CONFIG.lists.competences, { Title: sid, CollabId: String(cid), Niveau: lvl });
          }
        }

        // Commentaires manager
        for (const [sid, com] of Object.entries(c.comments)) {
          const alreadyExists = db.commentaires.find(x => String(x.Title) === String(cid) && x.SkillId === sid && x.TypeAuteur === 'manager');
          if (!alreadyExists) {
            await spPost(CONFIG.lists.commentaires, {
              Title: String(cid), SkillId: sid,
              TypeAuteur: 'manager', Contenu: com,
              DateSaisie: new Date().toISOString()
            });
          }
        }
      }

      await loadData();
      hideSave('Import terminé ✓');
      document.getElementById('fb').innerHTML = `<div class="fb-ok"><i class="ti ti-check"></i> ${added} collaborateur(s) ajouté(s), ${updated} mis à jour.</div>`;
    } catch (err) {
      hideSave('Erreur !');
      document.getElementById('fb').innerHTML = `<div class="fb-err"><i class="ti ti-alert-triangle"></i> Erreur : ${err.message}</div>`;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function exportExcel(teamId = '') {
  try {
    let collabs = db.collaborateurs.slice();
    let teamName = 'toute_entreprise';
    if (teamId) {
      collabs = collabs.filter(c => (c.teamIds||[]).includes(String(teamId)));
      const t = teamById(teamId);
      teamName = t ? t.name : 'equipe';
    }
    if (!collabs.length) { alert('Aucun collaborateur à exporter pour ce périmètre.'); return; }

    const headers = ['Prénom','Nom','Email','Fonction','Équipes', ...SKILLS.map(s => s.name)];
    const rows = collabs.map(c => {
      const functions = collabFunctionLabel(c, true);
      const comps = getCollabComps(c.Id);
      const teams = (c.teamIds||[]).map(tid => { const t = teamById(tid); return t ? t.name : ''; }).filter(Boolean).join(', ');
      return [c.prenom||'', c.Nom||'', c.Email||'', functions === '—' ? '' : functions, teams, ...SKILLS.map(s => comps[s.id] || '')];
    });
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Matrice');
    const safeName = teamName.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9_-]+/g, '_');
    XLSX.writeFile(wb, `matrice_competences_evea_${safeName}.xlsx`);
  } catch(e) {
    alert('Erreur lors de l\'export : ' + e.message);
    console.error(e);
  }
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function flashMessage(msg) {
  const el = document.getElementById('save-indicator');
  document.getElementById('save-msg').textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// Construit les lignes exportables pour le collaborateur en cours d'édition (collabEdit)
function getCollabExportRows() {
  const c = collabEdit;
  const poste = buildVirtualPosteForCollab(c);
  const grouped = {};
  SKILLS.forEach(s => { if (!grouped[s.did]) grouped[s.did] = []; grouped[s.did].push(s); });

  const rows = [];
  getSortedDomains().forEach(dom => {
    const list = grouped[dom.id] || [];
    list.forEach(sk => {
      const lvl    = c._comps[sk.id] || 0;
      const target = poste.targets[sk.id];
      const descPosteId = (poste._sourceBySkill && poste._sourceBySkill[sk.id]) || getPrimaryPosteId(c);
      const cm     = c._comments[sk.id] || {};
      const hasCm  = cm.manager || cm.collaborateur || cm.pending;
      const pendingLabel = cm.pending ? `${pendingLevelLabel(cm.pending)} — ${cm.pending.commentaire || ''}` : '';
      // On exporte uniquement les compétences pertinentes : ciblées par les fonctions,
      // renseignées (niveau > 0), ou commentées.
      if (target == null && lvl === 0 && !hasCm) return;
      rows.push({
        domaine: dom.name,
        competence: sk.name,
        niveau: lvl || '',
        niveauLabel: lvl ? getLevelDesc(sk, lvl, descPosteId) : '',
        cible: target != null ? target : '',
        cibleLabel: target != null ? getLevelDesc(sk, target, descPosteId) : '',
        commentaireManager: cm.manager || '',
        commentaireCollaborateur: cm.collaborateur || '',
        propositionEnAttente: pendingLabel
      });
    });
  });
  return rows;
}

function buildHtmlTable(rows) {
  let html = `<table style="border-collapse:collapse;font-family:Arial,sans-serif;font-size:11pt">
    <tr>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:left">Domaine</th>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:left">Compétence</th>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:center">Niveau actuel</th>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:center">Niveau cible</th>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:left">Commentaires</th>
    </tr>`;
  rows.forEach(r => {
    const commentaire = [
      r.commentaireManager       ? `Manager : ${r.commentaireManager}` : '',
      r.commentaireCollaborateur ? `Collaborateur : ${r.commentaireCollaborateur}` : '',
      r.propositionEnAttente ? `En attente : ${r.propositionEnAttente}` : ''
    ].filter(Boolean).join(' — ');
    html += `<tr>
      <td style="border:1px solid #999;padding:5px 8px">${escapeHtml(r.domaine)}</td>
      <td style="border:1px solid #999;padding:5px 8px">${escapeHtml(r.competence)}</td>
      <td style="border:1px solid #999;padding:5px 8px;text-align:center">${r.niveau !== '' ? r.niveau : '—'}</td>
      <td style="border:1px solid #999;padding:5px 8px;text-align:center">${r.cible !== '' ? r.cible : '—'}</td>
      <td style="border:1px solid #999;padding:5px 8px">${escapeHtml(commentaire)}</td>
    </tr>`;
  });
  html += `</table>`;
  return html;
}

function buildPlainText(rows) {
  const lines = [['Domaine','Compétence','Niveau actuel','Niveau cible','Commentaires'].join('\t')];
  rows.forEach(r => {
    const commentaire = [
      r.commentaireManager       ? `Manager : ${r.commentaireManager}` : '',
      r.commentaireCollaborateur ? `Collaborateur : ${r.commentaireCollaborateur}` : '',
      r.propositionEnAttente ? `En attente : ${r.propositionEnAttente}` : ''
    ].filter(Boolean).join(' — ');
    lines.push([r.domaine, r.competence, r.niveau!==''?r.niveau:'—', r.cible!==''?r.cible:'—', commentaire].join('\t'));
  });
  return lines.join('\n');
}

// Copie un tableau HTML dans le presse-papier (collable directement dans Word)
function copyCollabTable() {
  const rows = getCollabExportRows();
  if (!rows.length) { alert('Aucune compétence à exporter pour ce collaborateur.'); return; }
  const html = buildHtmlTable(rows);
  const text = buildPlainText(rows);

  if (navigator.clipboard && window.ClipboardItem) {
    try {
      const item = new ClipboardItem({
        'text/html':  new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([text], { type: 'text/plain' })
      });
      navigator.clipboard.write([item]).then(
        () => flashMessage('Tableau copié ✓ — collez-le dans Word (Ctrl+V)'),
        () => fallbackCopy(html)
      );
      return;
    } catch (e) {
      fallbackCopy(html);
      return;
    }
  }
  fallbackCopy(html);
}

// Méthode de repli pour copier le tableau HTML (navigateurs sans Clipboard API moderne)
function fallbackCopy(html) {
  const div = document.createElement('div');
  div.contentEditable = 'true';
  div.style.position = 'fixed';
  div.style.left = '-9999px';
  div.innerHTML = html;
  document.body.appendChild(div);
  const range = document.createRange();
  range.selectNodeContents(div);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try {
    document.execCommand('copy');
    flashMessage('Tableau copié ✓ — collez-le dans Word (Ctrl+V)');
  } catch (e) {
    alert('La copie automatique a échoué. Sélectionnez manuellement le tableau et utilisez Ctrl+C.');
  } finally {
    sel.removeAllRanges();
    document.body.removeChild(div);
  }
}

function filterSkillSearch(query = searchSkillQuery) {
  searchSkillQuery = query;
  const resultsEl = document.getElementById('skill-search-results');
  const allEl = document.getElementById('skill-search-all');
  if (!resultsEl || !allEl) return;
  const clean = (query || '').trim();
  if (!clean) {
    resultsEl.innerHTML = '';
    allEl.style.display = '';
    return;
  }
  allEl.style.display = 'none';
  const matches = SKILLS.filter(s => (!filterStrategy || isSkillInStrategy(s.id, filterStrategy)) && s.name.toLowerCase().includes(clean.toLowerCase()));
  if (!matches.length) {
    resultsEl.innerHTML = `<p style="color:#aaa;font-size:13px">Aucune compétence trouvée.</p>`;

  }
  const scopedCollabs = getSearchSkillCollabs();
  let h = `<div class="admin-card">
    <table class="adm"><thead>
      <tr><th>Compétence</th><th style="text-align:center">Niveau 1</th><th style="text-align:center">Niveau 2</th>
      <th style="text-align:center">Niveau 3</th><th style="text-align:center">Niveau 4</th><th style="text-align:center">Total</th></tr>
    </thead><tbody>`;
  matches.forEach(sk => {

function showSkillDetail(skillId) {
  const sk = SKILLS.find(s => s.id === skillId);
  if (!sk) return;
  const dom = DOMAINS.find(d => d.id === sk.did);
  const scopedCollabs = getSearchSkillCollabs();
  const byLevel = getSkillStats(skillId, scopedCollabs);
  const total = Object.values(byLevel).flat().length;
  const team = searchSkillTeam ? teamById(searchSkillTeam) : null;
  document.getElementById('m-av').innerHTML = `<i class="ti ti-award" style="font-size:20px"></i>`;
  document.getElementById('m-title').textContent = sk.name;
  document.getElementById('m-sub').textContent = `${dom ? dom.name : ''} · ${team ? team.name + ' · ' : ''}${total} personne(s)`;
  let body = levelLegendHtml() + (strategyRefsForSkill(skillId).length ? `<div class="projection-note"><i class="ti ti-target-arrow"></i> Objectif(s) stratégique(s) lié(s) : ${strategyTagsHtml(skillId, 4)}</div>` : '');
  [4,3,2,1].forEach(n => {
    if (!byLevel[n].length) return;
    body += `<div style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span class="lb l${n}" style="width:20px;height:20px;font-size:11px">${n}</span>
