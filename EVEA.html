<script>
// =====================================================================
// CONFIG — remplacez les valeurs ci-dessous
// =====================================================================
const CONFIG = {
  clientId: '1a14a45e-5e2d-4dc9-b09a-faae6b2c89f2',        // ID d'application Azure
  tenantId: '66314798-99de-48f9-9cc0-006167b79041',        // ID de l'annuaire Azure
  siteUrl:   'https://jbpuyou.sharepoint.com/sites/evea-intranet',
  adminEmails: ['lp.sylvestre@evea-conseil.com','a.filliatre@evea-conseil.com','l.nerdeux@evea-conseil.com','g.martinho@evea-conseil.com'], // ajoutez vos adresses admin ici
  lists: {
    collaborateurs: 'Collaborateurs',
    competences:    'Competences',
    commentaires:   'Commentaires',
    historique:     'Historique',
    equipes:        'Equipes',
    postes:         'Postes',
    domaines:       'Domaines',
    competencesRef: 'CompetencesRef',
    roles:          'Roles'
  }
};
// =====================================================================

// =====================================================================
// DROITS PAR PROFIL
// =====================================================================
const DROITS_DEFAUT = {
  admin: {
    fiche_propre_consultation: true, fiche_propre_modification: true,
    equipe_consultation: true, equipe_validation: true, equipe_modification: true,
    toutes_consultation: true, toutes_modification: true,
    recherche: true, matrice_equipe: true, matrice_complete: true, administration: true,
    export_individuel: true, export_global: true
  },
  directeur: {
    fiche_propre_consultation: true, fiche_propre_modification: true,
    equipe_consultation: true, equipe_validation: false, equipe_modification: false,
    toutes_consultation: true, toutes_modification: false,
    recherche: true, matrice_equipe: true, matrice_complete: true, administration: false,
    export_individuel: true, export_global: true
  },
  manager: {
    fiche_propre_consultation: true, fiche_propre_modification: true,
    equipe_consultation: true, equipe_validation: true, equipe_modification: false,
    toutes_consultation: false, toutes_modification: false,
    recherche: true, matrice_equipe: true, matrice_complete: false, administration: false,
    export_individuel: true, export_global: false
  },
  collaborateur: {
    fiche_propre_consultation: true, fiche_propre_modification: true,
    equipe_consultation: false, equipe_validation: false, equipe_modification: false,
    toutes_consultation: false, toutes_modification: false,
    recherche: false, matrice_equipe: false, matrice_complete: false, administration: false,
    export_individuel: true, export_global: false
  }
};

const DROITS_LABELS = {
  fiche_propre_consultation: 'Sa propre fiche : consultation',
  fiche_propre_modification: 'Sa propre fiche : modification',
  equipe_consultation:       'Fiches équipe : consultation',
  equipe_validation:         'Fiches équipe : validation compétences',
  equipe_modification:       'Fiches équipe : modification',
  toutes_consultation:       'Toutes les fiches : consultation',
  toutes_modification:       'Toutes les fiches : modification',
  recherche:                 'Recherche compétences',
  matrice_equipe:            'Matrice globale : vue équipe',
  matrice_complete:          'Matrice globale : vue complète',
  administration:            'Administration : accès complet',
  export_individuel:         'Export individuel (fiche collaborateur)',
  export_global:             'Export global (matrice / équipe)'
};

// =====================================================================
// MSAL — authentification Microsoft
// =====================================================================
const msalInstance = new msal.PublicClientApplication({
  auth: {
    clientId:    CONFIG.clientId,
    authority:   `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: { cacheLocation: 'sessionStorage' }
});

const SCOPES_GRAPH = ['User.Read'];
const SCOPES_SP    = ['https://jbpuyou.sharepoint.com/.default'];

async function getToken() {
  const account = msalInstance.getAllAccounts()[0];
  if (!account) {
    await msalInstance.loginRedirect({ scopes: SCOPES_GRAPH });
    return null;
  }
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES_SP, account });
    return r.accessToken;
  } catch {
    await msalInstance.acquireTokenRedirect({ scopes: SCOPES_SP });
    return null;
  }
}

// =====================================================================
// SHAREPOINT API
// =====================================================================
async function spGet(listName, filter = '', select = '') {
  const token = await getToken();
  if (!token) return [];
  let url = `${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items?$top=5000`;
  if (filter) url += `&$filter=${encodeURIComponent(filter)}`;
  if (select) url += `&$select=${select}`;
  const r = await fetch(url, {
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata'
    }
  });
  if (!r.ok) throw new Error(`spGet ${listName} → ${r.status}`);
  const d = await r.json();
  return d.value || [];
}

async function spPost(listName, data) {
  const token = await getToken();
  if (!token) return null;
  const r = await fetch(`${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=nometadata'
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) {
    const errBody = await r.text();
    console.error(`spPost ${listName} erreur détail :`, errBody);
    throw new Error(`spPost ${listName} → ${r.status}`);
  }
  return await r.json();
}

async function spPatch(listName, id, data) {
  const token = await getToken();
  if (!token) return;
  const r = await fetch(`${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items(${id})`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=nometadata',
      'IF-MATCH': '*',
      'X-HTTP-Method': 'MERGE'
    },
    body: JSON.stringify(data)
  });
if (!r.ok) {
  const errBody = await r.text();
  console.error(`spPatch ${listName}(${id}) erreur détail :`, errBody);
  throw new Error(`spPatch ${listName}(${id}) → ${r.status}`);
}
}

async function spDelete(listName, id) {
  const token = await getToken();
  if (!token) return;
  const r = await fetch(`${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items(${id})`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      'IF-MATCH': '*',
      'X-HTTP-Method': 'DELETE'
    }
  });
  if (!r.ok) throw new Error(`spDelete ${listName}(${id}) → ${r.status}`);
}

async function loadData() {
  document.getElementById('loading-msg').textContent = 'Chargement des données...';
  const [collabs, comps, coms, hist, equipes, postesRaw, domainesRaw, rolesRaw, skillsRaw] = await Promise.all([
  spGet(CONFIG.lists.collaborateurs),
  spGet(CONFIG.lists.competences),
  spGet(CONFIG.lists.commentaires),
  spGet(CONFIG.lists.historique),
  spGet(CONFIG.lists.equipes),
  spGet(CONFIG.lists.postes),
  spGet(CONFIG.lists.domaines),
  spGet(CONFIG.lists.roles),
  spGet(CONFIG.lists.competencesRef)
]);

  // Rôles
db.roles = rolesRaw.map(r => ({
  spId:   r.Id,
  name:   r.Title || '',
  emails: r.Emails ? r.Emails.split(',').map(e => e.trim().toLowerCase()).filter(Boolean) : [],
  droits: r.Droits ? JSON.parse(r.Droits) : {}
}));
  
// Remplace le tableau POSTES statique si des données existent en base
if (postesRaw.length) {
  POSTES.length = 0;
  postesRaw.forEach(p => {
    POSTES.push({
      id:      String(p.Id),
      name:    p.Title || '',
      targets: p.Targets ? JSON.parse(p.Targets) : {}
    });
  });
  POSTES_STATE.length = 0;
  POSTES_STATE.push(...POSTES);
}
  db.collaborateurs = collabs.map(c => ({
    ...c,
    prenom:  c.Title || '',
    Nom:     c.Prenom || '',
    teamIds: c.TeamIds ? c.TeamIds.split(',').filter(Boolean) : []
  }));
  db.competences  = comps;
  db.commentaires = coms;
  db.historique   = hist;
  db.equipes = equipes.map(e => ({
  ...e,
  id: String(e.Id),
  name: e.Title || e.Nom || '',
  managerIds: e.ManagersIds ? e.ManagersIds.split(',').filter(Boolean) : []
}));

// Remplace le tableau DOMAINS statique si des données existent en base
if (domainesRaw.length) {
  DOMAINS.length = 0;
  domainesRaw.forEach(d => {
    DOMAINS.push({
      id:   String(d.Id),
      name: d.Title || '',
      c:    d.Couleur || '#333333',
      bg:   d.Fond || '#F5F5F5'
    });
  });
}

// Remplace le tableau SKILLS statique si des données existent en base
if (skillsRaw.length) {
  SKILLS.length = 0;
  skillsRaw.forEach(s => {
    SKILLS.push({
      id:     String(s.Id),
      did:    s.DomainId || (DOMAINS[0] ? DOMAINS[0].id : 'DOM_01'),
      name:   s.Title || '',
      levels: s.Niveaux ? (() => { try { return JSON.parse(s.Niveaux); } catch { return {1:'',2:'',3:'',4:''}; } })() : {1:'',2:'',3:'',4:''}
    });
  });
}
}

    if (!r[(c.SkillId || c.Title)]) r[(c.SkillId || c.Title)] = {};
    r[(c.SkillId || c.Title)][c.TypeAuteur] = c.Contenu;
    r[(c.SkillId || c.Title)][c.TypeAuteur + 'Ts'] = new Date(c.DateSaisie).getTime();
    r[(c.SkillId || c.Title)][c.TypeAuteur + 'SpId'] = c.Id;
  });
  return r;
}

function getCollabHistory(collabId) {
  return db.historique
    .filter(h => String(h.Title) === String(collabId))
    .map(h => ({ spId: h.Id, ts: new Date(h.DateAction).getTime(), role: h.Role, desc: h.Description }))
    .sort((a, b) => b.ts - a.ts);
}

function getUserRole(email) {
  if (!email) return 'collaborateur';
  const e = email.toLowerCase();

  // Fallback prioritaire : CONFIG.adminEmails (garantit l'accès même si Roles vide)
  if (CONFIG.adminEmails.map(a => a.toLowerCase()).includes(e)) return 'admin';

  // Rôles depuis SharePoint (priorité au rôle le plus élevé)
  const ordre = ['admin', 'directeur', 'manager', 'collaborateur'];
  const rolesUser = db.roles
    .filter(r => r.emails.includes(e))
    .map(r => r.name.toLowerCase());

  for (const r of ordre) {
    if (rolesUser.includes(r)) return r;
  }

  // Fallback : vérifier si manager d'une équipe
  const collab = db.collaborateurs.find(c => (c.Email||'').toLowerCase() === e);
  if (collab) {
    const isManager = db.equipes.some(t => (t.managerIds||[]).includes(String(collab.Id)));
    if (isManager) return 'manager';
  }

  return 'collaborateur';
}

function hasDroit(droit) {
  if (!currentUser) return false;
  const role = db.roles.find(r => r.name === currentUser.role);
  const droits = (role && role.droits && Object.keys(role.droits).length > 0)
    ? role.droits
    : (DROITS_DEFAUT[currentUser.role] || DROITS_DEFAUT.collaborateur);
  return !!droits[droit];
}

function getVisibleCollabs() {
  const email = (currentUser.email||'').toLowerCase();
  const me = db.collaborateurs.find(c => (c.Email||'').toLowerCase() === email);

  if (hasDroit('toutes_consultation')) return db.collaborateurs;

  if (hasDroit('equipe_consultation')) {
    if (!me) return [];
    const myTeams = db.equipes.filter(t => (t.managerIds||[]).includes(String(me.Id)));
    const myTeamIds = myTeams.map(t => String(t.id));
    return db.collaborateurs.filter(c =>
      String(c.Id) === String(me.Id) ||
      (c.teamIds||[]).some(tid => myTeamIds.includes(String(tid)))
    );
  }

  // Fiche propre uniquement
  return me ? [me] : [];
}

function getRareSkills() {
  const total = db.collaborateurs.length;
  const threshold = Math.max(2, Math.round(total * 0.2));
  const counts = {};
  db.competences.forEach(c => { if (c.Niveau > 0) counts[(c.SkillId || c.Title)] = (counts[(c.SkillId || c.Title)] || 0) + 1; });
  const rare = {};
  Object.entries(counts).forEach(([sid, n]) => { if (n <= threshold) rare[sid] = n; });
  return rare;
}

function renderMatrix() {
  const q = (document.getElementById('search-input') || {value:''}).value.toLowerCase();
  const rareMap = getRareSkills();
  const skills = SKILLS.filter(s => (!filterDomain || s.did === filterDomain) && (!q || s.name.toLowerCase().includes(q)));
  let collabs = getVisibleCollabs();
  if (filterTeam) collabs = collabs.filter(c => c.teamIds && c.teamIds.includes(filterTeam));
  const grouped = {};
  skills.forEach(s => { if (!grouped[s.did]) grouped[s.did] = []; grouped[s.did].push(s); });

  let h = `<div class="legend">
    <span class="legend-item"><span class="ldot l1">1</span>Débutant</span>
    <span class="legend-item"><span class="ldot l2">2</span>Inter.</span>
    <span class="legend-item"><span class="ldot l3">3</span>Avancé</span>
    <span class="legend-item"><span class="ldot l4">4</span>Expert</span>
    <span style="font-size:11px;color:#7A3A28;margin-left:6px">■ compétence rare</span>
    <span style="font-size:11px;color:#aaa;margin-left:6px">● encerclé = cible du poste</span>
  </div>
  <div class="filters">
    <select onchange="filterTeam=this.value;applyFilters()">
      <option value="">Toutes les équipes</option>
      ${db.equipes.map(t => `<option value="${t.id}"${filterTeam===t.id?' selected':''}>${t.name}</option>`).join('')}
    </select>
    <select onchange="filterDomain=this.value;applyFilters()">
      <option value="">Tous les domaines</option>
      ${DOMAINS.map(d => `<option value="${d.id}"${filterDomain===d.id?' selected':''}>${d.name}</option>`).join('')}
    </select>
  </div>
  <div class="matrix-wrap"><table class="mx"><thead><tr>
    <th>Compétence</th>
    ${collabs.map(c => `<th title="${c.prenom} ${c.Nom||''}">${(c.prenom||'?')[0]}${(c.Nom||'?')[0]}<br><span style="font-size:10px;font-weight:400">${c.prenom}</span></th>`).join('')}
  </tr></thead><tbody>`;

  DOMAINS.forEach(dom => {
    const list = grouped[dom.id];
    if (!list || !list.length) return;
    h += `<tr><td colspan="${collabs.length+1}" class="dr" style="background:${dom.bg};color:${dom.c}">${dom.name}</td></tr>`;
    list.forEach(sk => {
      const isRare = !!rareMap[sk.id];
      h += `<tr><td><span class="twrap${isRare?' sk-rare':''}">${sk.name}${isRare?`<span class="rare-pill">rare</span>`:''}${skillTT(sk)}</span></td>`;
      collabs.forEach(c => {
        const comps  = getCollabComps(c.Id);
        const lvl    = comps[sk.id] || 0;
        const poste  = posteById(c.PosteId);
        const target = poste && poste.targets[sk.id] !== undefined ? poste.targets[sk.id] : null;
        h += `<td><div class="cell" onclick="openCollabModal('${c.Id}','${sk.id}')">`;
        if (lvl > 0)      h += `<span class="twrap"><span class="lb l${lvl}${target!=null&&lvl===target?' l-ring':''}">${lvl}</span>${levelTT(sk,lvl,'tup')}</span>`;
        else if (target!=null) h += `<span class="lb" style="border:1.5px dashed #ccc;color:#ccc;font-size:10px">—</span>`;
        else              h += `<span style="color:#e0ded8;font-size:18px">·</span>`;
        h += `</div></td>`;
      });
      h += `</tr>`;
    });
  });
  h += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = h;
}

// =====================================================================
function renderCollabs() {
  const q = (document.getElementById('search-input') || {value:''}).value.toLowerCase();
  let list = getVisibleCollabs().filter(c => {
    const fn = ((c.prenom||'') + ' ' + (c.Nom||'')).toLowerCase();
    const p  = posteById(c.PosteId);
    return (!filterTeam || c.teamIds && c.teamIds.includes(filterTeam))
        && (!filterPoste || c.PosteId === filterPoste)
        && (!q || fn.includes(q) || (p && p.name.toLowerCase().includes(q)));
  });
  let h = `<div class="filters">
    <select onchange="filterTeam=this.value;applyFilters()">
      <option value="">Toutes les équipes</option>
      ${db.equipes.map(t => `<option value="${t.id}"${filterTeam===t.id?' selected':''}>${t.name}</option>`).join('')}
    </select>
    <select onchange="filterPoste=this.value;applyFilters()">
      <option value="">Tous les postes</option>
      ${POSTES.map(p => `<option value="${p.id}"${filterPoste===p.id?' selected':''}>${p.name}</option>`).join('')}
    </select>
  </div><div class="collab-grid">`;
  list.forEach(c => {
    const p = posteById(c.PosteId);
    const comps   = getCollabComps(c.Id);
    const targets = p ? Object.entries(p.targets).filter(([,v]) => v != null) : [];
    const ok  = targets.filter(([k,v]) => (comps[k]||0) >= v).length;
    const pct = targets.length ? Math.round(ok / targets.length * 100) : null;
    const teams = (c.teamIds||[]).map(tid => { const t = teamById(tid); return t ? `<span class="team-tag">${t.name}</span>` : ''; }).join('');
    h += `<div class="collab-card" onclick="openCollabModal('${c.Id}')">
      <div class="av">${(c.prenom||'?')[0]}${(c.Nom||'?')[0]}</div>
      <div class="cname">${c.prenom||''} ${c.Nom||''}</div>
      <div class="cposte">${p ? p.name : '—'}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px">${teams}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <span class="stat-pill">${Object.keys(comps).length} compétences</span>
        ${pct != null ? `<span class="stat-pill">${pct}% objectifs</span>` : ''}
      </div>
      ${pct != null ? `<div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>` : ''}
    </div>`;
  });
  if (!list.length) h += `<div class="empty" style="grid-column:1/-1"><i class="ti ti-users"></i>Aucun collaborateur trouvé</div>`;
  h += `</div>`;
  document.getElementById('content').innerHTML = h;
}

function openCollabModal(id, focusSkill) {
  const meId = String(db.collaborateurs.find(c => (c.Email||'').toLowerCase() === (currentUser.email||'').toLowerCase())?.Id || '');
  const isMine = id && String(id) === meId;
  const isInMyScope = !isMine && getVisibleCollabs().some(c => String(c.Id) === String(id));

  // Vérification des droits d'accès
  if (id && !isMine && !hasDroit('equipe_consultation') && !hasDroit('toutes_consultation')) return;

  const c = id ? db.collaborateurs.find(x => String(x.Id) === String(id)) : null;
  collabEdit = c ? JSON.parse(JSON.stringify(c)) : { Id:null, prenom:'', Nom:'', Email:'', PosteId:'', teamIds:[], ManagerID:'' };
  collabEdit._comps    = id ? getCollabComps(id) : {};
  collabEdit._comments = id ? getCollabComments(id) : {};
  collabEdit._history  = id ? getCollabHistory(id) : [];
  collabEdit._changes  = {};

  document.getElementById('m-av').textContent = (collabEdit.prenom||'?')[0] + (collabEdit.Nom||'?')[0];
  document.getElementById('m-title').textContent = id ? `${collabEdit.prenom} ${collabEdit.Nom||''}` : 'Nouveau collaborateur';
  const p = posteById(collabEdit.PosteId);
  document.getElementById('m-sub').textContent = p ? p.name : '—';
  renderCollabBody(focusSkill);

  // Droits d'édition selon le contexte
  const canEdit = !id
    ? hasDroit('administration')
    : isMine
      ? hasDroit('fiche_propre_modification')
      : isInMyScope
        ? hasDroit('equipe_modification')
        : hasDroit('toutes_modification');

  document.getElementById('m-footer').innerHTML = `
    ${id && hasDroit('administration') ? `<button class="btn btn-danger btn-sm" style="margin-right:auto" onclick="deleteCollab('${id}')"><i class="ti ti-trash"></i>Supprimer</button>` : ''}
    <button class="btn" onclick="closeModal()">Fermer</button>
    ${canEdit ? `<button class="btn btn-primary" onclick="saveCollab('${id||''}')"><i class="ti ti-check"></i>Enregistrer</button>` : ''}`;
  document.getElementById('modal').style.display = 'flex';
  if (focusSkill) setTimeout(() => document.querySelector('[data-focus]')?.scrollIntoView({block:'center',behavior:'smooth'}), 80);
}

function setLvl(sid, lvl) {
  const old = collabEdit._comps[sid] || 0;
  if (lvl === 0) delete collabEdit._comps[sid]; else collabEdit._comps[sid] = lvl;
  if (old !== lvl) {
    const sk = skillById(sid);
    collabEdit._changes[sid] = { old, new: lvl };
  }
  const poste  = posteById(collabEdit.PosteId) || { targets:{} };
  const target = poste.targets[sid];
  document.querySelectorAll(`[onclick^="setLvl('${sid}'"]`).forEach((btn, i) => {
  btn.className = 'lvl-btn';
  btn.style.outline = '';
  btn.style.background = '';
  btn.style.color = '';
  if (i === 0) return;
  const n = i;
  const lvlActuel = collabEdit._comps[sid] || 0;
  if (lvlActuel === n) {
    if (target != null && lvlActuel >= target) {
      btn.style.background = '#D1E7DD'; btn.style.color = '#0A3622'; // vert
    } else if (target != null && lvlActuel < target) {
      btn.style.background = '#FFF3CD'; btn.style.color = '#856404'; // jaune
    } else {
      btn.className = `lvl-btn a${n}`; // couleur par défaut si pas de cible
    }
  }
  if (target === n) btn.style.outline = '2px solid #534AB7';
});
}

async function saveCollab(id) {
  const prenom = document.getElementById('c-prenom').value.trim();
  const nom    = document.getElementById('c-nom').value.trim();
  if (!prenom || !nom) { alert('Veuillez renseigner prénom et nom.'); return; }
  showSave('Enregistrement...');
  try {
    const collabData = {
      Title:     prenom,
      Prenom:       nom,
      Email:     document.getElementById('c-email').value.trim(),
      PosteId:   document.getElementById('c-poste').value,
      TeamIds:   (collabEdit.teamIds || []).join(','),
      ManagerID: document.getElementById('c-manager').value || ''
    };
    let collabSpId = id;
    if (id) {
      await spPatch(CONFIG.lists.collaborateurs, id, collabData);
    } else {
      const res = await spPost(CONFIG.lists.collaborateurs, collabData);
      collabSpId = res.Id;
    }

    // Compétences
    for (const [sid, lvl] of Object.entries(collabEdit._comps)) {
      const existing = db.competences.find(c => String(c.CollabId) === String(collabSpId) && (c.SkillId || c.Title) === sid);
      if (existing) {
        if (parseInt(existing.Niveau) !== lvl) await spPatch(CONFIG.lists.competences, existing.Id, { Niveau: lvl });
      } else {
        await spPost(CONFIG.lists.competences, { Title: sid, CollabId: String(collabSpId), Niveau: lvl });
      }
    }
    // Supprime les compétences retirées
    for (const c of db.competences.filter(c => String(c.CollabId) === String(collabSpId) && !collabEdit._comps[(c.SkillId || c.Title)])) {
      await spDelete(CONFIG.lists.competences, c.Id);
    }

    // Commentaires
    for (const sk of SKILLS) {
      const mgrEl = document.getElementById('cm-mgr-' + sk.id);
      const colEl = document.getElementById('cm-col-' + sk.id);
      if (mgrEl && mgrEl.value.trim()) {
        await spPost(CONFIG.lists.commentaires, { Title: String(collabSpId), SkillId: sk.id, TypeAuteur: 'manager', Contenu: mgrEl.value.trim(), DateSaisie: new Date().toISOString() });
      }
      if (colEl && colEl.value.trim()) {
        await spPost(CONFIG.lists.commentaires, { Title: String(collabSpId), SkillId: sk.id, TypeAuteur: 'collaborateur', Contenu: colEl.value.trim(), DateSaisie: new Date().toISOString() });
      }
    }

    // Historique
    for (const [sid, ch] of Object.entries(collabEdit._changes)) {
      const sk = skillById(sid);
      await spPost(CONFIG.lists.historique, {
        Title:       String(collabSpId),
        Role:        currentUser.role,
        Description: `"${sk ? sk.name : sid}" : ${ch.old ? 'niveau '+ch.old : '—'} → ${ch.new ? 'niveau '+ch.new : 'retiré'}`,
        DateAction:  new Date().toISOString()
      });
    }

    await loadData();
    hideSave('Enregistré ✓');
    closeModal();
    if (currentView === 'matrix') renderMatrix();
    else if (currentView === 'admin-collabs') renderAdminCollabs();
    else renderCollabs();
  } catch (e) {
    hideSave('Erreur !');
    alert('Erreur lors de l\'enregistrement : ' + e.message);
  }
}

      ? db.collaborateurs.filter(x => teamManagerIds.includes(String(x.Id)) && String(x.Id) !== String(c.Id))

async function quickUpdateManager(collabId, managerId) {
  const c = db.collaborateurs.find(x => String(x.Id) === String(collabId));
  if (c) c.ManagerID = managerId;
  hideSave('Manager mis à jour ✓');

  pendingSaves++;
  spPatch(CONFIG.lists.collaborateurs, collabId, { ManagerID: managerId })
    .catch(e => alert('Erreur enregistrement manager : ' + e.message))
    .finally(() => pendingSaves--);
}

async function quickUpdateRole(collabId, email, newRole) {
  if (!email) return alert('Ce collaborateur n\'a pas d\'email renseigné.');
  const emailLow = email.toLowerCase();
  showSave('Mise à jour du rôle...');
  try {
    // Retirer l'email de tous les rôles existants
    for (const role of db.roles) {
      if (role.emails.includes(emailLow)) {
        const newEmails = role.emails.filter(e => e !== emailLow).join(',');
        await spPatch(CONFIG.lists.roles, role.spId, { Emails: newEmails });
      }
    }
    // Ajouter au nouveau rôle (sauf collaborateur = rôle par défaut, pas besoin de l'enregistrer)
    if (newRole !== 'collaborateur') {
      const targetRole = db.roles.find(r => r.name === newRole);
      if (targetRole) {
        const newEmails = [...targetRole.emails.filter(e => e !== emailLow), emailLow].join(',');
        await spPatch(CONFIG.lists.roles, targetRole.spId, { Emails: newEmails });
      } else {
        // Créer l'entrée de rôle si elle n'existe pas encore
        const droits = JSON.stringify(DROITS_DEFAUT[newRole] || {});
        await spPost(CONFIG.lists.roles, { Title: newRole, Emails: emailLow, Droits: droits });
      }
    }
    await loadData();
    hideSave('Rôle mis à jour ✓');
    renderAdminCollabs();
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}
  async function toggleTeam(collabId, teamId, el) {
  const c = db.collaborateurs.find(x => String(x.Id) === String(collabId));
  if (!c) return;
  const isSelected = c.teamIds.includes(String(teamId));
  if (!isSelected && c.teamIds.length >= 2) {
    alert('Maximum 2 équipes.');
    return;
  }
  if (isSelected) {
    c.teamIds = c.teamIds.filter(t => t !== String(teamId));
    el.style.background = '#fff';
    el.style.borderColor = '#D3D1C7';
    el.style.color = '#5F5E5A';
  } else {
    c.teamIds.push(String(teamId));
    el.style.background = '#EEEDFE';
    el.style.borderColor = '#534AB7';
    el.style.color = '#534AB7';
  }
  pendingSaves++;
  spPatch(CONFIG.lists.collaborateurs, collabId, { TeamIds: c.teamIds.join(',') })
    .catch(e => alert('Erreur : ' + e.message))
    .finally(() => pendingSaves--);
}

async function savePoste(id) {
  const name = document.getElementById('p-name').value.trim();
  if (!name) return alert('Nom requis.');
  const targets = {};
  SKILLS.forEach(sk => {
    const v = document.getElementById('pt-' + sk.id).value;
    if (v !== '') targets[sk.id] = parseInt(v);
  });
  showSave();
  try {
    const data = { Title: name, Targets: JSON.stringify(targets) };
    const isSpId = id && !isNaN(Number(id));
    if (isSpId) {
      await spPatch(CONFIG.lists.postes, id, data);
    } else {
      // Poste statique non encore migré : on en crée une version SharePoint.
      // Les collaborateurs référençant l'ancien identifiant statique devront être
      // mis à jour via "Migrer vers SharePoint" pour les autres postes restants.
      await spPost(CONFIG.lists.postes, data);
    }
    await loadData();
    closeModal();
    renderAdminPostes();
    hideSave('Poste enregistré ✓');
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}

async function deletePoste(id) {
  const isSpId = id && !isNaN(Number(id));
  if (!isSpId) {
    alert('Ce poste n\'est pas encore enregistré dans SharePoint. Utilisez d\'abord "Migrer vers SharePoint" dans cet onglet.');
    return;
  }
  if (!confirm('Supprimer ce poste ?')) return;
  showSave('Suppression...');
  try {
    await spDelete(CONFIG.lists.postes, id);
    await loadData();
    hideSave('Supprimé ✓');
    renderAdminPostes();
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}

// Migre les postes statiques (POST_xxx) vers SharePoint :
// - recalcule les cibles de compétences vers les nouveaux identifiants numériques (via le nom)
// - met à jour le PosteId des collaborateurs qui référencent les anciens identifiants statiques
async function migratePostes() {
  const staticPostes = POSTES.filter(p => isNaN(Number(p.id)));
  if (!staticPostes.length) return alert('Tous les postes sont déjà dans SharePoint.');
  if (!confirm(`Migrer ${staticPostes.length} poste(s) vers SharePoint ?\n\nLes niveaux cibles seront recalculés vers les identifiants actuels des compétences, et les fiches des collaborateurs concernés seront mises à jour.\n\nCette opération est rapide mais ne doit pas être interrompue (ne fermez pas la page).`)) return;

  showSave('Migration des postes...');
  try {
    // 1. Correspondance ancien id de compétence (COMP_xxx) -> nouvel id numérique, via le nom
    const nameToNewSkillId = {};
    SKILLS.forEach(s => { nameToNewSkillId[s.name.trim()] = s.id; });
    const skillIdMap = {};
    OLD_SKILLS_REF.forEach(([oldId, name]) => {
      const newId = nameToNewSkillId[name.trim()];
      if (newId) skillIdMap[oldId] = newId;
    });

    // 2. Création des postes dans SharePoint avec cibles corrigées
    const posteIdMap = {};
    let i = 0;
    for (const p of staticPostes) {
      i++;
      document.getElementById('save-msg').textContent = `Migration poste ${i}/${staticPostes.length}...`;
      const newTargets = {};
      Object.entries(p.targets || {}).forEach(([sid, lvl]) => {
        newTargets[skillIdMap[sid] || sid] = lvl;
      });
      const res = await spPost(CONFIG.lists.postes, { Title: p.name, Targets: JSON.stringify(newTargets) });
      posteIdMap[p.id] = String(res.Id);
    }

    // 3. Mise à jour du PosteId des collaborateurs concernés
    const collabsToUpdate = db.collaborateurs.filter(c => posteIdMap[c.PosteId]);
    for (let j = 0; j < collabsToUpdate.length; j++) {
      document.getElementById('save-msg').textContent = `Mise à jour des collaborateurs (${j+1}/${collabsToUpdate.length})...`;
      const c = collabsToUpdate[j];
      await spPatch(CONFIG.lists.collaborateurs, c.Id, { PosteId: posteIdMap[c.PosteId] });
    }

    await loadData();
    hideSave('Migration terminée ✓');
    renderAdminPostes();
    alert(`Migration réussie !\n${staticPostes.length} poste(s) migré(s) avec cibles corrigées.\n${collabsToUpdate.length} collaborateur(s) réassigné(s).`);
  } catch(e) {
    hideSave('Erreur migration !');
    alert('Erreur pendant la migration : ' + e.message + '\n\nLa migration est partielle. Vérifiez la liste Postes dans SharePoint (doublons possibles) avant de relancer.');
    console.error(e);
  }
}

  const name = document.getElementById('sk-name').value.trim();
  if (!name) return alert('Nom requis.');
  const did = document.getElementById('sk-did').value;
  const levels = {
    1: document.getElementById('sk-l1').value.trim(),
    2: document.getElementById('sk-l2').value.trim(),
    3: document.getElementById('sk-l3').value.trim(),
    4: document.getElementById('sk-l4').value.trim()
  };
  showSave();
  try {
    const data = { Title: name, DomainId: did, Niveaux: JSON.stringify(levels) };
    const isSpId = id && !isNaN(Number(id));
    if (isSpId) {
      await spPatch(CONFIG.lists.competencesRef, id, data);
    } else if (id) {
      // Compétence statique (COMP_xxx) : créer dans SharePoint puis mettre à jour les références
      const res = await spPost(CONFIG.lists.competencesRef, data);
      const newId = String(res.Id);
      // Mettre à jour toutes les entrées Competences qui référencent l'ancien ID
      const toUpdate = db.competences.filter(c => (c.SkillId || c.Title) === id);
      for (const c of toUpdate) {
        await spPatch(CONFIG.lists.competences, c.Id, { Title: newId });
      }
      // Mettre à jour les Commentaires
      const comsToUpdate = db.commentaires.filter(c => c.SkillId === id);
      for (const c of comsToUpdate) {
        await spPatch(CONFIG.lists.commentaires, c.Id, { SkillId: newId });
      }
    } else {
      await spPost(CONFIG.lists.competencesRef, data);
    }
    await loadData();
    closeModal();
    renderAdminSkills();
    hideSave('Compétence enregistrée ✓');
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}

async function deleteSkill(id) {
  if (!confirm('Supprimer cette compétence ? Les niveaux et commentaires associés seront également supprimés.')) return;
  showSave('Suppression...');
  try {
    const isSpId = id && !isNaN(Number(id));
    if (isSpId) {
      await spDelete(CONFIG.lists.competencesRef, id);
      // Supprimer les niveaux associés
      for (const c of db.competences.filter(c => (c.SkillId || c.Title) === id)) {
        await spDelete(CONFIG.lists.competences, c.Id);
      }
      // Supprimer les commentaires associés
      for (const c of db.commentaires.filter(c => c.SkillId === id)) {
        await spDelete(CONFIG.lists.commentaires, c.Id);
      }
    } else {
      // Compétence statique non encore migrée : retirer de la mémoire uniquement
      const idx = SKILLS.findIndex(s => s.id === id);
      if (idx >= 0) SKILLS.splice(idx, 1);
    }
    await loadData();
    hideSave('Supprimée ✓');
    renderAdminSkills();
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}

// Migration complète des compétences statiques vers SharePoint
// avec mise à jour des références dans Competences et Commentaires
async function migrateSkills() {
  const staticSkills = SKILLS.filter(s => isNaN(Number(s.id)));
  if (!staticSkills.length) return alert('Toutes les compétences sont déjà dans SharePoint.');
  if (!confirm(`Migrer ${staticSkills.length} compétence(s) statique(s) vers SharePoint ?\n\nCette opération va :\n1. Créer les compétences dans CompetencesRef\n2. Mettre à jour toutes les références dans Competences\n3. Mettre à jour toutes les références dans Commentaires\n\nCela peut prendre plusieurs minutes.`)) return;

  showSave('Migration en cours...');
  try {
    // Construire une table de correspondance ancienId -> nouvelId
    const idMap = {};
    let i = 0;
    for (const sk of staticSkills) {
      i++;
      document.getElementById('save-msg').textContent = `Migration ${i}/${staticSkills.length}...`;
      const res = await spPost(CONFIG.lists.competencesRef, {
        Title:    sk.name,
        DomainId: sk.did,
        Niveaux:  JSON.stringify(sk.levels)
      });
      idMap[sk.id] = String(res.Id);
    }

    // Mettre à jour la liste Competences (niveaux des collaborateurs)
    const compsToUpdate = db.competences.filter(c => idMap[(c.SkillId || c.Title)]);
    document.getElementById('save-msg').textContent = `Mise à jour de ${compsToUpdate.length} entrées Competences...`;
    for (const c of compsToUpdate) {
      const oldId = c.SkillId || c.Title;
      await spPatch(CONFIG.lists.competences, c.Id, { Title: idMap[oldId] });
    }

    // Mettre à jour la liste Commentaires
    const comsToUpdate = db.commentaires.filter(c => idMap[c.SkillId]);
    document.getElementById('save-msg').textContent = `Mise à jour de ${comsToUpdate.length} commentaires...`;
    for (const c of comsToUpdate) {
      await spPatch(CONFIG.lists.commentaires, c.Id, { SkillId: idMap[c.SkillId] });
    }

    // Mettre à jour les targets des postes (JSON stocké dans SharePoint)
    document.getElementById('save-msg').textContent = 'Mise à jour des cibles de postes...';
    for (const poste of POSTES) {
      const isSpId = poste.id && !isNaN(Number(poste.id));
      if (!isSpId) continue;
      let updated = false;
      const newTargets = {};
      for (const [sid, lvl] of Object.entries(poste.targets || {})) {
        const newSid = idMap[sid] || sid;
        if (newSid !== sid) updated = true;
        newTargets[newSid] = lvl;
      }
      if (updated) {
        await spPatch(CONFIG.lists.postes, poste.id, { Targets: JSON.stringify(newTargets) });
      }
    }

    await loadData();
    hideSave('Migration terminée ✓');
    renderAdminSkills();
    alert(`Migration réussie !\n${staticSkills.length} compétences migrées.\n${compsToUpdate.length} niveaux mis à jour.\n${comsToUpdate.length} commentaires mis à jour.`);
  } catch(e) {
    hideSave('Erreur migration !');
    alert('Erreur pendant la migration : ' + e.message + '\n\nLa migration est partielle. Relancez-la pour continuer.');
    console.error(e);
  }
}

async function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const wb   = XLSX.read(ev.target.result, { type:'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
      showSave('Import en cours...');

      // Regrouper par email (ou prénom+nom si pas d'email)
      const collabMap = {};
      rows.forEach(row => {
        const prenom     = (row['Prénom'] || row['prenom'] || '').toString().trim();
        const nom        = (row['NOM']    || row['Nom']    || row['nom'] || '').toString().trim();
        const email      = (row['Mail']   || row['Email']  || row['email'] || '').toString().trim().toLowerCase();
        const posteName  = (row['Poste']  || row['poste']  || '').toString().trim();
        const skillName  = (row['Compétence'] || row['Competence'] || row['competence'] || '').toString().trim();
        const niveau     = parseInt(row['Niveau'] || row['niveau'] || 0);
        const commentaire = (row['Commentaire'] || row['commentaire'] || '').toString().trim();

        if (!prenom && !email) return;
        const key = email || `${prenom}_${nom}`;
        if (!collabMap[key]) collabMap[key] = { prenom, nom, email, posteName, comps:{}, comments:{} };

        // Résolution par nom de compétence
        const sk = skillByName(skillName);
        if (sk && niveau >= 1 && niveau <= 4) {
          // Garder le niveau le plus élevé si plusieurs lignes
          if (!collabMap[key].comps[sk.id] || collabMap[key].comps[sk.id] < niveau) {
            collabMap[key].comps[sk.id] = niveau;
          }
          if (commentaire && !collabMap[key].comments[sk.id]) {
            collabMap[key].comments[sk.id] = commentaire;
          }
        }
      });

      let added = 0, updated = 0;
      for (const c of Object.values(collabMap)) {
        const poste = POSTES.find(p => p.name.toLowerCase().trim() === c.posteName.toLowerCase().trim());
        const ex    = db.collaborateurs.find(x =>
          (c.email && (x.Email||'').toLowerCase() === c.email) ||
          ((x.prenom||'').toLowerCase() === c.prenom.toLowerCase() && (x.Nom||'').toLowerCase() === c.nom.toLowerCase())
        );
        let cid;
        if (ex) {
          await spPatch(CONFIG.lists.collaborateurs, ex.Id, {
            Title: c.prenom, Prenom: c.nom, Email: c.email,
            PosteId: poste ? poste.id : (ex.PosteId || '')
          });
          cid = ex.Id;
          updated++;
        } else {
          const res = await spPost(CONFIG.lists.collaborateurs, {
            Title: c.prenom, Prenom: c.nom, Email: c.email,
            PosteId: poste ? poste.id : '', TeamIds: '', ManagerID: ''
          });
          cid = res.Id;
          added++;
        }

        // Compétences
        for (const [sid, lvl] of Object.entries(c.comps)) {
          const existing = db.competences.find(x => String(x.CollabId) === String(cid) && x.SkillId === sid);
          if (existing) {
            if (parseInt(existing.Niveau) !== lvl) await spPatch(CONFIG.lists.competences, existing.Id, { Niveau: lvl });
          } else {
            await spPost(CONFIG.lists.competences, { Title: sid, CollabId: String(cid), Niveau: lvl });
          }
        }

        // Commentaires manager
        for (const [sid, com] of Object.entries(c.comments)) {
          const alreadyExists = db.commentaires.find(x => String(x.Title) === String(cid) && x.SkillId === sid && x.TypeAuteur === 'manager');
          if (!alreadyExists) {
            await spPost(CONFIG.lists.commentaires, {
              Title: String(cid), SkillId: sid,
              TypeAuteur: 'manager', Contenu: com,
              DateSaisie: new Date().toISOString()
            });
          }
        }
      }

      await loadData();
      hideSave('Import terminé ✓');
      document.getElementById('fb').innerHTML = `<div class="fb-ok"><i class="ti ti-check"></i> ${added} collaborateur(s) ajouté(s), ${updated} mis à jour.</div>`;
    } catch (err) {
      hideSave('Erreur !');
      document.getElementById('fb').innerHTML = `<div class="fb-err"><i class="ti ti-alert-triangle"></i> Erreur : ${err.message}</div>`;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function flashMessage(msg) {
  const el = document.getElementById('save-indicator');
  document.getElementById('save-msg').textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// Construit les lignes exportables pour le collaborateur en cours d'édition (collabEdit)
function getCollabExportRows() {
  const c     = collabEdit;
  const poste = posteById(c.PosteId) || { targets:{} };
  const grouped = {};
  SKILLS.forEach(s => { if (!grouped[s.did]) grouped[s.did] = []; grouped[s.did].push(s); });

  const rows = [];
  DOMAINS.forEach(dom => {
    const list = grouped[dom.id] || [];
    list.forEach(sk => {
      const lvl    = c._comps[sk.id] || 0;
      const target = poste.targets[sk.id];
      const cm     = c._comments[sk.id] || {};
      const hasCm  = cm.manager || cm.collaborateur;
      // On exporte uniquement les compétences pertinentes : ciblées par le poste,
      // renseignées (niveau > 0), ou commentées
      if (target == null && lvl === 0 && !hasCm) return;
      rows.push({
        domaine: dom.name,
        competence: sk.name,
        niveau: lvl || '',
        niveauLabel: lvl ? (sk.levels[lvl] || '') : '',
        cible: target != null ? target : '',
        cibleLabel: target != null ? (sk.levels[target] || '') : '',
        commentaireManager: cm.manager || '',
        commentaireCollaborateur: cm.collaborateur || ''
      });
    });
  });
  return rows;
}

function buildHtmlTable(rows) {
  let html = `<table style="border-collapse:collapse;font-family:Arial,sans-serif;font-size:11pt">
    <tr>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:left">Domaine</th>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:left">Compétence</th>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:center">Niveau actuel</th>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:center">Niveau cible</th>
      <th style="border:1px solid #999;padding:5px 8px;background:#534AB7;color:#fff;text-align:left">Commentaires</th>
    </tr>`;
  rows.forEach(r => {
    const commentaire = [
      r.commentaireManager       ? `Manager : ${r.commentaireManager}` : '',
      r.commentaireCollaborateur ? `Collaborateur : ${r.commentaireCollaborateur}` : ''
    ].filter(Boolean).join(' — ');
    html += `<tr>
      <td style="border:1px solid #999;padding:5px 8px">${escapeHtml(r.domaine)}</td>
      <td style="border:1px solid #999;padding:5px 8px">${escapeHtml(r.competence)}</td>
      <td style="border:1px solid #999;padding:5px 8px;text-align:center">${r.niveau !== '' ? r.niveau : '—'}</td>
      <td style="border:1px solid #999;padding:5px 8px;text-align:center">${r.cible !== '' ? r.cible : '—'}</td>
      <td style="border:1px solid #999;padding:5px 8px">${escapeHtml(commentaire)}</td>
    </tr>`;
  });
  html += `</table>`;
  return html;
}

function buildPlainText(rows) {
  const lines = [['Domaine','Compétence','Niveau actuel','Niveau cible','Commentaires'].join('\t')];
  rows.forEach(r => {
    const commentaire = [
      r.commentaireManager       ? `Manager : ${r.commentaireManager}` : '',
      r.commentaireCollaborateur ? `Collaborateur : ${r.commentaireCollaborateur}` : ''
    ].filter(Boolean).join(' — ');
    lines.push([r.domaine, r.competence, r.niveau!==''?r.niveau:'—', r.cible!==''?r.cible:'—', commentaire].join('\t'));
  });
  return lines.join('\n');
}

// Copie un tableau HTML dans le presse-papier (collable directement dans Word)
function copyCollabTable() {
  const rows = getCollabExportRows();
  if (!rows.length) { alert('Aucune compétence à exporter pour ce collaborateur.'); return; }
  const html = buildHtmlTable(rows);
  const text = buildPlainText(rows);

  if (navigator.clipboard && window.ClipboardItem) {
    try {
      const item = new ClipboardItem({
        'text/html':  new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([text], { type: 'text/plain' })
      });
      navigator.clipboard.write([item]).then(
        () => flashMessage('Tableau copié ✓ — collez-le dans Word (Ctrl+V)'),
        () => fallbackCopy(html)
      );
      return;
    } catch (e) {
      fallbackCopy(html);
      return;
    }
  }
  fallbackCopy(html);
}

// Méthode de repli pour copier le tableau HTML (navigateurs sans Clipboard API moderne)
function fallbackCopy(html) {
  const div = document.createElement('div');
  div.contentEditable = 'true';
  div.style.position = 'fixed';
  div.style.left = '-9999px';
  div.innerHTML = html;
  document.body.appendChild(div);
  const range = document.createRange();
  range.selectNodeContents(div);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try {
    document.execCommand('copy');
    flashMessage('Tableau copié ✓ — collez-le dans Word (Ctrl+V)');
  } catch (e) {
    alert('La copie automatique a échoué. Sélectionnez manuellement le tableau et utilisez Ctrl+C.');
  } finally {
    sel.removeAllRanges();
    document.body.removeChild(div);
  }
}

    h += `<div class="admin-card" style="margin-bottom:14px">
      <div style="padding:8px 16px;font-size:11px;font-weight:600;text-transform:uppercase;
        letter-spacing:.05em;background:${dom.bg};color:${dom.c};border-radius:8px 8px 0 0">${dom.name}</div>
      <table class="adm"><thead>
        <tr><th>Compétence</th><th style="text-align:center">Niveau 1</th><th style="text-align:center">Niveau 2</th>
        <th style="text-align:center">Niveau 3</th><th style="text-align:center">Niveau 4</th><th style="text-align:center">Total</th></tr>
      </thead><tbody>`;
    list.forEach(sk => {
      const stats = getStats(sk.id);
      const total = Object.values(stats).flat().length;
      h += `<tr style="cursor:pointer" onclick="showSkillDetail('${sk.id}')" title="Cliquer pour voir les personnes">
        <td style="font-weight:500">${sk.name}</td>
        ${[1,2,3,4].map(n => `
          <td style="text-align:center">
            ${stats[n].length > 0
              ? `<span class="stat-pill lb l${n}" style="cursor:pointer">${stats[n].length}</span>`
              : '<span style="color:#ccc">—</span>'}
          </td>`).join('')}
        <td style="text-align:center"><span class="stat-pill">${total}</span></td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  });

  h += `</div>`;
  document.getElementById('content').innerHTML = h;
}

function filterSkillSearch(query) {
  const resultsEl = document.getElementById('skill-search-results');
  const allEl = document.getElementById('skill-search-all');
  if (!query.trim()) {
    resultsEl.innerHTML = '';
    allEl.style.display = '';
    return;
  }
  allEl.style.display = 'none';
  const matches = SKILLS.filter(s => s.name.toLowerCase().includes(query.toLowerCase()));
  if (!matches.length) {
    resultsEl.innerHTML = `<p style="color:#aaa;font-size:13px">Aucune compétence trouvée.</p>`;
    return;
  }
  let h = `<div class="admin-card">
    <table class="adm"><thead>
      <tr><th>Compétence</th><th style="text-align:center">Niveau 1</th><th style="text-align:center">Niveau 2</th>
      <th style="text-align:center">Niveau 3</th><th style="text-align:center">Niveau 4</th><th style="text-align:center">Total</th></tr>
    </thead><tbody>`;
  matches.forEach(sk => {
    const stats = {};
    [1,2,3,4].forEach(n => { stats[n] = []; });
    db.collaborateurs.forEach(c => {
      const comps = getCollabComps(c.Id);
      const lvl = comps[sk.id];
      if (lvl && stats[lvl]) stats[lvl].push(c);
    });
    const total = Object.values(stats).flat().length;
    h += `<tr style="cursor:pointer" onclick="showSkillDetail('${sk.id}')" title="Cliquer pour voir les personnes">
      <td style="font-weight:500">${sk.name}</td>
      ${[1,2,3,4].map(n => `
        <td style="text-align:center">
          ${stats[n].length > 0
            ? `<span class="stat-pill lb l${n}" style="cursor:pointer">${stats[n].length}</span>`
            : '<span style="color:#ccc">—</span>'}
        </td>`).join('')}
      <td style="text-align:center"><span class="stat-pill">${total}</span></td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  resultsEl.innerHTML = h;
}

function showSkillDetail(skillId) {
  const sk = SKILLS.find(s => s.id === skillId);
  if (!sk) return;
  const dom = DOMAINS.find(d => d.id === sk.did);
  const byLevel = { 1:[], 2:[], 3:[], 4:[] };
  db.collaborateurs.forEach(c => {
    const comps = getCollabComps(c.Id);
    const lvl = comps[skillId];
    if (lvl && byLevel[lvl]) byLevel[lvl].push(c);
  });
  const total = Object.values(byLevel).flat().length;
  document.getElementById('m-av').innerHTML = `<i class="ti ti-award" style="font-size:20px"></i>`;
  document.getElementById('m-title').textContent = sk.name;
  document.getElementById('m-sub').textContent = `${dom ? dom.name : ''} · ${total} personne(s)`;
  let body = '';
  [4,3,2,1].forEach(n => {
    if (!byLevel[n].length) return;
    body += `<div style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span class="lb l${n}" style="width:20px;height:20px;font-size:11px">${n}</span>
        <span style="font-size:12px;font-weight:600;color:#5F5E5A">${sk.levels && sk.levels[n] ? sk.levels[n] : 'Niveau '+n}</span>
        <span class="stat-pill">${byLevel[n].length}</span>
      </div>`;
    byLevel[n].forEach(c => {
      const p = posteById(c.PosteId);
      body += `<div style="display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:6px;background:#f5f5f0;margin-bottom:4px">
        <div style="flex:1">
          <div style="font-weight:500;font-size:13px">${c.prenom} ${c.Nom||''}</div>
          <div style="font-size:11px;color:#5F5E5A">${p ? p.name : '—'}</div>
        </div>
      </div>`;
    });
    body += `</div>`;
  });
  if (!total) body = `<p style="color:#aaa;font-size:13px">Personne n'a encore cette compétence.</p>`;
  document.getElementById('m-body').innerHTML = body;
  document.getElementById('m-footer').innerHTML = `<button class="btn" onclick="closeModal()">Fermer</button>`;
  document.getElementById('modal').style.display = 'flex';
}

function renderAdminRoles() {
  const rolesDef = [
    { name: 'admin',         label: 'Administrateur', icon: 'ti-shield-lock',  desc: 'Accès complet + paramètres' },
    { name: 'directeur',     label: 'Directeur',      icon: 'ti-crown',        desc: 'Toutes les fiches en lecture' },
    { name: 'manager',       label: 'Manager',        icon: 'ti-user-star',    desc: 'Fiches de son équipe + validation' },
    { name: 'collaborateur', label: 'Collaborateur',  icon: 'ti-user',         desc: 'Sa propre fiche uniquement' }
  ];
  let h = `<div class="admin-card"><div class="admin-hdr"><h3>Rôles utilisateurs</h3>
    <span style="font-size:12px;color:#5F5E5A">Cliquez sur Gérer pour modifier les droits ou ajouter des profils personnalisés</span>
  </div>`;
  rolesDef.forEach(rd => {
    const dbRole = db.roles.find(r => r.name === rd.name);
    const emails = dbRole ? dbRole.emails.join(', ') : '';
    const droits = (dbRole && dbRole.droits && Object.keys(dbRole.droits).length > 0)
      ? dbRole.droits : (DROITS_DEFAUT[rd.name] || {});
    const droitsActifs = Object.entries(DROITS_LABELS)
      .filter(([k]) => droits[k])
      .map(([,v]) => `<span style="background:#EEEDFE;color:#534AB7;border-radius:4px;padding:1px 6px;font-size:10px;margin:2px;display:inline-block">${v}</span>`)
      .join('');
    h += `<div style="padding:16px;border-bottom:.5px solid #D3D1C7">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <i class="ti ${rd.icon}" style="font-size:18px;color:#534AB7"></i>
        <div style="flex:1">
          <div style="font-weight:600">${rd.label}</div>
          <div style="font-size:12px;color:#5F5E5A">${rd.desc}</div>
        </div>
        <button class="btn btn-sm" onclick="openRoleModal('${rd.name}')">
          <i class="ti ti-edit"></i> Gérer
        </button>
      </div>
      <div style="margin-bottom:6px">${droitsActifs || '<span style="color:#aaa;font-size:11px">Aucun droit actif</span>'}</div>
      <div style="font-size:12px;color:#5F5E5A">
        ${emails ? `<b>Utilisateurs :</b> ${emails}` : '<i>Aucun utilisateur assigné</i>'}
      </div>
    </div>`;
  });
  h += `</div>`;
  document.getElementById('content').innerHTML = h;
}

function openRoleModal(roleName) {
  const labels = { admin:'Administrateur', directeur:'Directeur', manager:'Manager', collaborateur:'Collaborateur' };
  const dbRole = db.roles.find(r => r.name === roleName);
  const emails = dbRole ? dbRole.emails.join('\n') : '';
  const droits = (dbRole && dbRole.droits && Object.keys(dbRole.droits).length > 0)
    ? dbRole.droits : (DROITS_DEFAUT[roleName] || {});

  const droitsHtml = Object.entries(DROITS_LABELS).map(([key, label]) => `
    <label style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid #f0efe8;font-size:13px;cursor:pointer">
      <input type="checkbox" id="droit-${key}" ${droits[key] ? 'checked' : ''}
        style="width:15px;height:15px;cursor:pointer;flex-shrink:0">
      <span>${label}</span>
    </label>`).join('');

  document.getElementById('m-av').innerHTML = '<i class="ti ti-shield" style="font-size:20px"></i>';
  document.getElementById('m-title').textContent = labels[roleName] || roleName;
  document.getElementById('m-sub').textContent = 'Configurer les droits et les utilisateurs';
  document.getElementById('m-body').innerHTML = `
    <div style="font-size:12px;font-weight:600;color:#5F5E5A;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Droits</div>
    <div style="margin-bottom:18px">${droitsHtml}</div>
    <div style="font-size:12px;font-weight:600;color:#5F5E5A;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">Utilisateurs (une adresse par ligne)</div>
    <textarea id="role-emails" style="width:100%;height:120px;font-size:13px;
      border:.5px solid #D3D1C7;border-radius:8px;padding:10px;resize:vertical"
      placeholder="prenom.nom@evea-conseil.com">${emails}</textarea>
    <div style="font-size:11px;color:#aaa;margin-top:4px">
      Les adresses doivent correspondre aux comptes Microsoft utilisés pour la connexion.
    </div>`;
  document.getElementById('m-footer').innerHTML = `
    <button class="btn" onclick="closeModal()">Annuler</button>
    <button class="btn btn-primary" onclick="saveRole('${roleName}')"><i class="ti ti-check"></i>Enregistrer</button>`;
  document.getElementById('modal').style.display = 'flex';
}

async function saveRole(roleName) {
  const emails = document.getElementById('role-emails').value
    .split('\n').map(e => e.trim().toLowerCase()).filter(Boolean).join(',');
  const droits = {};
  Object.keys(DROITS_LABELS).forEach(key => {
    droits[key] = document.getElementById('droit-' + key)?.checked || false;
  });
  showSave();
  try {
    const dbRole = db.roles.find(r => r.name === roleName);
    const data = { Emails: emails, Droits: JSON.stringify(droits) };
    if (dbRole) {
      await spPatch(CONFIG.lists.roles, dbRole.spId, data);
    } else {
      await spPost(CONFIG.lists.roles, { Title: roleName, ...data });
    }
    await loadData();
    closeModal();
    renderAdminRoles();
    hideSave('Rôle enregistré ✓');
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}
  
// =====================================================================
// LOGOUT
// =====================================================================
async function logout() {
  await msalInstance.logoutRedirect();
}

// =====================================================================
// INIT
// =====================================================================
async function init() {
  document.getElementById('loading').style.display = 'flex';
  try {
    await msalInstance.handleRedirectPromise();
    let account = msalInstance.getAllAccounts()[0];
    if (!account) {
    await msalInstance.loginRedirect({ scopes: SCOPES_GRAPH });  // ← Graph pour le login
    return;
}
const tokenGraph = await msalInstance.acquireTokenSilent({ scopes: SCOPES_GRAPH, account });
const meResp     = await fetch('https://graph.microsoft.com/v1.0/me', {
    headers: { Authorization: `Bearer ${tokenGraph.accessToken}` }  // ← token Graph pour /me
});
    if (!meResp.ok) throw new Error('Impossible de récupérer le profil Microsoft');
    const me = await meResp.json();

    // Chargement des données SharePoint
    await loadData();

    // Définition du rôle
    const email = me.mail || me.userPrincipalName || '';
    currentUser = { email, name: me.displayName || email, role: getUserRole(email) };

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    buildSidebar();
    showView('matrix');
  } catch (e) {
    document.getElementById('loading-msg').textContent = 'Erreur : ' + e.message;
    console.error(e);
  }
}

init();
</script>
