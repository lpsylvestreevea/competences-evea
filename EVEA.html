<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Matrice des compétences — EVEA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;background:#f5f5f0;color:#1a1a18}
.app{display:flex;height:100vh;overflow:hidden}
.loading{position:fixed;inset:0;background:#f5f5f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300}
.loading i{font-size:48px;color:#534AB7;margin-bottom:16px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:15px;color:#5F5E5A;margin-top:8px}
.sidebar{width:220px;min-width:220px;background:#fff;border-right:.5px solid #D3D1C7;display:flex;flex-direction:column}
.sidebar-logo{padding:14px 16px;border-bottom:.5px solid #D3D1C7;display:flex;align-items:center;gap:8px}
.sidebar-logo i{color:#534AB7;font-size:20px}
.sidebar-logo span{font-weight:600;font-size:15px}
.sidebar-user{padding:10px 14px;border-bottom:.5px solid #D3D1C7;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.sidebar-nav{padding:6px;flex:1;overflow-y:auto}
.nav-section{padding:8px 10px 2px;font-size:10px;font-weight:600;letter-spacing:.06em;color:#aaa;text-transform:uppercase;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:#5F5E5A;font-size:13px;transition:background .15s}
.nav-item:hover{background:#f5f5f0}
.nav-item.active{background:#EEEDFE;color:#534AB7;font-weight:500}
.nav-item i{font-size:16px;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:.5px solid #D3D1C7;padding:11px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.topbar-title{font-weight:500;font-size:16px;flex:1}
.search-box{display:flex;align-items:center;gap:6px;background:#f5f5f0;border:.5px solid #D3D1C7;border-radius:8px;padding:6px 10px;width:200px}
.search-box input{border:none;background:none;outline:none;font-size:13px;width:100%}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;border:.5px solid #D3D1C7;background:#fff;font-size:13px;cursor:pointer;color:#1a1a18;font-family:inherit;transition:background .15s;white-space:nowrap}
.btn:hover{background:#f5f5f0}
.btn-primary{background:#534AB7;color:#fff;border-color:#534AB7}
.btn-primary:hover{background:#3C3489}
.btn-danger{color:#A32D2D;border-color:#F7C1C1}
.btn-danger:hover{background:#FCEBEB}
.btn-sm{padding:4px 8px;font-size:12px}
.content{flex:1;overflow-y:auto;padding:18px}
.rb{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500}
.rb-admin{background:#EEEDFE;color:#3C3489}
.rb-manager{background:#E6F1FB;color:#042C53}
.rb-collab{background:#E1F5EE;color:#085041}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
select{padding:6px 10px;border-radius:8px;border:.5px solid #D3D1C7;background:#fff;font-size:13px;color:#1a1a18;font-family:inherit;cursor:pointer;outline:none}
.twrap{position:relative;display:inline}
.twrap .tt{display:none;position:absolute;z-index:50;background:#1a1a18;color:#fff;font-size:12px;border-radius:8px;padding:8px 11px;min-width:200px;max-width:280px;line-height:1.5;left:50%;transform:translateX(-50%);top:calc(100% + 6px);white-space:normal;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.twrap .tt.tup{top:auto;bottom:calc(100% + 6px)}
.twrap:hover .tt{display:block}
.tt-title{font-weight:500;margin-bottom:4px}
.matrix-wrap{overflow:auto;border:.5px solid #D3D1C7;border-radius:12px;background:#fff;max-height:calc(100vh - 200px)}
table.mx{border-collapse:collapse;min-width:100%}
table.mx th,table.mx td{border:.5px solid #e8e7e0;padding:0}
table.mx thead th{background:#f5f5f0;font-size:11px;font-weight:500;color:#5F5E5A;padding:7px 10px;white-space:nowrap;position:sticky;top:0;z-index:10}
table.mx thead th:first-child{position:sticky;left:0;z-index:20;background:#f5f5f0;min-width:200px;text-align:left}
table.mx tbody td:first-child{position:sticky;left:0;background:#fff;z-index:5;min-width:185px;max-width:225px;padding:5px 10px;font-size:12px;border-right:.5px solid #D3D1C7}
table.mx tbody td:first-child.dr{background:#EEEDFE;color:#534AB7;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
table.mx tbody td{text-align:center;min-width:38px;height:34px}
.cell{display:flex;align-items:center;justify-content:center;height:100%;cursor:pointer}
.cell:hover{background:#f5f5f0}
.lb{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500}
.l1{background:#E1F5EE;color:#085041}.l2{background:#EEEDFE;color:#3C3489}
.l3{background:#FAEEDA;color:#633806}.l4{background:#FAECE7;color:#4A1B0C}
.l-ring{outline:2px solid #534AB7;outline-offset:1px;border-radius:50%}
.l-ring-1{outline-color:#085041}.l-ring-2{outline-color:#3C3489}.l-ring-3{outline-color:#633806}.l-ring-4{outline-color:#4A1B0C}
.sk-rare{color:#7A3A28}
.rare-pill{background:#F5E6E3;color:#7A3A28;border-radius:4px;font-size:9px;padding:1px 4px;margin-left:3px;font-weight:600}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:#5F5E5A;margin-bottom:10px;align-items:center}
.legend-item{display:flex;align-items:center;gap:4px}
.ldot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.level-count{margin:0 auto;width:24px;min-width:24px;height:24px;padding:0;display:flex}
.lock-note{font-size:11px;color:#aaa;margin-top:4px;line-height:1.35}
.projection-note{font-size:12px;color:#5F5E5A;background:#fafaf8;border:.5px solid #e8e7e0;border-radius:8px;padding:8px 10px;margin-bottom:10px}
.collab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px}
.collab-card{background:#fff;border:.5px solid #D3D1C7;border-radius:12px;padding:13px;cursor:pointer;transition:border-color .15s}
.collab-card:hover{border-color:#534AB7}
.av{width:36px;height:36px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:13px;color:#534AB7;margin-bottom:8px}
.cname{font-weight:500;font-size:13px;margin-bottom:2px}
.cposte{font-size:11px;color:#5F5E5A;margin-bottom:6px}
.stat-pill{background:#f5f5f0;border-radius:6px;padding:2px 7px;font-size:11px;color:#5F5E5A}
.team-tag{background:#E6F1FB;color:#042C53;border-radius:6px;padding:2px 6px;font-size:11px}
.pbar{height:3px;background:#e8e7e0;border-radius:2px;overflow:hidden;margin-top:5px}
.pfill{height:100%;background:#534AB7;border-radius:2px}
.admin-card{background:#fff;border:.5px solid #D3D1C7;border-radius:12px;overflow:hidden;margin-bottom:18px}
.admin-hdr{padding:13px 17px;border-bottom:.5px solid #D3D1C7;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.admin-hdr h3{font-size:14px;font-weight:500}
table.adm{width:100%;border-collapse:collapse}
table.adm th{background:#f5f5f0;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:#5F5E5A;padding:7px 13px;text-align:left;border-bottom:.5px solid #D3D1C7}
table.adm td{padding:8px 13px;border-bottom:.5px solid #f0efe8;font-size:13px;vertical-align:middle}
table.adm tr:last-child td{border-bottom:none}
table.adm tr:hover td{background:#fafaf8}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;width:700px;max-width:96vw;max-height:92vh;overflow:hidden;display:flex;flex-direction:column}
.mhead{padding:16px 20px;border-bottom:.5px solid #D3D1C7;display:flex;align-items:center;gap:11px}
.mavat{width:42px;height:42px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:14px;color:#534AB7;flex-shrink:0}
.mtitle{flex:1}.mtitle h2{font-size:15px;font-weight:500}.mtitle p{font-size:12px;color:#5F5E5A}
.mbody{overflow-y:auto;padding:18px 20px;flex:1}
.mfooter{padding:11px 20px;border-top:.5px solid #D3D1C7;display:flex;justify-content:flex-end;gap:8px;align-items:center}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.field label{font-size:12px;color:#5F5E5A;display:block;margin-bottom:3px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;border:.5px solid #D3D1C7;border-radius:8px;font-size:13px;font-family:inherit;outline:none;color:#1a1a18;background:#fff}
.field input:focus,.field select:focus{border-color:#534AB7}
.field.full{grid-column:span 2}
.csect{margin-bottom:16px}
.csect-lbl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#5F5E5A;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.crow{border-bottom:.5px solid #f0efe8}
.crow:last-child{border-bottom:none}
.crow-main{display:flex;align-items:center;gap:8px;padding:7px 0}
.crow-name{flex:1;font-size:13px;line-height:1.3}
.lp{display:flex;gap:3px}
.lvl-btn{width:26px;height:26px;border-radius:50%;border:.5px solid #D3D1C7;background:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.lvl-btn:hover{border-color:#534AB7;color:#534AB7}
.lvl-btn:disabled,.cm-input:disabled{opacity:.55;cursor:not-allowed;background:#f5f5f0}
.lvl-btn.a1{background:#E1F5EE;border-color:#085041;color:#085041;font-weight:500}
.lvl-btn.a2{background:#EEEDFE;border-color:#3C3489;color:#3C3489;font-weight:500}
.lvl-btn.a3{background:#FAEEDA;border-color:#633806;color:#633806;font-weight:500}
.lvl-btn.a4{background:#FAECE7;border-color:#4A1B0C;color:#4A1B0C;font-weight:500}
.target-lvl{outline:2px solid #534AB7;outline-offset:1px}
.target-lvl-1{outline-color:#085041}.target-lvl-2{outline-color:#3C3489}.target-lvl-3{outline-color:#633806}.target-lvl-4{outline-color:#4A1B0C}
.pending-lvl{outline:2px dashed #A32D2D;outline-offset:2px;font-weight:600}
.pending-lvl-1{outline-color:#085041}.pending-lvl-2{outline-color:#3C3489}.pending-lvl-3{outline-color:#633806}.pending-lvl-4{outline-color:#4A1B0C}.pending-lvl-0{outline-color:#A32D2D}
.validation-box{background:#fffaf5;border:.5px dashed #D9A36A;border-radius:8px;padding:8px 10px;margin:0 0 8px 0;font-size:12px;color:#5F5E5A;cursor:pointer}
.validation-box.open{background:#fff7ed;border-color:#C97A2B}
.validation-title{font-weight:600;color:#7A3A28;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.validation-comment{background:#fff;border:.5px solid #f0e0d0;border-radius:6px;padding:6px 8px;margin-top:5px;color:#444;line-height:1.4}
.validation-actions{display:none;gap:6px;flex-wrap:wrap;margin-top:8px}
.validation-box.open .validation-actions{display:flex}
.prompt-card{background:#fff;border-radius:16px;width:520px;max-width:94vw;box-shadow:0 8px 30px rgba(0,0,0,.25);overflow:hidden}
.prompt-card textarea{width:100%;min-height:120px;padding:9px 10px;border:.5px solid #D3D1C7;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;outline:none}
.tt-tag{font-size:10px;color:#5F5E5A;background:#f5f5f0;border-radius:4px;padding:1px 5px;flex-shrink:0}
.cm-btn{width:26px;height:26px;border-radius:6px;border:.5px solid #D3D1C7;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px;flex-shrink:0}
.cm-btn:hover{border-color:#534AB7;color:#534AB7}
.cm-btn.has{border-color:#534AB7;background:#EEEDFE;color:#534AB7}
.cm-panel{display:none;background:#fafaf8;border-radius:8px;margin-bottom:6px;padding:10px;font-size:12px}
.cm-panel.open{display:block}
.cm-block{margin-bottom:8px}
.cm-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.cm-lbl.mgr{color:#3C3489}.cm-lbl.col{color:#085041}
.cm-existing{background:#fff;border:.5px solid #e0ded8;border-radius:6px;padding:6px 8px;font-size:12px;line-height:1.4;margin-bottom:4px;color:#444}
.cm-meta{font-size:10px;color:#aaa;margin-bottom:2px}
textarea.cm-input{width:100%;padding:6px 8px;border:.5px solid #D3D1C7;border-radius:6px;font-size:12px;font-family:inherit;resize:vertical;min-height:48px;outline:none;background:#fff}
textarea.cm-input:focus{border-color:#534AB7}
.hist-item{display:flex;gap:8px;padding:7px 0;border-bottom:.5px solid #f0efe8;font-size:12px}
.hist-item:last-child{border-bottom:none}
.hist-dot{width:7px;height:7px;border-radius:50%;background:#534AB7;margin-top:4px;flex-shrink:0}
.hist-date{color:#aaa;font-size:11px;min-width:110px}
.team-checks{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.tcheck{display:flex;align-items:center;gap:5px;padding:4px 10px;border:.5px solid #D3D1C7;border-radius:8px;cursor:pointer;font-size:12px;background:#fff}
.tcheck.checked{border-color:#534AB7;background:#EEEDFE;color:#534AB7}
.tcheck input{display:none}
.psr{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid #f0efe8}
.psr:last-child{border-bottom:none}
.psr-name{flex:1;font-size:13px}
.tsel{padding:4px 7px;border:.5px solid #D3D1C7;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;outline:none}
.empty{text-align:center;padding:44px 20px;color:#aaa}
.empty i{font-size:36px;display:block;margin-bottom:10px;color:#D3D1C7}
.import-zone{border:1.5px dashed #D3D1C7;border-radius:12px;padding:34px;text-align:center;color:#888;background:#fafaf8;cursor:pointer}
.import-zone:hover{border-color:#534AB7;color:#534AB7}
.import-zone i{font-size:30px;margin-bottom:8px;display:block}
.fb-ok{background:#E1F5EE;border-radius:8px;padding:11px;font-size:13px;color:#085041;margin-top:10px}
.fb-err{background:#FCEBEB;border-radius:8px;padding:11px;font-size:13px;color:#A32D2D;margin-top:10px}
.save-indicator{position:fixed;bottom:20px;right:20px;background:#534AB7;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;display:none;align-items:center;gap:8px;z-index:200;box-shadow:0 4px 16px rgba(83,74,183,.3)}
.save-indicator.show{display:flex}
.color-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.color-swatch.sel{border-color:#1a1a18}

.formation-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.formation-card{background:#fff;border:.5px solid #D3D1C7;border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column;gap:8px}
.formation-card:hover{border-color:#534AB7;box-shadow:0 3px 12px rgba(83,74,183,.08)}
.formation-card.inactive{opacity:.62;border-style:dashed}
.formation-title{font-size:14px;font-weight:600;line-height:1.3;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.formation-meta{display:flex;gap:5px;flex-wrap:wrap;font-size:11px;color:#5F5E5A}
.formation-chip{display:inline-flex;align-items:center;gap:3px;background:#f5f5f0;color:#5F5E5A;border-radius:8px;padding:2px 7px;font-size:11px;font-weight:500}
.formation-chip.train{background:#EEEDFE;color:#3C3489}.formation-chip.alt{background:#E1F5EE;color:#085041}.formation-chip.warn{background:#FFF3CD;color:#856404}
.formation-skills{display:flex;gap:4px;flex-wrap:wrap}
.formation-skill{display:inline-flex;align-items:center;gap:4px;border:.5px solid #e0ded8;border-radius:999px;padding:2px 7px;font-size:11px;background:#fff;color:#5F5E5A;max-width:100%}
.formation-skill span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.formation-text{font-size:12px;color:#5F5E5A;line-height:1.45;white-space:pre-line}
.formation-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
.dev-btn{position:relative}
.dev-btn.has{border-color:#085041;background:#E1F5EE;color:#085041}
.dev-count{position:absolute;right:-5px;top:-5px;min-width:14px;height:14px;border-radius:50%;background:#534AB7;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.dev-option{border:.5px solid #D3D1C7;border-radius:10px;padding:10px;margin-bottom:8px;background:#fff}
.dev-option.alt{background:#fbfffd;border-color:#B8DED2}
.dev-option-title{font-weight:600;font-size:13px;margin-bottom:4px;display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.form-link-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid #f0efe8}
.form-link-row:last-child{border-bottom:none}
.form-link-row select{min-width:110px}
.impersonation-banner{width:100%;background:#FFF3CD;color:#856404;border-radius:8px;padding:7px 8px;font-size:11px;line-height:1.35;margin-top:4px}
.impersonation-actions{width:100%;display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.impersonation-actions .btn{flex:1;justify-content:center;padding:5px 7px;font-size:11px}
.impersonation-row{width:100%;border:.5px solid #D3D1C7;background:#fff;border-radius:10px;padding:9px 10px;margin-bottom:7px;display:flex;align-items:center;gap:10px;text-align:left;cursor:pointer;font-family:inherit;color:#1a1a18}
.impersonation-row:hover{border-color:#534AB7;background:#fafaf8}
.impersonation-row.active{border-color:#534AB7;background:#EEEDFE}
.impersonation-row .av{margin-bottom:0;flex-shrink:0}
</style>
</head>
<body>

<div class="loading" id="loading">
  <i class="ti ti-refresh"></i>
  <p id="loading-msg">Connexion à Microsoft...</p>
</div>

<div class="app" id="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-logo"><i class="ti ti-chart-grid-dots"></i><span>Compétences</span></div>
    <div class="sidebar-user" id="sidebar-user"></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Matrice globale</div>
      <div class="search-box" id="search-wrap" style="display:none"><i class="ti ti-search"></i><input type="text" id="search-input" placeholder="Rechercher…" oninput="applyFilters()"></div>
      <button class="btn" id="btn-export" onclick="openExportModal()" style="display:none"><i class="ti ti-download"></i>Exporter</button>
      <button class="btn btn-primary" id="btn-add" onclick="handleAddBtn()" style="display:none"><i class="ti ti-plus"></i><span id="btn-add-label">Ajouter</span></button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="maybeClose(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhead">
      <div class="mavat" id="m-av">?</div>
      <div class="mtitle"><h2 id="m-title"></h2><p id="m-sub"></p></div>
      <button class="btn btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="mbody" id="m-body"></div>
    <div class="mfooter" id="m-footer"></div>
  </div>
</div>

<div class="save-indicator" id="save-indicator">
  <i class="ti ti-cloud-upload"></i><span id="save-msg">Enregistrement...</span>
</div>

<script>
// =====================================================================
// CONFIG — remplacez les valeurs ci-dessous
// =====================================================================

// Droits structurels réservés strictement au rôle administrateur.
// Même si une valeur incohérente est enregistrée dans SharePoint pour un manager
// ou un directeur, elle est neutralisée côté application.
const ADMIN_ONLY_DROITS = ['administration', 'simulation_utilisateur', 'fiche_entete_modification', 'formations_administration'];

function sanitizeDroitsForRole(roleName, droits) {
  const r = (roleName || 'collaborateur').toLowerCase();
  const out = { ...(droits || {}) };
  if (r === 'admin') {
    // Évite qu'un paramétrage SharePoint incomplet ne bloque le compte admin.
    ADMIN_ONLY_DROITS.forEach(k => { out[k] = true; });
  } else {
    ADMIN_ONLY_DROITS.forEach(k => { out[k] = false; });
  }
  return out;
}

// MSAL — authentification Microsoft

const msalInstance = new msal.PublicClientApplication({
  auth: {
    clientId:    CONFIG.clientId,
    authority:   `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: { cacheLocation: 'sessionStorage' }
});

const SCOPES_GRAPH = ['User.Read'];
const SCOPES_SP    = ['https://jbpuyou.sharepoint.com/.default'];

async function getToken() {
  const account = msalInstance.getAllAccounts()[0];
  if (!account) {
    await msalInstance.loginRedirect({ scopes: SCOPES_GRAPH });
    return null;
  }
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES_SP, account });
    return r.accessToken;
  } catch {
    await msalInstance.acquireTokenRedirect({ scopes: SCOPES_SP });
    return null;
  }
}

// =====================================================================
// SHAREPOINT API
// =====================================================================
async function spGet(listName, filter = '', select = '') {
  const token = await getToken();
  if (!token) return [];
  let url = `${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items?$top=5000`;
  if (filter) url += `&$filter=${encodeURIComponent(filter)}`;
  if (select) url += `&$select=${select}`;
  const r = await fetch(url, {
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata'
    }
  });
  if (!r.ok) throw new Error(`spGet ${listName} → ${r.status}`);
  const d = await r.json();
  return d.value || [];
}


async function spGetOptional(listName, filter = '', select = '') {
  try {
    return await spGet(listName, filter, select);
  } catch (e) {
    if (listName === CONFIG.lists.formations) formationsListAvailable = false;
    console.warn(`Liste SharePoint optionnelle indisponible : ${listName}`, e);
    return [];
  }
}

async function spPost(listName, data) {
  const token = await getToken();
  if (!token) return null;
  const r = await fetch(`${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=nometadata'
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) {
    const errBody = await r.text();
    console.error(`spPost ${listName} erreur détail :`, errBody);
    throw new Error(`spPost ${listName} → ${r.status}`);
  }
  return await r.json();
}

async function spPatch(listName, id, data) {
  const token = await getToken();
  if (!token) return;
  const r = await fetch(`${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items(${id})`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=nometadata',
      'IF-MATCH': '*',
      'X-HTTP-Method': 'MERGE'
    },
    body: JSON.stringify(data)
  });
if (!r.ok) {
  const errBody = await r.text();
  console.error(`spPatch ${listName}(${id}) erreur détail :`, errBody);
  throw new Error(`spPatch ${listName}(${id}) → ${r.status}`);
}
}

async function spDelete(listName, id) {
  const token = await getToken();
  if (!token) return;
  const r = await fetch(`${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items(${id})`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      'IF-MATCH': '*',
      'X-HTTP-Method': 'DELETE'
    }
  });
  if (!r.ok) throw new Error(`spDelete ${listName}(${id}) → ${r.status}`);
}

  document.getElementById('save-msg').textContent = msg;
  document.getElementById('save-indicator').classList.add('show');
}
function hideSave(msg = 'Enregistré ✓') {
  document.getElementById('save-msg').textContent = msg;
  setTimeout(() => document.getElementById('save-indicator').classList.remove('show'), 2000);
}

function sortCollabsForCards(collabs) {
  const list = collabs.slice();
  list.sort((a,b) => {
    if (collabSort === 'team') {
      const byTeam = collabTeamKey(a).localeCompare(collabTeamKey(b), 'fr', { sensitivity:'base' });
      if (byTeam) return byTeam;
    }
    if (collabSort === 'mastery') {
      const ma = getCollabMastery(a);
      const mb = getCollabMastery(b);
      const byMastery = (mb ?? -1) - (ma ?? -1);
      if (byMastery) return byMastery;
    }
    return collabAlphaKey(a).localeCompare(collabAlphaKey(b), 'fr', { sensitivity:'base' });
  });
  return list;
}

function safeJsonParse(value, fallback) {
  if (value == null || value === '') return fallback;
  try { return JSON.parse(value); } catch { return fallback; }
}
function normalizeFormationSkillLinks(value) {
  const raw = typeof value === 'string' ? safeJsonParse(value, []) : (value || []);
  let arr = [];
  if (Array.isArray(raw)) arr = raw;
  else if (raw && typeof raw === 'object') {
    Object.entries(raw).forEach(([skillId, lvl]) => {
      if (Array.isArray(lvl)) lvl.forEach(n => arr.push({ skillId, niveau:n }));
      else arr.push({ skillId, niveau:lvl });
    });
  }
  return arr.map(x => ({
      skillId: String(x.skillId || x.SkillId || x.id || '').trim(),
      niveau: Math.max(0, Math.min(4, parseInt(x.niveau ?? x.level ?? x.Niveau ?? 0, 10) || 0))
    }))
    .filter(x => x.skillId)
    .filter((x, i, a) => a.findIndex(y => y.skillId === x.skillId && y.niveau === x.niveau) === i);
}
function formationById(id) {

function isAlternativeDevelopment(f) {

function normalizeText(v) {

}
function formationTypeLabel(f) {

function safeExternalUrl(url) {
  const clean = String(url || '').trim();
  return /^https?:\/\//i.test(clean) ? clean : '';
}
function truncateText(text, max = 170) {
  const clean = String(text || '').replace(/\s+/g, ' ').trim();
  return clean.length > max ? clean.slice(0, max - 1).trim() + '…' : clean;
}

function formationSkillChips(f) {
  const links = normalizeFormationSkillLinks(f.skills || f.CompetencesNiveaux || []);
  if (!links.length) return '<span class="formation-chip warn">Aucune compétence liée</span>';

    return `<span class="formation-skill"><span>${escapeHtml(sk ? sk.name : link.skillId)}</span>${lvl}</span>`;
  }).join('');
}
function getDevelopmentOptionsForSkill(skillId, currentLevel = 0, targetLevel = null) {
  const cur = Math.max(0, Math.min(4, parseInt(currentLevel, 10) || 0));
  const target = targetLevel == null ? null : (parseInt(targetLevel, 10) || 0);
  if (cur >= 4) return [];
  if (target != null && target > 0 && target <= cur) return [];
  const minLevel = cur + 1;
  const maxLevel = target && target > cur ? Math.min(4, target) : minLevel;
  return db.formations
    .filter(f => f.actif !== false)
    .filter(f => normalizeFormationSkillLinks(f.skills).some(link => {
      if (String(link.skillId) !== String(skillId)) return false;
      if (!link.niveau) return true;
      return link.niveau >= minLevel && link.niveau <= maxLevel;
    }))
    .sort((a,b) => {
      const byAlt = Number(isAlternativeDevelopment(a)) - Number(isAlternativeDevelopment(b));
      return byAlt || nameCompareFr(a.title, b.title);
    });
}
function levelsForFormationSkill(f, skillId, currentLevel = 0, targetLevel = null) {
  const cur = Math.max(0, Math.min(4, parseInt(currentLevel, 10) || 0));
  const target = targetLevel == null ? null : (parseInt(targetLevel, 10) || 0);
  if (cur >= 4) return [];
  if (target != null && target > 0 && target <= cur) return [];
  const minLevel = cur + 1;
  const maxLevel = target && target > cur ? Math.min(4, target) : minLevel;
  return normalizeFormationSkillLinks(f.skills)
    .filter(link => String(link.skillId) === String(skillId))
    .filter(link => !link.niveau || (link.niveau >= minLevel && link.niveau <= maxLevel))
    .map(link => link.niveau)
    .filter((n,i,a) => a.indexOf(n) === i)
    .sort((a,b) => a - b);
}

// Retourne la description d'un niveau pour une compétence, en tenant compte
// d'une éventuelle personnalisation par poste (poste.customLevels[skillId][lvl]).
// À défaut, retourne la description générale de la compétence (sk.levels[lvl]).
function getLevelDesc(sk, lvl, posteId = '') {
  if (!sk || lvl == null || lvl === '') return '';
  if (posteId) {
    const poste = posteById(posteId);
    if (poste && poste.customLevels && poste.customLevels[sk.id] && poste.customLevels[sk.id][lvl]) {
      return poste.customLevels[sk.id][lvl];
    }
  }
  return (sk.levels && sk.levels[lvl]) || '';
}

  ).join('');
  return `<div class="tt${dir ? ' '+dir : ''}" style="min-width:220px"><div class="tt-title">${sk.name}</div>${rows}</div>`;
}
function levelTT(sk, lvl, dir = '', posteId = '') {
  if (!sk || !lvl) return '';

}

  tarif:       f.Tarif || '',
  lien:        f.LienInscription || '',
  skills:      normalizeFormationSkillLinks(f.CompetencesNiveaux || ''),
  objectifs:   f.Objectifs || '',
  programme:   f.Programme || '',
  actif:       f.Actif === undefined || f.Actif === null ? true : !!f.Actif
}));
}

function getCollabComps(collabId) {
  const r = {};
  db.competences.filter(c => String(c.CollabId) === String(collabId)).forEach(c => {
    const sid = (c.SkillId || c.Title) || c.Title;
    r[sid] = parseInt(c.Niveau) || 0;
  });
  return r;
}

function parsePendingValidation(item) {
  let payload = {};
  try { payload = JSON.parse(item.Contenu || '{}'); }
  catch { payload = { commentaire: item.Contenu || '' }; }
  const niveau = parseInt(payload.niveau ?? payload.level ?? 0, 10) || 0;
  return {
    niveau,
    commentaire: payload.commentaire || payload.comment || '',
    auteur: payload.auteur || '',
    email: payload.email || '',
    ancienNiveau: parseInt(payload.ancienNiveau ?? payload.oldLevel ?? 0, 10) || 0,
    date: payload.date || item.DateSaisie || '',
    ts: new Date(payload.date || item.DateSaisie || 0).getTime(),
    spId: item.Id
  };
}

function getCollabComments(collabId) {
  const r = {};
  db.commentaires
    .filter(c => String(c.Title) === String(collabId) && (c.SkillId || c.Title) !== META_LAST_UPDATE_SKILL_ID)
    .sort((a,b) => new Date(a.DateSaisie||0) - new Date(b.DateSaisie||0))
    .forEach(c => {
      const sid = (c.SkillId || c.Title);
      const type = c.TypeAuteur || '';
      if (!r[sid]) r[sid] = {};
      if (type === META_PENDING_VALIDATION_TYPE) {
        r[sid].pending = parsePendingValidation(c);
        r[sid].pendingSpId = c.Id;
        r[sid].pendingTs = new Date(c.DateSaisie||0).getTime();
        return;
      }
      r[sid][type] = c.Contenu;
      r[sid][type + 'Ts'] = new Date(c.DateSaisie).getTime();
      r[sid][type + 'SpId'] = c.Id;
    });
  return r;
}

function getCollabLastUpdate(collabId) {
  const item = db.commentaires
    .filter(c => String(c.Title) === String(collabId) && (c.SkillId || '') === META_LAST_UPDATE_SKILL_ID)
    .sort((a,b) => new Date(b.DateSaisie||0) - new Date(a.DateSaisie||0))[0];
  return item ? { text: item.Contenu || '', spId: item.Id, ts: new Date(item.DateSaisie||0).getTime() } : { text:'', spId:null, ts:0 };
}

function getCollabHistory(collabId) {
  return db.historique
    .filter(h => String(h.Title) === String(collabId))
    .map(h => ({ spId: h.Id, ts: new Date(h.DateAction).getTime(), role: h.Role, desc: h.Description }))
    .sort((a, b) => b.ts - a.ts);
}

function getUserRole(email) {
  if (!email) return 'collaborateur';
  const e = email.toLowerCase();

  // Fallback prioritaire : CONFIG.adminEmails (garantit l'accès même si Roles vide)
  if (CONFIG.adminEmails.map(a => a.toLowerCase()).includes(e)) return 'admin';

  // Rôles depuis SharePoint (priorité au rôle le plus élevé)
  const ordre = ['admin', 'directeur', 'manager', 'collaborateur'];
  const rolesUser = db.roles
    .filter(r => r.emails.includes(e))
    .map(r => r.name.toLowerCase());

  for (const r of ordre) {
    if (rolesUser.includes(r)) return r;
  }

  // Fallback : vérifier si manager d'une équipe
  const collab = db.collaborateurs.find(c => (c.Email||'').toLowerCase() === e);
  if (collab) {
    const isManager = db.equipes.some(t => (t.managerIds||[]).includes(String(collab.Id)));
    if (isManager) return 'manager';
  }

  return 'collaborateur';
}

function getDroitsForRole(roleName) {
  const normalizedRole = (roleName || 'collaborateur').toLowerCase();
  const base = DROITS_DEFAUT[normalizedRole] || DROITS_DEFAUT.collaborateur || {};
  const role = db.roles.find(r => (r.name || '').toLowerCase() === normalizedRole);
  const merged = (role && role.droits && Object.keys(role.droits).length > 0)
    ? { ...base, ...role.droits }
    : { ...base };
  return sanitizeDroitsForRole(normalizedRole, merged);
}

function hasDroit(droit) {
  if (!currentUser) return false;
  return !!getDroitsForRole(currentUser.role)[droit];
}

function hasStrictAdminAccess() {
  return !!currentUser && currentUser.role === 'admin' && !!getDroitsForRole('admin').administration;
}

function ensureStrictAdminAccess() {
  if (hasStrictAdminAccess()) return true;
  alert('Accès réservé aux administrateurs.');
  showView(getDefaultViewForCurrentUser());
  return false;
}

function getVisibleCollabs() {
  const me = getCurrentCollab();

  if (hasDroit('toutes_consultation')) return db.collaborateurs;

  if (hasDroit('equipe_consultation')) {
    if (!me) return [];
    const myTeams = db.equipes.filter(t => (t.managerIds||[]).includes(String(me.Id)));
    const myTeamIds = myTeams.map(t => String(t.id));
    return db.collaborateurs.filter(c =>
      String(c.Id) === String(me.Id) ||
      (c.teamIds||[]).some(tid => myTeamIds.includes(String(tid)))
    );
  }

  // Fiche propre uniquement
  return me ? [me] : [];
}

function getRareSkills() {
  const total = db.collaborateurs.length;
  const threshold = Math.max(2, Math.round(total * 0.2));
  const counts = {};
  db.competences.forEach(c => { if (c.Niveau > 0) counts[(c.SkillId || c.Title)] = (counts[(c.SkillId || c.Title)] || 0) + 1; });
  const rare = {};
  Object.entries(counts).forEach(([sid, n]) => { if (n <= threshold) rare[sid] = n; });
  return rare;
}

      const haystack = `${getCollabDisplayName(c)} ${c.Email || ''} ${p?.name || ''} ${teams}`.toLowerCase();

  if (!isImpersonating()) returnViewAfterImpersonation = currentView;
  currentUser = makeUserFromCollab(c, true);
  sessionStorage.setItem('evea_impersonated_collab_id', String(c.Id));
  closeModal();
  refreshAfterUserSwitch();
  flashMessage(`Mode voir comme : ${currentUser.name}`);

function stopImpersonation() {
  if (!realUser) return;
  const returnView = returnViewAfterImpersonation;
  currentUser = { ...realUser, impersonated: false };

}

function renderMatrix() {
  const q = (document.getElementById('search-input') || {value:''}).value.toLowerCase();
  const rareMap = getRareSkills();
  const skills = SKILLS.filter(s => (!filterDomain || s.did === filterDomain) && (!q || s.name.toLowerCase().includes(q)));
  let collabs = getVisibleCollabs();
  if (filterTeam) collabs = collabs.filter(c => c.teamIds && c.teamIds.includes(filterTeam));
  const grouped = {};
  skills.forEach(s => { if (!grouped[s.did]) grouped[s.did] = []; grouped[s.did].push(s); });

  let h = `${levelLegendHtml({ target:true, targetReached:true, rare:true })}
  <div class="filters">
    <select onchange="filterTeam=this.value;applyFilters()">
      <option value="">Toutes les équipes</option>
      ${db.equipes.map(t => `<option value="${t.id}"${filterTeam===t.id?' selected':''}>${t.name}</option>`).join('')}
    </select>
    <select onchange="filterDomain=this.value;applyFilters()">
      <option value="">Tous les domaines</option>
      ${getSortedDomains().map(d => `<option value="${d.id}"${filterDomain===d.id?' selected':''}>${d.name}</option>`).join('')}
    </select>
  </div>
  <div class="matrix-wrap"><table class="mx"><thead><tr>
    <th>Compétence</th>
    ${collabs.map(c => {
      const mastery = getCollabMastery(c);
      const p = posteById(c.PosteId);
      const title = `${c.prenom||''} ${c.Nom||''}${p ? ' — '+p.name : ''}${mastery != null ? ' — '+mastery+'% objectifs' : ''}`;
      return `<th title="${escapeHtml(title)}">${(c.prenom||'?')[0]}${(c.Nom||'?')[0]}<br><span style="font-size:10px;font-weight:400">${escapeHtml(c.prenom||'')}</span></th>`;
    }).join('')}
  </tr></thead><tbody>`;

  getSortedDomains().forEach(dom => {
    const list = grouped[dom.id];
    if (!list || !list.length) return;
    h += `<tr><td colspan="${collabs.length+1}" class="dr" style="background:${dom.bg};color:${dom.c}">${dom.name}</td></tr>`;
    list.forEach(sk => {
      const isRare = !!rareMap[sk.id];
      h += `<tr><td><span class="twrap${isRare?' sk-rare':''}">${sk.name}${isRare?`<span class="rare-pill">rare</span>`:''}${skillTT(sk)}</span></td>`;
      collabs.forEach(c => {
        const comps  = getCollabComps(c.Id);
        const lvl    = comps[sk.id] || 0;
        const poste  = posteById(c.PosteId);
        const target = poste && poste.targets[sk.id] !== undefined ? poste.targets[sk.id] : null;
        h += `<td><div class="cell" onclick="openCollabModal('${c.Id}','${sk.id}')">`;
        if (lvl > 0) {
          const ring = target != null && Number(lvl) >= Number(target) ? targetRingClass(target) : '';
          h += `<span class="twrap"><span class="lb l${lvl}${ring}">${lvl}</span>${levelTT(sk,lvl,'tup',c.PosteId)}</span>`;
        } else if (target != null) {
          h += `<span class="lb" style="${missingTargetStyle(target)}">—</span>`;
        } else {
          h += `<span style="color:#e0ded8;font-size:18px">·</span>`;
        }
        h += `</div></td>`;
      });
      h += `</tr>`;
    });
  });
  h += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = h;
}

  document.getElementById('m-av').innerHTML = '<i class="ti ti-school" style="font-size:20px"></i>';
  document.getElementById('m-title').textContent = sk ? sk.name : 'Développement de compétence';
  document.getElementById('m-sub').textContent = `Niveau actuel : ${currentLevel || '—'}${targetTxt}`;
  let body = `<div class="projection-note"><i class="ti ti-info-circle"></i> Ressources liées au niveau supérieur${targetLevel && Number(targetLevel) > Number(currentLevel) ? ' et à l’objectif du poste' : ''}. Les moyens alternatifs signalent qu'une progression peut aussi se faire hors formation.</div>`;

    options.forEach(f => {

      const url = safeExternalUrl(f.lien);
      body += `<div class="dev-option${alt ? ' alt' : ''}">
        <div class="dev-option-title">
          <span>${escapeHtml(f.title || 'Sans titre')}</span>
          <span class="formation-chip ${alt ? 'alt' : 'train'}"><i class="ti ti-${alt ? 'route' : 'school'}"></i>${escapeHtml(formationTypeLabel(f))}</span>
        </div>
        <div class="formation-meta" style="margin-bottom:5px">
          ${f.prestataire ? `<span class="formation-chip"><i class="ti ti-building"></i>${escapeHtml(f.prestataire)}</span>` : ''}
          ${f.format ? `<span class="formation-chip"><i class="ti ti-device-laptop"></i>${escapeHtml(f.format)}</span>` : ''}
          ${f.duree ? `<span class="formation-chip"><i class="ti ti-clock"></i>${escapeHtml(f.duree)}</span>` : ''}
          ${f.tarif ? `<span class="formation-chip"><i class="ti ti-currency-euro"></i>${escapeHtml(f.tarif)}</span>` : ''}

        ${f.objectifs ? `<div class="formation-text">${escapeHtml(truncateText(f.objectifs, 220))}</div>` : ''}

    <button class="btn btn-primary" onclick="closeModal()">Fermer</button>`;

  formationEdit.skills.push({ skillId: SKILLS[0]?.id || '', niveau: 1 });
  renderFormationSkillLinksEditor();
}

async function saveFormation(id) {
  if (!canManageFormations()) { alert('Accès réservé aux administrateurs.'); return; }
  const title = document.getElementById('f-title').value.trim();
  if (!title) return alert('Intitulé requis.');
  const links = normalizeFormationSkillLinks(formationEdit.skills);
  showSave('Enregistrement formation...');
  try {
    const data = {
      Title: title,
      Prestataire: document.getElementById('f-prestataire').value.trim(),
      TypeFormation: document.getElementById('f-type').value,
      Format: document.getElementById('f-format').value.trim(),
      Duree: document.getElementById('f-duree').value.trim(),
      Tarif: document.getElementById('f-tarif').value.trim(),
      LienInscription: document.getElementById('f-lien').value.trim(),
      CompetencesNiveaux: JSON.stringify(links),
      Objectifs: document.getElementById('f-objectifs').value.trim(),
      Programme: document.getElementById('f-programme').value.trim(),
      Actif: !!document.getElementById('f-actif').checked
    };
    if (id) await spPatch(CONFIG.lists.formations, id, data);
    else await spPost(CONFIG.lists.formations, data);
    await loadData();
    hideSave('Formation enregistrée ✓');
    closeModal();
    if (currentView === 'formations') renderFormations();
  } catch(e) {
    hideSave('Erreur !');
    alert('Erreur lors de l’enregistrement de la formation : ' + e.message);
  }
}

async function deleteFormation(id) {
  if (!canManageFormations()) { alert('Accès réservé aux administrateurs.'); return; }
  if (!confirm('Supprimer cette fiche formation ?')) return;
  showSave('Suppression formation...');
  try {
    await spDelete(CONFIG.lists.formations, id);
    await loadData();
    hideSave('Formation supprimée ✓');
    closeModal();
    if (currentView === 'formations') renderFormations();
  } catch(e) {
    hideSave('Erreur !');
    alert('Erreur lors de la suppression : ' + e.message);
  }
}

function renderCollabs() {
  const q = (document.getElementById('search-input') || {value:''}).value.toLowerCase();
  let list = getVisibleCollabs().filter(c => {
    const fn = ((c.prenom||'') + ' ' + (c.Nom||'')).toLowerCase();
    const p  = posteById(c.PosteId);
    return (!filterTeam || c.teamIds && c.teamIds.includes(filterTeam))
        && (!filterPoste || c.PosteId === filterPoste)
        && (!q || fn.includes(q) || (p && p.name.toLowerCase().includes(q)));
  });
  list = sortCollabsForCards(list);
  let h = `<div class="filters">
    <select onchange="filterTeam=this.value;applyFilters()">
      <option value="">Toutes les équipes</option>
      ${db.equipes.map(t => `<option value="${t.id}"${filterTeam===t.id?' selected':''}>${t.name}</option>`).join('')}
    </select>
    <select onchange="filterPoste=this.value;applyFilters()">
      <option value="">Tous les postes</option>
      ${POSTES.map(p => `<option value="${p.id}"${filterPoste===p.id?' selected':''}>${p.name}</option>`).join('')}
    </select>
    <select onchange="collabSort=this.value;applyFilters()">
      <option value="alpha"${collabSort==='alpha'?' selected':''}>Tri : ordre alphabétique</option>
      <option value="team"${collabSort==='team'?' selected':''}>Tri : équipe</option>
      <option value="mastery"${collabSort==='mastery'?' selected':''}>Tri : maîtrise du poste</option>
    </select>
  </div><div class="collab-grid">`;
  list.forEach(c => {
    const p = posteById(c.PosteId);
    const comps   = getCollabComps(c.Id);
    const targets = p ? Object.entries(p.targets).filter(([,v]) => v != null) : [];
    const ok  = targets.filter(([k,v]) => (comps[k]||0) >= v).length;
    const pct = targets.length ? Math.round(ok / targets.length * 100) : null;
    const teams = (c.teamIds||[]).map(tid => { const t = teamById(tid); return t ? `<span class="team-tag">${t.name}</span>` : ''; }).join('');
    h += `<div class="collab-card" onclick="openCollabModal('${c.Id}')">
      <div class="av">${(c.prenom||'?')[0]}${(c.Nom||'?')[0]}</div>
      <div class="cname">${c.prenom||''} ${c.Nom||''}</div>
      <div class="cposte">${p ? p.name : '—'}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px">${teams}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <span class="stat-pill">${Object.keys(comps).length} compétences</span>
        ${pct != null ? `<span class="stat-pill">${pct}% objectifs</span>` : ''}
      </div>
      ${pct != null ? `<div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>` : ''}
    </div>`;
  });
  if (!list.length) h += `<div class="empty" style="grid-column:1/-1"><i class="ti ti-users"></i>Aucun collaborateur trouvé</div>`;
  h += `</div>`;
  document.getElementById('content').innerHTML = h;
}

function openCollabModal(id, focusSkill) {
  const me = getCurrentCollab();
  const meId = String(me?.Id || '');
  const isMine = id && String(id) === meId;
  const isInMyScope = !isMine && getVisibleCollabs().some(c => String(c.Id) === String(id));

  // Vérification des droits d'accès
  if (id && !isMine && !isInMyScope) return;

  const c = id ? db.collaborateurs.find(x => String(x.Id) === String(id)) : null;
  collabEdit = c ? JSON.parse(JSON.stringify(c)) : { Id:null, prenom:'', Nom:'', Email:'', PosteId:'', teamIds:[], ManagerID:'' };
  collabEdit._comps    = id ? getCollabComps(id) : {};
  collabEdit._comments = id ? getCollabComments(id) : {};
  collabEdit._history  = id ? getCollabHistory(id) : [];
  collabEdit._lastUpdate = id ? getCollabLastUpdate(id) : { text:'', spId:null, ts:0 };
  collabEdit._changes  = {};

  document.getElementById('m-av').textContent = (collabEdit.prenom||'?')[0] + (collabEdit.Nom||'?')[0];
  document.getElementById('m-title').textContent = id ? `${collabEdit.prenom} ${collabEdit.Nom||''}` : 'Nouveau collaborateur';
  const p = posteById(collabEdit.PosteId);
  document.getElementById('m-sub').textContent = p ? p.name : '—';
  renderCollabBody(focusSkill);

  // Droits d'édition selon le contexte
  const canEdit = canSaveCollab(id || null);

  document.getElementById('m-footer').innerHTML = `
    ${id && hasStrictAdminAccess() ? `<button class="btn btn-danger btn-sm" style="margin-right:auto" onclick="deleteCollab('${id}')"><i class="ti ti-trash"></i>Supprimer</button>` : ''}
    <button class="btn" onclick="closeModal()">Fermer</button>
    ${canEdit ? `<button class="btn btn-primary" onclick="saveCollab('${id||''}')"><i class="ti ti-check"></i>Enregistrer</button>` : ''}`;
  document.getElementById('modal').style.display = 'flex';
  if (focusSkill) setTimeout(() => document.querySelector('[data-focus]')?.scrollIntoView({block:'center',behavior:'smooth'}), 80);
}
  
function pendingLevelLabel(pending) {
  if (!pending) return '';
  return pending.niveau > 0 ? `niveau ${pending.niveau}` : 'retrait de la compétence';
}

function renderSkillRow(sk, c, poste, focusSkill, isExtra, displayPosteId) {
  const lvl    = c._comps[sk.id] || 0;
  const target = poste.targets[sk.id];
  const isFocus = sk.id === focusSkill;
  const cm     = c._comments[sk.id] || {};
  const pending = cm.pending || null;
  const hasCm  = cm.manager || cm.collaborateur || pending;
  const posteIdForDesc = displayPosteId || c.PosteId;
  const canDirectLevelEdit = canEditCompetencesForCollab(c.Id);
  const canSuggestLevel = canSuggestCompetencesForCollab(c.Id);
  const canValidateLevel = pending && canValidateCompetencesForCollab(c.Id);
  const canEditMgrComment = canEditManagerCommentForCollab(c.Id);
  const canEditColComment = canEditCollaborateurCommentForCollab(c.Id);
  const pendingLevel = pending ? Number(pending.niveau || 0) : null;
  const devOptions = getDevelopmentOptionsForSkill(sk.id, lvl, target);
  const targetArg = target != null ? Number(target) : 'null';
  const devBtn = devOptions.length ? `<button class="cm-btn dev-btn has" title="Formations et moyens pour progresser" onclick="openSkillDevelopmentModal('${sk.id}',${Number(lvl)||0},${targetArg})"><i class="ti ti-school"></i><span class="dev-count">${devOptions.length}</span></button>` : '';
  const btnAction = n => {
    if (canDirectLevelEdit) return `setLvl('${sk.id}',${n})`;
    if (canSuggestLevel) return `requestLevelSuggestion('${sk.id}',${n})`;
    if (canValidateLevel && pendingLevel === Number(n)) return `toggleValidationActions('${sk.id}')`;
    return '';
  };
  const removeAction = btnAction(0);
  const pendingBox = pending ? `<div class="validation-box${isFocus?' open':''}" id="vp-${sk.id}" ${canValidateLevel ? `onclick="toggleValidationActions('${sk.id}')"` : ''}>
    <div class="validation-title"><i class="ti ti-clock-hour-4"></i> Proposition en attente : ${pendingLevelLabel(pending)}</div>
    <div>Ancien niveau officiel : ${pending.ancienNiveau ? 'niveau ' + pending.ancienNiveau : '—'}${pending.auteur ? ` · proposé par ${escapeHtml(pending.auteur)}` : ''}${pending.ts ? ` · ${fmtDate(pending.ts)}` : ''}</div>
    ${pending.commentaire ? `<div class="validation-comment"><b>Justification collaborateur :</b><br>${escapeHtml(pending.commentaire)}</div>` : ''}
    ${canValidateLevel ? `<div style="font-size:11px;color:#7A3A28;margin-top:6px">Cliquez sur la demande ou sur le niveau pointillé pour afficher les options.</div>
      <div class="validation-actions">
        <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();reviewPendingValidation('${sk.id}',true)"><i class="ti ti-check"></i>Valider</button>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();reviewPendingValidation('${sk.id}',false)"><i class="ti ti-x"></i>Refuser</button>
      </div>` : ''}
    ${canSuggestLevel ? `<div class="validation-actions" style="display:flex"><button class="btn btn-sm" onclick="event.stopPropagation();cancelPendingValidation('${sk.id}')"><i class="ti ti-trash"></i>Annuler ma proposition</button></div>` : ''}
  </div>` : '';
  return `<div class="crow"${isFocus?' data-focus="1"':''} ${isExtra?'style="opacity:0.75;border-left:2px dashed #D3D1C7;padding-left:6px"':''}>
    <div class="crow-main"${isFocus?' style="background:#EEEDFE;border-radius:8px;margin:0 -6px;padding:6px"':''}>
      <span class="crow-name twrap">${escapeHtml(sk.name)}
        ${isExtra ? '<span style="font-size:10px;color:#aaa;margin-left:4px">(hors poste)</span>' : ''}
        ${target!=null?` <span class="tt-tag">cible:${target}</span>`:''}
        ${pending ? ` <span class="tt-tag" style="border:.5px dashed #A32D2D;color:#7A3A28;background:#fffaf5">en attente:${pendingLevelLabel(pending)}</span>` : ''}
        ${skillTT(sk,'tup',posteIdForDesc)}
      </span>
      <div class="lp">
        <button class="lvl-btn${pendingLevel===0?' pending-lvl pending-lvl-0':''}" ${removeAction ? `onclick="${removeAction}"` : 'disabled'}><i class="ti ti-x" style="font-size:11px"></i></button>
        ${[1,2,3,4].map(n => {
          const classes = ['lvl-btn'];
          if (lvl === n) classes.push('a' + n);
          if (target != null && Number(target) === n) classes.push('target-lvl', 'target-lvl-' + n);
          if (pendingLevel === n) classes.push('pending-lvl', 'pending-lvl-' + n);
          const action = btnAction(n);

        ${cm.manager ? `<div class="cm-meta">${fmtDate(cm.managerTs||0)}</div>

}
  
function renderCollabBody(focusSkill) {

  const grouped = {};
  SKILLS.forEach(s => { if (!grouped[s.did]) grouped[s.did] = []; grouped[s.did].push(s); });
  const hasTeams = (c.teamIds||[]).length > 0;

    </div>`;

    onclick="collabEdit._showAllTeams=!collabEdit._showAllTeams;renderCollabBody()">
    ${hasTeams ? '✎ modifier' : '+ ajouter une équipe'}
  </span>` : '';
  const canLastUpdate = canEditOfficialUpdate(c.Id);
  const lastUpdate = c._lastUpdate || { text:'' };

  let h = `<div class="fg">
    <div class="field"><label>Prénom</label><input type="text" id="c-prenom" value="${escapeHtml(c.prenom||'')}" oninput="collabEdit.prenom=this.value"${headerDisabled}>${!canHeader?headerNote:''}</div>

      </select>
    </div>
    <div class="field full"><label>Équipes</label><div class="team-checks" id="team-checks-wrap">
      ${tchecks}${showAllBtn}
    </div></div>

    <div class="field full"><label>Manager</label>
      <select id="c-manager"${headerDisabled}>
        <option value="">— Aucun —</option>
        ${db.collaborateurs.filter(x => String(x.Id) !== String(c.Id)).map(x => `<option value="${x.Id}"${String(c.ManagerID)===String(x.Id)?' selected':''}>${escapeHtml((x.prenom||'') + ' ' + (x.Nom||''))}</option>`).join('')}
      </select>
    </div>
    <div class="field full"><label>Se projeter dans un poste</label>
      <select id="c-projection-poste" onchange="collabEdit._projectionPosteId=this.value;collabEdit._showExtra=false;renderCollabBody()">
        <option value="">— Poste actuel${currentPoste ? ' : ' + escapeHtml(currentPoste.name) : ''} —</option>
        ${POSTES.map(p => `<option value="${p.id}"${projectionId===p.id?' selected':''}>${escapeHtml(p.name)}</option>`).join('')}
      </select>
      <div class="lock-note">Affiche uniquement les compétences du poste observé, en conservant les niveaux actuels du collaborateur.</div>
    </div>
    <div class="field full"><label>Dernière mise à jour officielle</label>
      <input type="text" id="c-last-update" value="${escapeHtml(lastUpdate.text||'')}" placeholder="Ex : entretien du 18/06/2026"${canLastUpdate ? '' : ' disabled'}>

  ${levelLegendHtml({ target:true, pending:true })}
  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap">

  const showExtra = !isProjection && (collabEdit._showExtra || false);

  getSortedDomains().forEach(dom => {

    const mainSkills = isProjection

      : displayPosteId
        ? list.filter(s => poste.targets[s.id] !== undefined || c._comps[s.id] ||
            (c._comments[s.id] && (c._comments[s.id].manager || c._comments[s.id].collaborateur || c._comments[s.id].pending)))

    const extraSkills = (!isProjection && displayPosteId)

    if (displayPosteId && !mainSkills.length && !extraSkills.length) return;

    h += `<div class="csect"><div class="csect-lbl">${domTag(dom)}</div>`;

    mainSkills.forEach(sk => {

  if (!renderedSkills) {

  const hist = collabEdit._history.slice(0, 20);
  h += `<div style="margin-top:18px;border-top:.5px solid #e8e7e0;padding-top:14px">
    <div style="font-size:13px;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px">
      <i class="ti ti-history" style="color:#534AB7"></i>Historique

  if (!hist.length) h += `<div style="font-size:12px;color:#aaa">Aucune modification enregistrée.</div>`;
  hist.forEach(h2 => {
    h += `<div class="hist-item">
      <div class="hist-dot"></div>
      <div style="flex:1">
        <div class="hist-date">${fmtDate(h2.ts)}</div>
        <div>${escapeHtml(h2.desc)}</div>
      </div>
      ${currentUser.role === 'admin' ? `<button class="btn btn-sm btn-danger" style="padding:2px 6px;font-size:11px"
        onclick="deleteHistItem(${h2.spId})"><i class="ti ti-trash"></i></button>` : ''}
    </div>`;
  });
  h += `</div>`;
  document.getElementById('m-body').innerHTML = h;
}

  if (!canEditCollabHeader()) return;

  const idx = (collabEdit.teamIds||[]).indexOf(sid);
  if (idx > -1) { 
    collabEdit.teamIds.splice(idx, 1); 
  } else { 
    if (!collabEdit.teamIds) collabEdit.teamIds = []; 
    collabEdit.teamIds.push(sid); 
  }
  renderCollabBody();
}
function toggleCm(sid) { document.getElementById('cp-' + sid)?.classList.toggle('open'); }

function setLvl(sid, lvl) {
  if (!canEditCompetencesForCollab(collabEdit.Id)) return;
  const old = collabEdit._comps[sid] || 0;
  if (lvl === 0) delete collabEdit._comps[sid]; else collabEdit._comps[sid] = lvl;
  if (old !== lvl) {
    collabEdit._changes[sid] = { old, new: lvl };
  }
  const displayPosteId = collabEdit._projectionPosteId || collabEdit.PosteId;
  const poste  = posteById(displayPosteId) || { targets:{} };
  const target = poste.targets[sid];
  const pending = collabEdit._comments[sid]?.pending || null;
  const pendingLevel = pending ? Number(pending.niveau || 0) : null;
  document.querySelectorAll(`[onclick^="setLvl('${sid}'"]`).forEach((btn, i) => {
    btn.className = 'lvl-btn';
    btn.style.outline = '';
    btn.style.background = '';
    btn.style.color = '';
    const n = i;
    const lvlActuel = collabEdit._comps[sid] || 0;
    if (i === 0) {
      if (pendingLevel === 0) btn.classList.add('pending-lvl', 'pending-lvl-0');
      return;
    }
    if (lvlActuel === n) btn.classList.add(`a${n}`);
    if (target != null && Number(target) === n) btn.classList.add('target-lvl', `target-lvl-${n}`);
    if (pendingLevel === n) btn.classList.add('pending-lvl', `pending-lvl-${n}`);
  });
}

function toggleValidationActions(sid) {
  document.getElementById('vp-' + sid)?.classList.toggle('open');
}

function openTextPrompt({ title, subtitle = '', label = 'Commentaire', placeholder = '', defaultValue = '', required = true }) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.style.zIndex = '250';
    overlay.innerHTML = `<div class="prompt-card" onclick="event.stopPropagation()">
      <div class="mhead">
        <div class="mavat"><i class="ti ti-message-2" style="font-size:20px"></i></div>
        <div class="mtitle"><h2>${escapeHtml(title)}</h2><p>${escapeHtml(subtitle)}</p></div>
      </div>
      <div class="mbody">
        <div class="field full"><label>${escapeHtml(label)}</label>
          <textarea id="prompt-textarea" placeholder="${escapeHtml(placeholder)}">${escapeHtml(defaultValue)}</textarea>
        </div>
      </div>
      <div class="mfooter">
        <button class="btn" id="prompt-cancel">Annuler</button>
        <button class="btn btn-primary" id="prompt-ok"><i class="ti ti-check"></i>Valider</button>
      </div>
    </div>`;
    const close = value => { document.body.removeChild(overlay); resolve(value); };
    overlay.addEventListener('click', () => close(null));
    document.body.appendChild(overlay);
    const textarea = overlay.querySelector('#prompt-textarea');
    const ok = overlay.querySelector('#prompt-ok');
    const cancel = overlay.querySelector('#prompt-cancel');
    textarea.focus();
    textarea.setSelectionRange(textarea.value.length, textarea.value.length);
    cancel.addEventListener('click', e => { e.stopPropagation(); close(null); });
    ok.addEventListener('click', e => {
      e.stopPropagation();
      const value = textarea.value.trim();
      if (required && !value) { alert('Merci de renseigner un commentaire.'); return; }
      close(value);
    });
  });
}

async function requestLevelSuggestion(sid, lvl) {
  if (!canSuggestCompetencesForCollab(collabEdit.Id)) return;
  const sk = skillById(sid);
  const old = collabEdit._comps[sid] || 0;
  const cm = collabEdit._comments[sid] || {};
  const existingPending = cm.pending || null;
  if (Number(lvl) === Number(old)) {
    alert('Ce niveau est déjà le niveau officiel.');
    return;
  }
  const label = lvl > 0 ? `niveau ${lvl}` : 'retrait de la compétence';
  const commentaire = await openTextPrompt({
    title: 'Proposer un niveau de compétence',
    subtitle: `${sk ? sk.name : sid} — ${old ? 'niveau officiel ' + old : 'aucun niveau officiel'} → ${label}`,
    label: 'Justification collaborateur',
    placeholder: 'Expliquez dans quel contexte vous avez acquis ou mobilisé cette compétence…',
    defaultValue: existingPending ? existingPending.commentaire : '',
    required: true
  });
  if (commentaire === null) return;
  showSave('Suggestion enregistrée...');
  try {
    const payload = {
      niveau: Number(lvl) || 0,
      ancienNiveau: old,
      commentaire,
      auteur: getAuditName(),
      email: getAuditEmail(),
      date: new Date().toISOString(),
      ...getAuditContextFields()
    };
    await saveCommentValue(collabEdit.Id, sid, META_PENDING_VALIDATION_TYPE, JSON.stringify(payload), cm.pendingSpId);
    await spPost(CONFIG.lists.historique, {
      Title: String(collabEdit.Id),
      Role: getAuditRole(),
      Description: `Proposition collaborateur — "${sk ? sk.name : sid}" : ${old ? 'niveau '+old : '—'} → ${label}`,
      DateAction: new Date().toISOString()
    });
    await loadData();
    collabEdit._comments = getCollabComments(collabEdit.Id);
    collabEdit._history = getCollabHistory(collabEdit.Id);
    hideSave('Suggestion enregistrée ✓');
    renderCollabBody(sid);
  } catch(e) {
    hideSave('Erreur !');
    alert('Erreur lors de l\'enregistrement de la proposition : ' + e.message);
  }
}

async function cancelPendingValidation(sid) {
  const cm = collabEdit._comments[sid] || {};

  } catch(e) {

async function persistCompetenceLevel(collabSpId, sid, lvl) {
  const existing = db.competences.find(c => String(c.CollabId) === String(collabSpId) && (c.SkillId || c.Title) === sid);
  const n = Number(lvl) || 0;
  if (n > 0) {
    if (existing) {
      if (parseInt(existing.Niveau) !== n) await spPatch(CONFIG.lists.competences, existing.Id, { Niveau: n });
    } else {
      await spPost(CONFIG.lists.competences, { Title: sid, CollabId: String(collabSpId), Niveau: n });
    }
  } else if (existing) {
    await spDelete(CONFIG.lists.competences, existing.Id);
  }
}

async function reviewPendingValidation(sid, approved) {
  if (!canValidateCompetencesForCollab(collabEdit.Id)) return;
  const cm = collabEdit._comments[sid] || {};
  const pending = cm.pending;
  if (!pending) return;
  const sk = skillById(sid);
  const label = pendingLevelLabel(pending);
  const commentaire = await openTextPrompt({
    title: approved ? 'Valider la compétence' : 'Refuser la compétence',
    subtitle: `${sk ? sk.name : sid} — proposition : ${label}`,
    label: 'Commentaire manager',
    placeholder: approved ? 'Expliquez pourquoi le niveau est validé…' : 'Expliquez pourquoi la proposition est refusée…',
    required: true
  });
  if (commentaire === null) return;
  showSave(approved ? 'Validation...' : 'Refus...');
  try {
    const old = collabEdit._comps[sid] || 0;
    if (approved) await persistCompetenceLevel(collabEdit.Id, sid, pending.niveau);
    await saveCommentValue(collabEdit.Id, sid, 'manager', commentaire, cm.managerSpId);
    if (pending.commentaire) {
      const existingColComment = (cm.collaborateur || '').trim();
      const pendingComment = pending.commentaire.trim();
      const mergedColComment = existingColComment && existingColComment !== pendingComment
        ? `${existingColComment}

Proposition du ${pending.ts ? fmtDate(pending.ts) : ''} : ${pendingComment}`
        : pendingComment;
      await saveCommentValue(collabEdit.Id, sid, 'collaborateur', mergedColComment, cm.collaborateurSpId);
    }
    await saveCommentValue(collabEdit.Id, sid, META_PENDING_VALIDATION_TYPE, '', cm.pendingSpId);
    await spPost(CONFIG.lists.historique, {
      Title: String(collabEdit.Id),
      Role: getAuditRole(),
      Description: `${approved ? 'Validation' : 'Refus'} manager — "${sk ? sk.name : sid}" : proposition ${label}${approved ? ` (${old ? 'niveau '+old : '—'} → ${pending.niveau ? 'niveau '+pending.niveau : 'retiré'})` : ''}`,
      DateAction: new Date().toISOString()
    });
    await loadData();
    collabEdit._comps = getCollabComps(collabEdit.Id);
    collabEdit._comments = getCollabComments(collabEdit.Id);
    collabEdit._history = getCollabHistory(collabEdit.Id);
    hideSave(approved ? 'Compétence validée ✓' : 'Proposition refusée ✓');
    renderCollabBody(sid);
  } catch(e) {
    hideSave('Erreur !');
    alert('Erreur lors de la validation : ' + e.message);
  }
}

async function saveCommentValue(collabSpId, skillId, typeAuteur, value, existingSpId) {
  const clean = (value || '').trim();
  const data = { Title: String(collabSpId), SkillId: skillId, TypeAuteur: typeAuteur, Contenu: clean, DateSaisie: new Date().toISOString() };
  if (existingSpId) {
    if (clean) await spPatch(CONFIG.lists.commentaires, existingSpId, data);
    else await spDelete(CONFIG.lists.commentaires, existingSpId);
  } else if (clean) {
    await spPost(CONFIG.lists.commentaires, data);
  }
}

async function saveCollab(id) {
  if (!canSaveCollab(id || null)) { alert('Action non autorisée.'); return; }
  const canHeader = canEditCollabHeader();
  showSave('Enregistrement...');
  try {
    let collabSpId = id;
    const collabData = {};

    if (!id || canHeader) {
      const prenom = document.getElementById('c-prenom').value.trim();
      const nom    = document.getElementById('c-nom').value.trim();
      if (!prenom || !nom) { alert('Veuillez renseigner prénom et nom.'); hideSave('Erreur !'); return; }
      Object.assign(collabData, {
        Title:     prenom,
        Prenom:    nom,
        Email:     document.getElementById('c-email').value.trim(),
        PosteId:   document.getElementById('c-poste').value,
        TeamIds:   (collabEdit.teamIds || []).join(','),
        ManagerID: document.getElementById('c-manager').value || ''
      });
    }

    if (id) {
      if (Object.keys(collabData).length) await spPatch(CONFIG.lists.collaborateurs, id, collabData);
    } else {
      const res = await spPost(CONFIG.lists.collaborateurs, collabData);
      collabSpId = res.Id;
    }

    const canCompetenceEdit = canEditCompetencesForCollab(collabSpId);
    const canMgrComment = canEditManagerCommentForCollab(collabSpId);
    const canColComment = canEditCollaborateurCommentForCollab(collabSpId);

    // Compétences
    if (canCompetenceEdit) {
    for (const [sid, lvl] of Object.entries(collabEdit._comps)) {
      const existing = db.competences.find(c => String(c.CollabId) === String(collabSpId) && (c.SkillId || c.Title) === sid);
      if (existing) {
        if (parseInt(existing.Niveau) !== lvl) await spPatch(CONFIG.lists.competences, existing.Id, { Niveau: lvl });
      } else {
        await spPost(CONFIG.lists.competences, { Title: sid, CollabId: String(collabSpId), Niveau: lvl });
      }
    }
    // Supprime les compétences retirées
    for (const c of db.competences.filter(c => String(c.CollabId) === String(collabSpId) && !collabEdit._comps[(c.SkillId || c.Title)])) {
      await spDelete(CONFIG.lists.competences, c.Id);
    }
    }

    // Commentaires visibles dans la fiche
    for (const sk of SKILLS) {
      const cm = collabEdit._comments[sk.id] || {};
      const mgrEl = document.getElementById('cm-mgr-' + sk.id);
      const colEl = document.getElementById('cm-col-' + sk.id);
      if (mgrEl && canMgrComment) await saveCommentValue(collabSpId, sk.id, 'manager', mgrEl.value, cm.managerSpId);
      if (colEl && canColComment) await saveCommentValue(collabSpId, sk.id, 'collaborateur', colEl.value, cm.collaborateurSpId);
    }

    // Dernière mise à jour officielle : seul le manager du collaborateur peut l'éditer.
    const lastUpdateEl = document.getElementById('c-last-update');
    if (lastUpdateEl && canEditOfficialUpdate(collabSpId)) {
      await saveCommentValue(collabSpId, META_LAST_UPDATE_SKILL_ID, 'manager', lastUpdateEl.value, collabEdit._lastUpdate?.spId);
    }

    // Historique
    if (canCompetenceEdit) {
    for (const [sid, ch] of Object.entries(collabEdit._changes)) {
      const sk = skillById(sid);
      await spPost(CONFIG.lists.historique, {
        Title:       String(collabSpId),
        Role:        getAuditRole(),
        Description: `"${sk ? sk.name : sid}" : ${ch.old ? 'niveau '+ch.old : '—'} → ${ch.new ? 'niveau '+ch.new : 'retiré'}`,
        DateAction:  new Date().toISOString()
      });
    }

function renderAdminCollabs(filterPoste = '') {

      <select onchange="renderAdminCollabs(this.value)" style="font-size:13px">

  list.forEach(c => {

      const isSelected = (c.teamIds||[]).includes(String(t.id));
      return `<span onclick="toggleTeam('${c.Id}', '${t.id}', this)"
        style="display:inline-block;margin:2px;padding:2px 8px;border-radius:6px;font-size:11px;cursor:pointer;

        background:${isSelected ? '#EEEDFE' : '#fff'};
        color:${isSelected ? '#534AB7' : '#5F5E5A'}">${t.name}</span>`;
    }).join('');
    const teamManagerIds = (c.teamIds||[]).flatMap(tid => {
      const t = db.equipes.find(e => String(e.id) === String(tid));
      return t ? (t.managerIds||[]) : [];
    });
    const mgrPool = teamManagerIds.length > 0
      ? db.collaborateurs.filter(x => teamManagerIds.includes(String(x.Id)) && String(x.Id) !== String(c.Id))
      : db.collaborateurs.filter(x => String(x.Id) !== String(c.Id));
    const mgrSelect = `<select class="tsel" style="min-width:130px" onchange="quickUpdateManager('${c.Id}', this.value)">
      <option value="">— Aucun —</option>
      ${mgrPool.map(x =>
        `<option value="${x.Id}" ${String(c.ManagerID||c.ManagerId||'') === String(x.Id) ? 'selected' : ''}>${x.prenom} ${x.Nom||''}</option>`
      ).join('')}
    </select>`;
    // Rôle actuel du collaborateur
    const emailLow = (c.Email||'').toLowerCase();
    const roleActuel = db.roles.find(r => r.emails.includes(emailLow));
    const roleNom = roleActuel ? roleActuel.name : 'collaborateur';
    const roleSelect = c.Email ? `<select class="tsel" onchange="quickUpdateRole('${c.Id}', '${c.Email}', this.value)">
      <option value="collaborateur" ${roleNom==='collaborateur'?'selected':''}>Collaborateur</option>
      <option value="manager"       ${roleNom==='manager'?'selected':''}>Manager</option>
      <option value="directeur"     ${roleNom==='directeur'?'selected':''}>Directeur</option>
      <option value="admin"         ${roleNom==='admin'?'selected':''}>Admin</option>
    </select>` : '<span style="color:#aaa;font-size:11px">—</span>';
    h += `<tr>
      <td style="font-weight:500">${c.prenom||''} ${c.Nom||''}</td>
      <td style="font-size:12px;color:#5F5E5A">${c.Email||'—'}</td>

async function quickUpdateManager(collabId, managerId) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux administrateurs.'); return; }
  const c = db.collaborateurs.find(x => String(x.Id) === String(collabId));
  if (c) c.ManagerID = managerId;
  hideSave('Manager mis à jour ✓');

  pendingSaves++;
  spPatch(CONFIG.lists.collaborateurs, collabId, { ManagerID: managerId })
    .catch(e => alert('Erreur enregistrement manager : ' + e.message))
    .finally(() => pendingSaves--);
}

async function quickUpdateRole(collabId, email, newRole) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux administrateurs.'); return; }
  if (!email) return alert('Ce collaborateur n\'a pas d\'email renseigné.');
  const emailLow = email.toLowerCase();
  showSave('Mise à jour du rôle...');
  try {
    // Retirer l'email de tous les rôles existants
    for (const role of db.roles) {
      if (role.emails.includes(emailLow)) {
        const newEmails = role.emails.filter(e => e !== emailLow).join(',');
        await spPatch(CONFIG.lists.roles, role.spId, { Emails: newEmails });
      }
    }
    // Ajouter au nouveau rôle (sauf collaborateur = rôle par défaut, pas besoin de l'enregistrer)
    if (newRole !== 'collaborateur') {
      const targetRole = db.roles.find(r => r.name === newRole);
      if (targetRole) {
        const newEmails = [...targetRole.emails.filter(e => e !== emailLow), emailLow].join(',');
        await spPatch(CONFIG.lists.roles, targetRole.spId, { Emails: newEmails });
      } else {
        // Créer l'entrée de rôle si elle n'existe pas encore
        const droits = JSON.stringify(sanitizeDroitsForRole(newRole, DROITS_DEFAUT[newRole] || {}));
        await spPost(CONFIG.lists.roles, { Title: newRole, Emails: emailLow, Droits: droits });
      }
    }
    await loadData();
    hideSave('Rôle mis à jour ✓');
    renderAdminCollabs();
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}
  async function toggleTeam(collabId, teamId, el) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux administrateurs.'); return; }
  const c = db.collaborateurs.find(x => String(x.Id) === String(collabId));
  if (!c) return;
  const isSelected = c.teamIds.includes(String(teamId));
  if (!isSelected && c.teamIds.length >= 2) {
    alert('Maximum 2 équipes.');
    return;
  }
  if (isSelected) {
    c.teamIds = c.teamIds.filter(t => t !== String(teamId));
    el.style.background = '#fff';
    el.style.borderColor = '#D3D1C7';
    el.style.color = '#5F5E5A';
  } else {
    c.teamIds.push(String(teamId));
    el.style.background = '#EEEDFE';
    el.style.borderColor = '#534AB7';
    el.style.color = '#534AB7';
  }
  pendingSaves++;
  spPatch(CONFIG.lists.collaborateurs, collabId, { TeamIds: c.teamIds.join(',') })
    .catch(e => alert('Erreur : ' + e.message))
    .finally(() => pendingSaves--);
}

function exportPostesReferentiel() {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux administrateurs.'); return; }
  try {
    const rows = [];
    POSTES_STATE.forEach(p => {
      Object.entries(p.targets || {}).forEach(([sid, lvl]) => {
        const sk  = SKILLS.find(s => s.id === sid);
        const dom = sk ? DOMAINS.find(d => d.id === sk.did) : null;
        rows.push([
          p.name,
          dom ? dom.name : '',
          sk ? sk.name : sid,
          lvl != null ? lvl : '',
          (lvl != null && sk) ? getLevelDesc(sk, lvl, p.id) : '',
          p.id,
          sid
        ]);
      });
    });
    if (!rows.length) { alert('Aucune compétence cible définie pour les postes.'); return; }
    const headers = ['Poste','Domaine','Compétence','Niveau cible','Description niveau cible','ID Poste','ID Compétence'];
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    ws['!cols'] = [{wch:24},{wch:16},{wch:42},{wch:12},{wch:55},{wch:10},{wch:10}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Référentiel postes');
    XLSX.writeFile(wb, 'referentiel_postes_competences.xlsx');
  } catch(e) {
    alert('Erreur lors de l\'export : ' + e.message);
    console.error(e);
  }
}

// Affiche/masque le panneau de personnalisation des descriptions de niveaux pour une compétence
function toggleLevelDesc(sid) {
  const row = document.getElementById('ldrow-' + sid);
  if (row) row.style.display = row.style.display === 'none' ? '' : 'none';
}

async function savePoste(id) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux administrateurs.'); return; }
  const name = document.getElementById('p-name').value.trim();
  if (!name) return alert('Nom requis.');
  const targets = {};
  const customLevels = {};
  SKILLS.forEach(sk => {
    const v = document.getElementById('pt-' + sk.id).value;
    if (v !== '') targets[sk.id] = parseInt(v);
    const overrides = {};
    [1,2,3,4].forEach(n => {
      const el = document.getElementById(`ld-${sk.id}-${n}`);
      if (el) {
        const val = el.value.trim();
        if (val) overrides[n] = val;
      }
    });
    if (Object.keys(overrides).length) customLevels[sk.id] = overrides;
  });
  showSave();
  try {
    const data = { Title: name, Targets: JSON.stringify(targets), NiveauxPersos: JSON.stringify(customLevels) };
    const isSpId = id && !isNaN(Number(id));
    if (isSpId) {
      await spPatch(CONFIG.lists.postes, id, data);
    } else {
      // Poste statique non encore migré : on en crée une version SharePoint.
      // Les collaborateurs référençant l'ancien identifiant statique devront être
      // mis à jour via "Migrer vers SharePoint" pour les autres postes restants.
      await spPost(CONFIG.lists.postes, data);
    }
    await loadData();
    closeModal();
    renderAdminPostes();
    hideSave('Poste enregistré ✓');
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}

async function deletePoste(id) {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux administrateurs.'); return; }
  const isSpId = id && !isNaN(Number(id));
  if (!isSpId) {
    alert('Ce poste n\'est pas encore enregistré dans SharePoint. Utilisez d\'abord "Migrer vers SharePoint" dans cet onglet.');
    return;
  }
  if (!confirm('Supprimer ce poste ?')) return;
  showSave('Suppression...');
  try {
    await spDelete(CONFIG.lists.postes, id);
    await loadData();
    hideSave('Supprimé ✓');
    renderAdminPostes();
  } catch(e) { hideSave('Erreur !'); alert('Erreur : ' + e.message); }
}

// Migre les postes statiques (POST_xxx) vers SharePoint :
// - recalcule les cibles de compétences vers les nouveaux identifiants numériques (via le nom)
// - met à jour le PosteId des collaborateurs qui référencent les anciens identifiants statiques
async function migratePostes() {
  if (!hasStrictAdminAccess()) { alert('Accès réservé aux administrateurs.'); return; }
  const staticPostes = POSTES.filter(p => isNaN(Number(p.id)));
  if (!staticPostes.length) return alert('Tous les postes sont déjà dans SharePoint.');
  if (!confirm(`Migrer ${staticPostes.length} poste(s) vers SharePoint ?\n\nLes niveaux cibles seront recalculés vers les identifiants actuels des compétences, et les fiches des collaborateurs concernés seront mises à jour.\n\nCette opération est rapide mais ne doit pas être interrompue (ne fermez pas la page).`)) return;

  showSave('Migration des postes...');
  try {
    // 1. Correspondance ancien id de compétence (COMP_xxx) -> nouvel id numérique, via le nom
    const nameToNewSkillId = {};
    SKILLS.forEach(s => { nameToNewSkillId[s.name.trim()] = s.id; });
    const skillIdMap = {};
    OLD_SKILLS_REF.forEach(([oldId, name]) => {
      const newId = nameToNewSkillId[name.trim()];
      if (newId) skillIdMap[oldId] = newId;
    });

    // 2. Création des postes dans SharePoint avec cibles corrigées
    const posteIdMap = {};
    let i = 0;
    for (const p of staticPostes) {
      i++;
      document.getElementById('save-msg').textContent = `Migration poste ${i}/${staticPostes.length}...`;
      const newTargets = {};
      Object.entries(p.targets || {}).forEach(([sid, lvl]) => {
        newTargets[skillIdMap[sid] || sid] = lvl;
      });
      const res = await spPost(CONFIG.lists.postes, { Title: p.name, Targets: JSON.stringify(newTargets), NiveauxPersos: JSON.stringify(p.customLevels || {}) });
      posteIdMap[p.id] = String(res.Id);
    }

    // 3. Mise à jour du PosteId des collaborateurs concernés
    const collabsToUpdate = db.collaborateurs.filter(c => posteIdMap[c.PosteId]);
    for (let j = 0; j < collabsToUpdate.length; j++) {
      document.getElementById('save-msg').textContent = `Mise à jour des collaborateurs (${j+1}/${collabsToUpdate.length})...`;
      const c = collabsToUpdate[j];
      await spPatch(CONFIG.lists.collaborateurs, c.Id, { PosteId: posteIdMap[c.PosteId] });
    }

    await loadData();
    hideSave('Migration terminée ✓');
    renderAdminPostes();
    alert(`Migration réussie !\n${staticPostes.length} poste(s) migré(s) avec cibles corrigées.\n${collabsToUpdate.length} collaborateur(s) réassigné(s).`);
  } catch(e) {
    hideSave('Erreur migration !');
    alert('Erreur pendant la migration : ' + e.message + '\n\nLa migration est partielle. Vérifiez la liste Postes dans SharePoint (doublons possibles) avant de relancer.');
    console.error(e);
  }
}

const OLD_DOMAINS_REF = [

  ['DOM_03','Projet','#633806','#FAEEDA'],
