<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Matrice des compétences — EVEA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;background:#f5f5f0;color:#1a1a18}
.app{display:flex;height:100vh;overflow:hidden}
.loading{position:fixed;inset:0;background:#f5f5f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300}
.loading i{font-size:48px;color:#534AB7;margin-bottom:16px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:15px;color:#5F5E5A;margin-top:8px}
.sidebar{width:220px;min-width:220px;background:#fff;border-right:.5px solid #D3D1C7;display:flex;flex-direction:column}
.sidebar-logo{padding:14px 16px;border-bottom:.5px solid #D3D1C7;display:flex;align-items:center;gap:8px}
.sidebar-logo i{color:#534AB7;font-size:20px}
.sidebar-logo span{font-weight:600;font-size:15px}
.sidebar-user{padding:10px 14px;border-bottom:.5px solid #D3D1C7;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.sidebar-nav{padding:6px;flex:1;overflow-y:auto}
.nav-section{padding:8px 10px 2px;font-size:10px;font-weight:600;letter-spacing:.06em;color:#aaa;text-transform:uppercase;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:#5F5E5A;font-size:13px;transition:background .15s}
.nav-item:hover{background:#f5f5f0}
.nav-item.active{background:#EEEDFE;color:#534AB7;font-weight:500}
.nav-item i{font-size:16px;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:.5px solid #D3D1C7;padding:11px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.topbar-title{font-weight:500;font-size:16px;flex:1}
.search-box{display:flex;align-items:center;gap:6px;background:#f5f5f0;border:.5px solid #D3D1C7;border-radius:8px;padding:6px 10px;width:200px}
.search-box input{border:none;background:none;outline:none;font-size:13px;width:100%}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;border:.5px solid #D3D1C7;background:#fff;font-size:13px;cursor:pointer;color:#1a1a18;font-family:inherit;transition:background .15s;white-space:nowrap}
.btn:hover{background:#f5f5f0}
.btn-primary{background:#534AB7;color:#fff;border-color:#534AB7}
.btn-primary:hover{background:#3C3489}
.btn-danger{color:#A32D2D;border-color:#F7C1C1}
.btn-danger:hover{background:#FCEBEB}
.btn-sm{padding:4px 8px;font-size:12px}
.content{flex:1;overflow-y:auto;padding:18px}
.rb{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500}
.rb-admin{background:#EEEDFE;color:#3C3489}
.rb-manager{background:#E6F1FB;color:#042C53}
.rb-collab{background:#E1F5EE;color:#085041}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
select{padding:6px 10px;border-radius:8px;border:.5px solid #D3D1C7;background:#fff;font-size:13px;color:#1a1a18;font-family:inherit;cursor:pointer;outline:none}
.twrap{position:relative;display:inline}
.twrap .tt{display:none;position:absolute;z-index:50;background:#1a1a18;color:#fff;font-size:12px;border-radius:8px;padding:8px 11px;min-width:200px;max-width:280px;line-height:1.5;left:50%;transform:translateX(-50%);top:calc(100% + 6px);white-space:normal;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.twrap .tt.tup{top:auto;bottom:calc(100% + 6px)}
.twrap:hover .tt{display:block}
.tt-title{font-weight:500;margin-bottom:4px}
.matrix-wrap{overflow:auto;border:.5px solid #D3D1C7;border-radius:12px;background:#fff;max-height:calc(100vh - 200px)}
table.mx{border-collapse:collapse;min-width:100%}
table.mx th,table.mx td{border:.5px solid #e8e7e0;padding:0}
table.mx thead th{background:#f5f5f0;font-size:11px;font-weight:500;color:#5F5E5A;padding:7px 10px;white-space:nowrap;position:sticky;top:0;z-index:10}
table.mx thead th:first-child{position:sticky;left:0;z-index:20;background:#f5f5f0;min-width:200px;text-align:left}
table.mx tbody td:first-child{position:sticky;left:0;background:#fff;z-index:5;min-width:185px;max-width:225px;padding:5px 10px;font-size:12px;border-right:.5px solid #D3D1C7}
table.mx tbody td:first-child.dr{background:#EEEDFE;color:#534AB7;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
table.mx tbody td{text-align:center;min-width:38px;height:34px}
.cell{display:flex;align-items:center;justify-content:center;height:100%;cursor:pointer}
.cell:hover{background:#f5f5f0}
.lb{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500}
.l1{background:#E1F5EE;color:#085041}.l2{background:#EEEDFE;color:#3C3489}
.l3{background:#FAEEDA;color:#633806}.l4{background:#FAECE7;color:#4A1B0C}
.l-ring{outline:2px solid #534AB7;outline-offset:1px;border-radius:50%}
.l-ring-1{outline-color:#085041}.l-ring-2{outline-color:#3C3489}.l-ring-3{outline-color:#633806}.l-ring-4{outline-color:#4A1B0C}
.sk-rare{color:#7A3A28}
.rare-pill{background:#F5E6E3;color:#7A3A28;border-radius:4px;font-size:9px;padding:1px 4px;margin-left:3px;font-weight:600}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:#5F5E5A;margin-bottom:10px;align-items:center}
.legend-item{display:flex;align-items:center;gap:4px}
.ldot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.level-count{margin:0 auto;width:24px;min-width:24px;height:24px;padding:0;display:flex}
.lock-note{font-size:11px;color:#aaa;margin-top:4px;line-height:1.35}
.projection-note{font-size:12px;color:#5F5E5A;background:#fafaf8;border:.5px solid #e8e7e0;border-radius:8px;padding:8px 10px;margin-bottom:10px}
.collab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px}
.collab-card{background:#fff;border:.5px solid #D3D1C7;border-radius:12px;padding:13px;cursor:pointer;transition:border-color .15s}
.collab-card:hover{border-color:#534AB7}
.av{width:36px;height:36px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:13px;color:#534AB7;margin-bottom:8px}
.cname{font-weight:500;font-size:13px;margin-bottom:2px}
.cposte{font-size:11px;color:#5F5E5A;margin-bottom:6px}
.stat-pill{background:#f5f5f0;border-radius:6px;padding:2px 7px;font-size:11px;color:#5F5E5A}
.team-tag{background:#E6F1FB;color:#042C53;border-radius:6px;padding:2px 6px;font-size:11px}
.pbar{height:3px;background:#e8e7e0;border-radius:2px;overflow:hidden;margin-top:5px}
.pfill{height:100%;background:#534AB7;border-radius:2px}
.admin-card{background:#fff;border:.5px solid #D3D1C7;border-radius:12px;overflow:hidden;margin-bottom:18px}
.admin-hdr{padding:13px 17px;border-bottom:.5px solid #D3D1C7;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.admin-hdr h3{font-size:14px;font-weight:500}
table.adm{width:100%;border-collapse:collapse}
table.adm th{background:#f5f5f0;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:#5F5E5A;padding:7px 13px;text-align:left;border-bottom:.5px solid #D3D1C7}
table.adm td{padding:8px 13px;border-bottom:.5px solid #f0efe8;font-size:13px;vertical-align:middle}
table.adm tr:last-child td{border-bottom:none}
table.adm tr:hover td{background:#fafaf8}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;width:700px;max-width:96vw;max-height:92vh;overflow:hidden;display:flex;flex-direction:column}
.mhead{padding:16px 20px;border-bottom:.5px solid #D3D1C7;display:flex;align-items:center;gap:11px}
.mavat{width:42px;height:42px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:14px;color:#534AB7;flex-shrink:0}
.mtitle{flex:1}.mtitle h2{font-size:15px;font-weight:500}.mtitle p{font-size:12px;color:#5F5E5A}
.mbody{overflow-y:auto;padding:18px 20px;flex:1}
.mfooter{padding:11px 20px;border-top:.5px solid #D3D1C7;display:flex;justify-content:flex-end;gap:8px;align-items:center}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.field label{font-size:12px;color:#5F5E5A;display:block;margin-bottom:3px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;border:.5px solid #D3D1C7;border-radius:8px;font-size:13px;font-family:inherit;outline:none;color:#1a1a18;background:#fff}
.field .rich-editor{width:100%;min-height:140px;padding:9px 10px;border:.5px solid #D3D1C7;border-radius:8px;font-size:13px;font-family:inherit;outline:none;color:#1a1a18;background:#fff;line-height:1.45;overflow:auto}
.field .rich-editor:focus{border-color:#534AB7}
.rich-toolbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.rich-toolbar .btn{padding:4px 8px;font-size:12px}
.formation-richtext{white-space:normal}.formation-richtext ul,.formation-richtext ol{margin-left:18px;margin-top:4px}.formation-richtext p{margin:0 0 6px}.formation-richtext b,.formation-richtext strong{font-weight:700}
.function-weight-row{display:grid;grid-template-columns:minmax(0,1fr)90px 32px;gap:7px;align-items:start;margin-bottom:6px}
.function-weight-row input{width:100%;padding:7px 8px;border:.5px solid #D3D1C7;border-radius:8px;font-size:13px}
.function-weight-summary{font-size:11px;color:#5F5E5A;margin-top:4px}.function-weight-summary.warn{color:#856404}
.level-inline-desc{font-size:11px;color:#5F5E5A;line-height:1.35;margin-top:4px;max-width:420px}
.clickable-text{border:none;background:none;color:inherit;cursor:pointer;font:inherit;text-align:left;padding:0;text-decoration:none}
.clickable-text:hover{color:inherit;text-decoration:none}
.field input:focus,.field select:focus{border-color:#534AB7}
.field.full{grid-column:span 2}
.csect{margin-bottom:16px}
.csect-lbl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#5F5E5A;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.crow{border-bottom:.5px solid #f0efe8}
.crow:last-child{border-bottom:none}
.crow-main{display:flex;align-items:center;gap:8px;padding:7px 0}
.crow-name{flex:1;font-size:13px;line-height:1.3}
.lp{display:flex;gap:3px}
.lvl-btn{width:26px;height:26px;border-radius:50%;border:.5px solid #D3D1C7;background:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.lvl-btn:hover{border-color:#534AB7;color:#534AB7}
.lvl-btn:disabled,.cm-input:disabled{opacity:.55;cursor:not-allowed;background:#f5f5f0}
.lvl-btn.a1{background:#E1F5EE;border-color:#085041;color:#085041;font-weight:500}
.lvl-btn.a2{background:#EEEDFE;border-color:#3C3489;color:#3C3489;font-weight:500}
.lvl-btn.a3{background:#FAEEDA;border-color:#633806;color:#633806;font-weight:500}
.lvl-btn.a4{background:#FAECE7;border-color:#4A1B0C;color:#4A1B0C;font-weight:500}
.target-lvl{outline:2px solid #534AB7;outline-offset:1px}
.target-lvl-1{outline-color:#085041}.target-lvl-2{outline-color:#3C3489}.target-lvl-3{outline-color:#633806}.target-lvl-4{outline-color:#4A1B0C}
.pending-lvl{outline:2px dashed #A32D2D;outline-offset:2px;font-weight:600}
.pending-lvl-1{outline-color:#085041}.pending-lvl-2{outline-color:#3C3489}.pending-lvl-3{outline-color:#633806}.pending-lvl-4{outline-color:#4A1B0C}.pending-lvl-0{outline-color:#A32D2D}
.validation-box{background:#fffaf5;border:.5px dashed #D9A36A;border-radius:8px;padding:8px 10px;margin:0 0 8px 0;font-size:12px;color:#5F5E5A;cursor:pointer}
.validation-box.open{background:#fff7ed;border-color:#C97A2B}
.validation-title{font-weight:600;color:#7A3A28;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.validation-comment{background:#fff;border:.5px solid #f0e0d0;border-radius:6px;padding:6px 8px;margin-top:5px;color:#444;line-height:1.4}
.validation-actions{display:none;gap:6px;flex-wrap:wrap;margin-top:8px}
.validation-box.open .validation-actions{display:flex}
.prompt-card{background:#fff;border-radius:16px;width:520px;max-width:94vw;box-shadow:0 8px 30px rgba(0,0,0,.25);overflow:hidden}
.prompt-card textarea{width:100%;min-height:120px;padding:9px 10px;border:.5px solid #D3D1C7;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;outline:none}
.tt-tag{font-size:10px;color:#5F5E5A;background:#f5f5f0;border-radius:4px;padding:1px 5px;flex-shrink:0}
.cm-btn{width:26px;height:26px;border-radius:6px;border:.5px solid #D3D1C7;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px;flex-shrink:0}
.cm-btn:hover{border-color:#534AB7;color:#534AB7}
.cm-btn.has{border-color:#534AB7;background:#EEEDFE;color:#534AB7}
.cm-panel{display:none;background:#fafaf8;border-radius:8px;margin-bottom:6px;padding:10px;font-size:12px}
.cm-panel.open{display:block}
.cm-block{margin-bottom:8px}
.cm-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.cm-lbl.mgr{color:#3C3489}.cm-lbl.col{color:#085041}
.cm-existing{background:#fff;border:.5px solid #e0ded8;border-radius:6px;padding:6px 8px;font-size:12px;line-height:1.4;margin-bottom:4px;color:#444}
.cm-meta{font-size:10px;color:#aaa;margin-bottom:2px}
textarea.cm-input{width:100%;padding:6px 8px;border:.5px solid #D3D1C7;border-radius:6px;font-size:12px;font-family:inherit;resize:vertical;min-height:48px;outline:none;background:#fff}
textarea.cm-input:focus{border-color:#534AB7}
.hist-item{display:flex;gap:8px;padding:7px 0;border-bottom:.5px solid #f0efe8;font-size:12px}
.hist-item:last-child{border-bottom:none}
.hist-dot{width:7px;height:7px;border-radius:50%;background:#534AB7;margin-top:4px;flex-shrink:0}
.hist-date{color:#aaa;font-size:11px;min-width:110px}
.team-checks{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.tcheck{display:flex;align-items:center;gap:5px;padding:4px 10px;border:.5px solid #D3D1C7;border-radius:8px;cursor:pointer;font-size:12px;background:#fff}
.tcheck.checked{border-color:#534AB7;background:#EEEDFE;color:#534AB7}
.tcheck input{display:none}
.psr{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid #f0efe8}
.psr:last-child{border-bottom:none}
.psr-name{flex:1;font-size:13px}
.tsel{padding:4px 7px;border:.5px solid #D3D1C7;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;outline:none}
.empty{text-align:center;padding:44px 20px;color:#aaa}
.empty i{font-size:36px;display:block;margin-bottom:10px;color:#D3D1C7}
.import-zone{border:1.5px dashed #D3D1C7;border-radius:12px;padding:34px;text-align:center;color:#888;background:#fafaf8;cursor:pointer}
.import-zone:hover{border-color:#534AB7;color:#534AB7}
.import-zone i{font-size:30px;margin-bottom:8px;display:block}
.fb-ok{background:#E1F5EE;border-radius:8px;padding:11px;font-size:13px;color:#085041;margin-top:10px}
.fb-err{background:#FCEBEB;border-radius:8px;padding:11px;font-size:13px;color:#A32D2D;margin-top:10px}
.save-indicator{position:fixed;bottom:20px;right:20px;background:#534AB7;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;display:none;align-items:center;gap:8px;z-index:200;box-shadow:0 4px 16px rgba(83,74,183,.3)}
.save-indicator.show{display:flex}
.color-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.color-swatch.sel{border-color:#1a1a18}

.formation-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.formation-card{background:#fff;border:.5px solid #D3D1C7;border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column;gap:8px}
.formation-card:hover{border-color:#534AB7;box-shadow:0 3px 12px rgba(83,74,183,.08)}
.formation-card.inactive{opacity:.62;border-style:dashed}
.formation-title{font-size:14px;font-weight:600;line-height:1.3;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.formation-meta{display:flex;gap:5px;flex-wrap:wrap;font-size:11px;color:#5F5E5A}
.formation-chip{display:inline-flex;align-items:center;gap:3px;background:#f5f5f0;color:#5F5E5A;border-radius:8px;padding:2px 7px;font-size:11px;font-weight:500}
.formation-chip.train{background:#EEEDFE;color:#3C3489}.formation-chip.alt{background:#E1F5EE;color:#085041}.formation-chip.warn{background:#FFF3CD;color:#856404}
.formation-skills{display:flex;gap:4px;flex-wrap:wrap}
.formation-skill{display:inline-flex;align-items:center;gap:4px;border:.5px solid #e0ded8;border-radius:999px;padding:2px 7px;font-size:11px;background:#fff;color:#5F5E5A;max-width:100%}
.formation-skill span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.formation-text{font-size:12px;color:#5F5E5A;line-height:1.45;white-space:pre-line}
.formation-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
.dev-btn{position:relative}
.dev-btn.has{border-color:#085041;background:#E1F5EE;color:#085041}
.dev-count{position:absolute;right:-5px;top:-5px;min-width:14px;height:14px;border-radius:50%;background:#534AB7;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.dev-option{border:.5px solid #D3D1C7;border-radius:10px;padding:10px;margin-bottom:8px;background:#fff}
.dev-option.alt{background:#fbfffd;border-color:#B8DED2}
.dev-option-title{font-weight:600;font-size:13px;margin-bottom:4px;display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.form-link-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid #f0efe8}
.form-link-row:last-child{border-bottom:none}
.form-link-row select{min-width:110px}

.strategy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
.strategy-card{background:#fff;border:.5px solid #D3D1C7;border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:9px;transition:border-color .15s,box-shadow .15s}
.strategy-card:hover{border-color:#534AB7;box-shadow:0 3px 12px rgba(83,74,183,.08)}
.strategy-card.inactive{opacity:.62;border-style:dashed}
.strategy-title{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;font-size:14px;font-weight:600;line-height:1.3}
.strategy-dot{width:12px;height:12px;border-radius:50%;display:inline-block;flex-shrink:0;margin-top:3px;background:#534AB7}
.strategy-desc{font-size:12px;color:#5F5E5A;line-height:1.45;white-space:pre-line}
.strategy-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.strategy-kpi{background:#fafaf8;border:.5px solid #f0efe8;border-radius:8px;padding:7px 8px;min-height:48px}
.strategy-kpi b{display:block;font-size:15px;color:#1a1a18;margin-bottom:2px}.strategy-kpi span{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em}
.strategy-progress{height:6px;background:#e8e7e0;border-radius:6px;overflow:hidden}.strategy-progress-fill{height:100%;background:#534AB7;border-radius:6px}
.strategy-skill-list{display:flex;gap:4px;flex-wrap:wrap}.strategy-skill-list .formation-skill{background:#fafaf8}

const msalInstance = new msal.PublicClientApplication({
  auth: {
    clientId:    CONFIG.clientId,
    authority:   `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: { cacheLocation: 'sessionStorage' }
});

const SCOPES_GRAPH = ['User.Read'];
const SCOPES_SP    = ['https://jbpuyou.sharepoint.com/.default'];

async function getToken() {
  const account = msalInstance.getAllAccounts()[0];
  if (!account) {
    await msalInstance.loginRedirect({ scopes: SCOPES_GRAPH });
    return null;
  }
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES_SP, account });
    return r.accessToken;
  } catch {
    await msalInstance.acquireTokenRedirect({ scopes: SCOPES_SP });
    return null;
  }
}

// =====================================================================
// SHAREPOINT API
// =====================================================================
async function spGet(listName, filter = '', select = '') {
  const token = await getToken();
  if (!token) return [];
  let url = `${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items?$top=5000`;
  if (filter) url += `&$filter=${encodeURIComponent(filter)}`;
  if (select) url += `&$select=${select}`;
  const r = await fetch(url, {
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata'
    }
  });
  if (!r.ok) throw new Error(`spGet ${listName} → ${r.status}`);
  const d = await r.json();
  return d.value || [];
}


async function spGetOptional(listName, filter = '', select = '') {
  try {
    return await spGet(listName, filter, select);
  } catch (e) {
    if (listName === CONFIG.lists.formations) formationsListAvailable = false;
    if (listName === CONFIG.lists.axesStrategiques) strategyListAvailable = false;
    console.warn(`Liste SharePoint optionnelle indisponible : ${listName}`, e);
    return [];
  }
}

async function spPost(listName, data) {
  const token = await getToken();
  if (!token) return null;
  const r = await fetch(`${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=nometadata'
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) {
    const errBody = await r.text();
    console.error(`spPost ${listName} erreur détail :`, errBody);
    throw new Error(`spPost ${listName} → ${r.status}`);
  }
  return await r.json();
}

async function spPatch(listName, id, data) {
  const token = await getToken();
  if (!token) return;
  const r = await fetch(`${CONFIG.siteUrl}/_api/web/lists/getbytitle('${listName}')/items(${id})`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=nometadata',
      'IF-MATCH': '*',
      'X-HTTP-Method': 'MERGE'
    },
    body: JSON.stringify(data)
  });
if (!r.ok) {
  const errBody = await r.text();
  console.error(`spPatch ${listName}(${id}) erreur détail :`, errBody);
  throw new Error(`spPatch ${listName}(${id}) → ${r.status}`);
}
}

async function spDelete(listName, id) {

function targetRingClass(level) {
  return level != null ? ` l-ring l-ring-${level}` : '';
}
function targetOutlineClass(level) {
  return level != null ? ` target-lvl target-lvl-${level}` : '';
}
function missingTargetStyle(level) {
  const col = LEVEL_RING_COLORS[level] || '#ccc';
  return `border:1.5px dashed ${col};color:${col};background:#fff;font-size:10px`;
}
function levelLegendHtml(options = {}) {
  const rare = options.rare ? `<span class="legend-item" style="color:#7A3A28">■ compétence rare</span>` : '';
  const targetLabel = options.targetReached ? 'Entourage coloré = cible atteinte ou dépassée' : 'Entourage coloré = niveau cible de la fonction';
  const target = options.target ? `<span class="legend-item"><span class="ldot l2 l-ring l-ring-2">2</span>${targetLabel}</span>` : '';
  const pending = options.pending ? `<span class="legend-item"><span class="ldot l2 pending-lvl pending-lvl-2">2</span>Pointillé = proposition en attente de validation</span>` : '';
  return `<div class="legend">
    <span class="legend-item"><span class="ldot l1">1</span>Débutant</span>
    <span class="legend-item"><span class="ldot l2">2</span>Inter.</span>
    <span class="legend-item"><span class="ldot l3">3</span>Avancé</span>
    <span class="legend-item"><span class="ldot l4">4</span>Expert</span>
    ${target}${pending}${rare}
  </div>`;
}
function nameCompareFr(a, b) {
  return (a || '').localeCompare(b || '', 'fr', { sensitivity:'base' });
}
function getSortedDomains() {
  return DOMAINS.slice().sort((a,b) => nameCompareFr(a.name || '', b.name || ''));
}
function collabAlphaKey(c) {
  return `${c.Nom||''} ${c.prenom||''}`.trim().toLowerCase();
}
function collabTeamKey(c) {
  const names = (c.teamIds||[]).map(tid => { const t = teamById(tid); return t ? t.name : ''; }).filter(Boolean);
  names.sort((a,b) => a.localeCompare(b, 'fr', { sensitivity:'base' }));
  return names[0] || 'zzzzzz';
}
function normalizeCollabFunctionIdsFromValue(value) {
  if (Array.isArray(value)) return value.map(String).map(v => v.trim()).filter(Boolean);
  const raw = String(value || '').trim();
  if (!raw) return [];
  if (raw.startsWith('[')) {
    const parsed = safeJsonParse(raw, []);
    return Array.isArray(parsed) ? parsed.map(String).map(v => v.trim()).filter(Boolean) : [];
  }
  return raw.split(',').map(v => v.trim()).filter(Boolean);
}
function getCollabFunctionIds(c) {
  if (!c) return [];
  let ids = [];
  if (Array.isArray(c.fonctionIds)) ids = c.fonctionIds.map(String);
  else ids = normalizeCollabFunctionIdsFromValue(c.PosteIds || c.FonctionsIds || '');
  if (!ids.length && c.PosteId) ids = [String(c.PosteId)];
  return ids.map(String).map(v => v.trim()).filter(Boolean).filter((id,i,a) => a.indexOf(id) === i);
}
function getPrimaryPosteId(c) {

  const more = refs.length > limit ? `<span class="strategy-tag more" title="${refs.length - limit} autre(s) axe(s)">+${refs.length - limit}</span>` : '';
  return `<span class="skill-strat-tags">${shown}${more}</span>`;
}
function getCurrentManagerTeamIds() {
  const me = getCurrentCollab();
  if (!me) return [];
  return db.equipes.filter(t => (t.managerIds || []).includes(String(me.Id))).map(t => String(t.id));
}
function getStrategyTeamOptions() {
  if (hasDroit('toutes_consultation') || canManageStrategy()) return db.equipes.slice().sort((a,b) => nameCompareFr(a.name, b.name));
  const ids = getCurrentManagerTeamIds();
  return db.equipes.filter(t => ids.includes(String(t.id))).sort((a,b) => nameCompareFr(a.name, b.name));
}
function getStrategyScopeTeamIds() {
  if (strategyTeamFilter) return [String(strategyTeamFilter)];
  if (!hasDroit('toutes_consultation')) return getCurrentManagerTeamIds();
  return [];
}
function getStrategyScopeCollabs(teamIds = getStrategyScopeTeamIds()) {
  let collabs = getVisibleCollabs();
  if (teamIds && teamIds.length) {
    collabs = collabs.filter(c => (c.teamIds || []).some(tid => teamIds.includes(String(tid))));
  }
  return collabs;
}
function countCollabsAtOrAbove(skillId, niveau, collabs) {
  const target = parseInt(niveau, 10) || 0;
  return collabs.filter(c => (getCollabComps(c.Id)[skillId] || 0) >= target).length;
}
function skillLevelDistribution(skillId, collabs) {
  const dist = {1:0,2:0,3:0,4:0};
  collabs.forEach(c => {
    const lvl = getCollabComps(c.Id)[skillId] || 0;
    if (dist[lvl] !== undefined) dist[lvl]++;
  });
  return dist;
}
function strategyAxisLevelDistribution(axis, collabs) {
  const dist = {1:0,2:0,3:0,4:0};
  (axis.skills || []).forEach(link => {
    const d = skillLevelDistribution(link.skillId, collabs);
    [1,2,3,4].forEach(n => { dist[n] += d[n] || 0; });
  });
  return dist;
}
function getStrategyTargetForLink(link, teamIds = getStrategyScopeTeamIds()) {
  if (teamIds && teamIds.length) {
    return teamIds.reduce((sum, tid) => sum + (parseInt((link.equipes || {})[String(tid)], 10) || 0), 0);
  }
  return parseInt(link.objectif, 10) || 0;
}
function getStrategyLinkProgress(link, teamIds = getStrategyScopeTeamIds()) {
  const collabs = getStrategyScopeCollabs(teamIds);
  const actual = countCollabsAtOrAbove(link.skillId, link.niveau, collabs);
  const target = getStrategyTargetForLink(link, teamIds);
  const pct = target > 0 ? Math.min(100, Math.round(actual / target * 100)) : null;
  return { actual, target, pct, collabs };
}
function getStrategyAxisProgress(axis, teamIds = getStrategyScopeTeamIds()) {
  let actual = 0, target = 0, cappedActual = 0;
  (axis.skills || []).forEach(link => {
    const p = getStrategyLinkProgress(link, teamIds);
    actual += p.actual;
    target += p.target || 0;
    if (p.target > 0) cappedActual += Math.min(p.actual, p.target);
  });
  return { actual, target, pct: target > 0 ? Math.min(100, Math.round(cappedActual / target * 100)) : null };
}
function strategyScopeLabel(teamIds = getStrategyScopeTeamIds()) {
  if (teamIds && teamIds.length === 1) {
    const t = teamById(teamIds[0]);
    return t ? t.name : 'Équipe sélectionnée';
  }
  if (teamIds && teamIds.length > 1) return 'Mes équipes';
  return 'Toutes les équipes accessibles';
}
function buildStrategyPayloadLinks() {
  const map = new Map();
  (strategyEdit.links || []).forEach(raw => {
    const skillId = String(raw.skillId || '').trim();
    const niveau = Math.max(1, Math.min(4, parseInt(raw.niveau, 10) || 1));
    if (!skillId) return;
    const k = strategyKey(skillId, niveau);
    if (!map.has(k)) map.set(k, { skillId, niveau, objectif:0, equipes:{} });
    const item = map.get(k);
    item.objectif = Math.max(item.objectif || 0, parseInt(raw.objectif, 10) || 0);
    item.equipes = { ...item.equipes, ...normalizeTeamTargetObject(raw.equipes || {}) };
  });
  return Array.from(map.values()).sort((a,b) => nameCompareFr(skillById(a.skillId)?.name || a.skillId, skillById(b.skillId)?.name || b.skillId) || a.niveau - b.niveau);
}
// Retourne la description d'un niveau pour une compétence, en tenant compte
// d'une éventuelle personnalisation par poste (poste.customLevels[skillId][lvl]).
// À défaut, retourne la description générale de la compétence (sk.levels[lvl]).
function getLevelDesc(sk, lvl, posteId = '') {
  if (!sk || lvl == null || lvl === '') return '';
  if (posteId) {
    const poste = posteById(posteId);
    if (poste && poste.customLevels && poste.customLevels[sk.id] && poste.customLevels[sk.id][lvl]) {
      return poste.customLevels[sk.id][lvl];
    }
  }
  return (sk.levels && sk.levels[lvl]) || '';
}

function skillTT(sk, dir = '', posteId = '') {
  const rows = [1,2,3,4].map(n =>
    `<div style="display:flex;gap:5px;align-items:flex-start;margin-bottom:2px">
      <span class="lb l${n}" style="width:14px;height:14px;font-size:9px;flex-shrink:0">${n}</span>
      <span style="font-size:11px">${getLevelDesc(sk, n, posteId) || '—'}</span>
    </div>`
  ).join('');
  return `<div class="tt${dir ? ' '+dir : ''}" style="min-width:220px"><div class="tt-title">${sk.name}</div>${rows}</div>`;
}
function levelTT(sk, lvl, dir = '', posteId = '') {
  if (!sk || !lvl) return '';
  const d = getLevelDesc(sk, lvl, posteId);
  return `<div class="tt${dir ? ' '+dir : ''}" style="min-width:160px"><div class="tt-title">Niveau ${lvl}</div><span style="font-size:11px">${d || '—'}</span></div>`;
}

async function loadData() {
  document.getElementById('loading-msg').textContent = 'Chargement des données...';
  formationsListAvailable = true;
  strategyListAvailable = true;
  const [collabs, comps, coms, hist, equipes, postesRaw, domainesRaw, rolesRaw, skillsRaw, formationsRaw, axesStrategiquesRaw] = await Promise.all([
  spGet(CONFIG.lists.collaborateurs),
  spGet(CONFIG.lists.competences),
  spGet(CONFIG.lists.commentaires),
  spGet(CONFIG.lists.historique),
  spGet(CONFIG.lists.equipes),
  spGet(CONFIG.lists.postes),
  spGet(CONFIG.lists.domaines),
  spGet(CONFIG.lists.roles),
  spGet(CONFIG.lists.competencesRef),
  spGetOptional(CONFIG.lists.formations),
  spGetOptional(CONFIG.lists.axesStrategiques)
]);

  // Rôles
db.roles = rolesRaw.map(r => ({
  spId:   r.Id,
  name:   (r.Title || '').toLowerCase().trim(),
  emails: r.Emails ? r.Emails.split(',').map(e => e.trim().toLowerCase()).filter(Boolean) : [],
  droits: r.Droits ? JSON.parse(r.Droits) : {}
}));
  
// Remplace le tableau POSTES statique si des données existent en base
if (postesRaw.length) {
  POSTES.length = 0;
  postesRaw.forEach(p => {
    POSTES.push({
      id:      String(p.Id),
      name:    p.Title || '',
      targets: p.Targets ? JSON.parse(p.Targets) : {},
      customLevels: p.NiveauxPersos ? (() => { try { return JSON.parse(p.NiveauxPersos); } catch { return {}; } })() : {}
    });
  });
  POSTES_STATE.length = 0;
  POSTES_STATE.push(...POSTES);
}
  db.collaborateurs = collabs.map(c => {
    const mapped = {
      ...c,
      prenom:  c.Title || '',
      Nom:     c.Prenom || '',
      teamIds: c.TeamIds ? c.TeamIds.split(',').filter(Boolean) : []
    };
    const fonctionIds = getCollabFunctionIds(mapped);
    mapped.fonctionIds = fonctionIds;
    mapped.fonctionWeights = normalizeCollabFunctionWeights(c.FonctionsPonderation || '', fonctionIds);
    mapped.PosteId = c.PosteId || fonctionIds[0] || '';
    return mapped;
  });
  db.competences  = comps;
  db.commentaires = coms;
  db.historique   = hist;
  db.equipes = equipes.map(e => ({
  ...e,
  id: String(e.Id),
  name: e.Title || e.Nom || '',
  managerIds: e.ManagersIds ? e.ManagersIds.split(',').filter(Boolean) : []
}));

// Remplace le tableau DOMAINS statique si des données existent en base
if (domainesRaw.length) {
  DOMAINS.length = 0;
  domainesRaw.forEach(d => {
    DOMAINS.push({
      id:   String(d.Id),
      name: d.Title || '',
      c:    d.Couleur || '#333333',
      bg:   d.Fond || '#F5F5F5'
    });
  });
}

// Remplace le tableau SKILLS statique si des données existent en base
if (skillsRaw.length) {
  SKILLS.length = 0;
  skillsRaw.forEach(s => {
    SKILLS.push({
      id:     String(s.Id),
      did:    s.DomainId || (DOMAINS[0] ? DOMAINS[0].id : 'DOM_01'),
      name:   s.Title || '',
      levels: s.Niveaux ? (() => { try { return JSON.parse(s.Niveaux); } catch { return {1:'',2:'',3:'',4:''}; } })() : {1:'',2:'',3:'',4:''}
    });
  });
}


// Charge les formations et autres moyens de développement.
db.formations = formationsRaw.map(f => ({
  id:          String(f.Id),
  title:       f.Title || '',
  prestataire: f.Prestataire || '',
  type:        f.TypeFormation || '',
  format:      f.Format || '',
  duree:       f.Duree || '',
  tarif:       f.Tarif || '',
  lien:        f.LienInscription || '',
  skills:      normalizeFormationSkillLinks(f.CompetencesNiveaux || ''),
  objectifs:   f.Objectifs || '',
  programme:   f.Programme || '',
  actif:       f.Actif === undefined || f.Actif === null ? true : !!f.Actif
}));

// Charge les axes stratégiques et leurs objectifs.
db.axesStrategiques = axesStrategiquesRaw.map((a, idx) => {
  const links = normalizeStrategyLinks(a.CompetencesNiveaux || '');
  const objectifs = normalizeStrategyObjectives(a.Objectifs || '');
  const objectifsEquipes = normalizeStrategyTeamObjectives(a.ObjectifsEquipes || '');
  links.forEach(link => {
    const k = strategyKey(link.skillId, link.niveau);
    link.objectif = objectifs[k] || 0;
    link.equipes = objectifsEquipes[k] || {};
  });
  return {
    id: String(a.Id),
    title: a.Title || '',
    description: a.Description || '',
    couleur: a.Couleur || PAL[idx % PAL.length]?.c || '#534AB7',
    skills: links,
    objectifs,
    objectifsEquipes,
    actif: a.Actif === undefined || a.Actif === null ? true : !!a.Actif
  };
}).sort((a,b) => nameCompareFr(a.title, b.title));
}

function getCollabComps(collabId) {
  const r = {};
  db.competences.filter(c => String(c.CollabId) === String(collabId)).forEach(c => {
    const sid = (c.SkillId || c.Title) || c.Title;
    r[sid] = parseInt(c.Niveau) || 0;
  });
  return r;
}

function parsePendingValidation(item) {
  let payload = {};
  try { payload = JSON.parse(item.Contenu || '{}'); }
  catch { payload = { commentaire: item.Contenu || '' }; }
  const niveau = parseInt(payload.niveau ?? payload.level ?? 0, 10) || 0;
  return {
    niveau,
    commentaire: payload.commentaire || payload.comment || '',
    auteur: payload.auteur || '',
    email: payload.email || '',
    ancienNiveau: parseInt(payload.ancienNiveau ?? payload.oldLevel ?? 0, 10) || 0,
    date: payload.date || item.DateSaisie || '',
    ts: new Date(payload.date || item.DateSaisie || 0).getTime(),
    spId: item.Id
  };
}

function getCollabComments(collabId) {
  const r = {};
  db.commentaires
    .filter(c => String(c.Title) === String(collabId) && (c.SkillId || c.Title) !== META_LAST_UPDATE_SKILL_ID)
    .sort((a,b) => new Date(a.DateSaisie||0) - new Date(b.DateSaisie||0))
    .forEach(c => {
      const sid = (c.SkillId || c.Title);
      const type = c.TypeAuteur || '';
      if (!r[sid]) r[sid] = {};
      if (type === META_PENDING_VALIDATION_TYPE) {
        r[sid].pending = parsePendingValidation(c);
        r[sid].pendingSpId = c.Id;
        r[sid].pendingTs = new Date(c.DateSaisie||0).getTime();
        return;
      }
      r[sid][type] = c.Contenu;
      r[sid][type + 'Ts'] = new Date(c.DateSaisie).getTime();
      r[sid][type + 'SpId'] = c.Id;
    });
  return r;
}

function getCollabLastUpdate(collabId) {
  const item = db.commentaires
    .filter(c => String(c.Title) === String(collabId) && (c.SkillId || '') === META_LAST_UPDATE_SKILL_ID)
    .sort((a,b) => new Date(b.DateSaisie||0) - new Date(a.DateSaisie||0))[0];
  return item ? { text: item.Contenu || '', spId: item.Id, ts: new Date(item.DateSaisie||0).getTime() } : { text:'', spId:null, ts:0 };
}

function getCollabHistory(collabId) {
  return db.historique
    .filter(h => String(h.Title) === String(collabId))
    .map(h => ({ spId: h.Id, ts: new Date(h.DateAction).getTime(), role: h.Role, desc: h.Description }))
    .sort((a, b) => b.ts - a.ts);
}

function getUserRole(email) {
  if (!email) return 'collaborateur';
  const e = email.toLowerCase();

  // Fallback prioritaire : CONFIG.adminEmails (garantit l'accès même si Roles vide)
  if (CONFIG.adminEmails.map(a => a.toLowerCase()).includes(e)) return 'admin';

  // Rôles depuis SharePoint (priorité au rôle le plus élevé)
  const ordre = ['admin', 'directeur', 'manager', 'collaborateur'];
  const rolesUser = db.roles
    .filter(r => r.emails.includes(e))
    .map(r => r.name.toLowerCase());

  for (const r of ordre) {
    if (rolesUser.includes(r)) return r;
  }
  const customRole = rolesUser.find(r => !ordre.includes(r));
  if (customRole) return customRole;

  // Fallback : vérifier si manager d'une équipe
  const collab = db.collaborateurs.find(c => (c.Email||'').toLowerCase() === e);
  if (collab) {
    const isManager = db.equipes.some(t => (t.managerIds||[]).includes(String(collab.Id)));
    if (isManager) return 'manager';
  }

  return 'collaborateur';
}

function getDroitsForRole(roleName) {
  const normalizedRole = (roleName || 'collaborateur').toLowerCase();
  const base = DROITS_DEFAUT[normalizedRole] || DROITS_DEFAUT.collaborateur || {};
  const role = db.roles.find(r => (r.name || '').toLowerCase() === normalizedRole);
  const merged = (role && role.droits && Object.keys(role.droits).length > 0)
    ? { ...base, ...role.droits }
    : { ...base };
  return sanitizeDroitsForRole(normalizedRole, merged);
}

function hasDroit(droit) {
  if (!currentUser) return false;
  return !!getDroitsForRole(currentUser.role)[droit];
}

function hasStrictAdminAccess() {
  return !!currentUser && hasDroit('administration');
}

function ensureStrictAdminAccess() {
  if (hasStrictAdminAccess()) return true;
  alert('Accès réservé aux rôles disposant du droit requis.');
  showView(getDefaultViewForCurrentUser());
  return false;
}

function getVisibleCollabs() {
  const me = getCurrentCollab();

  if (hasDroit('toutes_consultation')) return db.collaborateurs;

  if (hasDroit('equipe_consultation')) {
    if (!me) return [];
    const myTeams = db.equipes.filter(t => (t.managerIds||[]).includes(String(me.Id)));
    const myTeamIds = myTeams.map(t => String(t.id));
    return db.collaborateurs.filter(c =>
      String(c.Id) === String(me.Id) ||
      (c.teamIds||[]).some(tid => myTeamIds.includes(String(tid)))
    );
  }

  // Fiche propre uniquement
  return me ? [me] : [];
}

function getRareSkills() {
  const total = db.collaborateurs.length;
  const threshold = Math.max(2, Math.round(total * 0.2));
  const counts = {};
  db.competences.forEach(c => { if (c.Niveau > 0) counts[(c.SkillId || c.Title)] = (counts[(c.SkillId || c.Title)] || 0) + 1; });
  const rare = {};
  Object.entries(counts).forEach(([sid, n]) => { if (n <= threshold) rare[sid] = n; });
  return rare;
}

      <input type="text" id="impersonation-search" value="${escapeHtml(filter)}" placeholder="Rechercher par nom, email, fonction ou équipe…" oninput="renderImpersonationList(this.value)">
    </div>
    <div class="lock-note" style="margin-bottom:10px">
      Le mode test applique les droits et le périmètre de l’utilisateur choisi. Les appels SharePoint restent effectués avec votre session administrateur.
    </div>
    <div id="impersonation-list"></div>`;
  document.getElementById('m-footer').innerHTML = `
    ${isImpersonating() ? `<button class="btn btn-primary" style="margin-right:auto" onclick="stopImpersonation()"><i class="ti ti-arrow-back-up"></i>Revenir à mon compte</button>` : ''}
    <button class="btn" onclick="closeModal()">Fermer</button>`;
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => {
    renderImpersonationList(filter);
    document.getElementById('impersonation-search')?.focus();
  }, 0);
}

function renderImpersonationList(filter = '') {
  const wrap = document.getElementById('impersonation-list');
  if (!wrap) return;
  const q = (filter || '').toLowerCase();
  const list = db.collaborateurs
    .filter(c => {
      const functions = collabFunctionLabel(c);
      const teams = (c.teamIds||[]).map(tid => teamById(tid)?.name || '').join(' ');
      const haystack = `${getCollabDisplayName(c)} ${c.Email || ''} ${functions || ''} ${teams}`.toLowerCase();
      return !q || haystack.includes(q);
    })
    .sort((a,b) => collabAlphaKey(a).localeCompare(collabAlphaKey(b), 'fr', { sensitivity:'base' }));

  if (!list.length) {
    wrap.innerHTML = `<div class="empty" style="padding:24px 10px"><i class="ti ti-user-search"></i>Aucun utilisateur trouvé</div>`;
    return;
  }

  wrap.innerHTML = list.map(c => {
    const role = getUserRole(c.Email || '');
    const functions = collabFunctionLabel(c, true);
    const teams = (c.teamIds||[]).map(tid => teamById(tid)?.name || '').filter(Boolean).join(', ');
    const active = currentUser?.collabId && String(currentUser.collabId) === String(c.Id);
    return `<button type="button" class="impersonation-row${active ? ' active' : ''}" onclick="startImpersonation('${c.Id}')">
      <div class="av">${escapeHtml((c.prenom||'?')[0] + (c.Nom||'?')[0])}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:500;font-size:13px">${escapeHtml(getCollabDisplayName(c))}${active ? ' <span style="font-size:10px;color:#534AB7">(affichage actuel)</span>' : ''}</div>
        <div style="font-size:11px;color:#5F5E5A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(c.Email || 'Email non renseigné')}</div>
        <div style="font-size:11px;color:#aaa;margin-top:2px">${escapeHtml(functions && functions !== '—' ? functions : 'Fonction non renseignée')}${teams ? ' · ' + escapeHtml(teams) : ''}</div>
      </div>
      <span class="rb ${roleCssClass(role)}" style="flex-shrink:0">${escapeHtml(roleDisplayName(role))}</span>
    </button>`;
  }).join('');
}

function startImpersonation(collabId) {
  if (!isRealAdmin()) return;
  const c = db.collaborateurs.find(x => String(x.Id) === String(collabId));
  if (!c) return alert('Utilisateur introuvable.');
  if (!isImpersonating()) returnViewAfterImpersonation = currentView;
  currentUser = makeUserFromCollab(c, true);
  sessionStorage.setItem('evea_impersonated_collab_id', String(c.Id));
  closeModal();
  refreshAfterUserSwitch();
  flashMessage(`Mode voir comme : ${currentUser.name}`);
}

function stopImpersonation() {
  if (!realUser) return;
  const returnView = returnViewAfterImpersonation;
  currentUser = { ...realUser, impersonated: false };
  sessionStorage.removeItem('evea_impersonated_collab_id');
  closeModal();
  resetFiltersAfterUserSwitch();
  buildSidebar();
  showView(canAccessView(returnView) ? returnView : getDefaultViewForCurrentUser());
  flashMessage('Retour au compte administrateur');
}
function applyFilters() {
  if (currentView === 'matrix')  renderMatrix();
  else if (currentView === 'collabs') renderCollabs();
  else if (currentView === 'formations') renderFormations();
  else if (currentView === 'strategy') renderStrategy();
}

function renderMatrix() {
  const q = (document.getElementById('search-input') || {value:''}).value.toLowerCase();
  const rareMap = getRareSkills();
  const skills = SKILLS.filter(s => (!filterDomain || s.did === filterDomain) && (!filterStrategy || isSkillInStrategy(s.id, filterStrategy)) && (!q || s.name.toLowerCase().includes(q)));
  let collabs = getVisibleCollabs();
  if (filterTeam) collabs = collabs.filter(c => c.teamIds && c.teamIds.includes(filterTeam));
  if (matrixPosteFilter) collabs = collabs.filter(c => collabHasFunction(c, matrixPosteFilter));
  collabs = sortCollabsForMatrix(collabs);
  const grouped = {};
  skills.forEach(s => { if (!grouped[s.did]) grouped[s.did] = []; grouped[s.did].push(s); });

  let h = `${levelLegendHtml({ target:true, targetReached:true, rare:true })}
  <div class="filters">
    <select onchange="filterTeam=this.value;applyFilters()">
      <option value="">Toutes les équipes</option>
      ${db.equipes.map(t => `<option value="${t.id}"${filterTeam===t.id?' selected':''}>${escapeHtml(t.name)}</option>`).join('')}
    </select>
    <select onchange="filterDomain=this.value;applyFilters()">
      <option value="">Tous les domaines</option>
      ${getSortedDomains().map(d => `<option value="${d.id}"${filterDomain===d.id?' selected':''}>${escapeHtml(d.name)}</option>`).join('')}
    </select>
    <select onchange="filterStrategy=this.value;applyFilters()">
      <option value="">Tous les axes stratégiques</option>
      ${strategyOptionsHtml(filterStrategy)}
    </select>
    <select onchange="matrixPosteFilter=this.value;applyFilters()">
      <option value="">Toutes les fonctions</option>
      ${POSTES.map(p => `<option value="${p.id}"${matrixPosteFilter===p.id?' selected':''}>${escapeHtml(p.name)}</option>`).join('')}
    </select>
    <select onchange="matrixSort=this.value;applyFilters()">
      <option value="alpha"${matrixSort==='alpha'?' selected':''}>Tri : ordre alphabétique</option>
      <option value="team"${matrixSort==='team'?' selected':''}>Tri : équipe</option>
    </select>
  </div>
  <div class="matrix-wrap"><table class="mx"><thead><tr>
    <th>Compétence</th>
    ${collabs.map(c => {
      const mastery = getCollabMastery(c);
      const functions = collabFunctionLabel(c, true);
      const title = `${c.prenom||''} ${c.Nom||''}${functions && functions !== '—' ? ' — '+functions : ''}${mastery != null ? ' — '+mastery+'% objectifs' : ''}`;
      return `<th title="${escapeHtml(title)}">${escapeHtml((c.prenom||'?')[0])}${escapeHtml((c.Nom||'?')[0])}<br><span style="font-size:10px;font-weight:400">${escapeHtml(c.prenom||'')}</span></th>`;
    }).join('')}
  </tr></thead><tbody>`;

  getSortedDomains().forEach(dom => {
    const list = grouped[dom.id];
    if (!list || !list.length) return;
    h += `<tr><td colspan="${collabs.length+1}" class="dr" style="background:${dom.bg};color:${dom.c}"><span class="matrix-domain-label">${escapeHtml(dom.name)}</span></td></tr>`;
    list.forEach(sk => {
      const isRare = !!rareMap[sk.id];
      h += `<tr><td><span class="twrap${isRare?' sk-rare':''}">${escapeHtml(sk.name)}${isRare?`<span class="rare-pill">rare</span>`:''}${strategyTagsHtml(sk.id)}${skillTT(sk)}</span></td>`;
      collabs.forEach(c => {
        const comps  = getCollabComps(c.Id);
        const lvl    = comps[sk.id] || 0;
        const tinfo  = targetInfoForCollabSkill(c, sk.id);
        const target = tinfo.target;
        h += `<td><div class="cell" onclick="openCollabModal('${c.Id}','${sk.id}')">`;
        if (lvl > 0) {
          const ring = target != null && Number(lvl) >= Number(target) ? targetRingClass(target) : '';
          h += `<span class="twrap"><span class="lb l${lvl}${ring}">${lvl}</span>${levelTT(sk,lvl,'tup',tinfo.posteId)}</span>`;
        } else if (target != null) {
          h += `<span class="lb" style="${missingTargetStyle(target)}">—</span>`;
        } else {
          h += `<span style="color:#e0ded8;font-size:18px">·</span>`;
        }
        h += `</div></td>`;
      });
      h += `</tr>`;
    });
  });
  h += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = h;
}

function renderStrategy() {
  const q = (document.getElementById('search-input') || {value:''}).value.toLowerCase().trim();
  const teamOptions = getStrategyTeamOptions();
  if (strategyTeamFilter && !teamOptions.some(t => String(t.id) === String(strategyTeamFilter))) strategyTeamFilter = '';
  let list = db.axesStrategiques.slice();
  if (!canManageStrategy() || strategyStatusFilter === 'active') list = list.filter(a => a.actif !== false);
  else if (strategyStatusFilter === 'inactive') list = list.filter(a => a.actif === false);
  if (q) {
    list = list.filter(a => [a.title, a.description].some(v => String(v||'').toLowerCase().includes(q)) ||
      (a.skills || []).some(link => (skillById(link.skillId)?.name || '').toLowerCase().includes(q)));
  }
  list.sort((a,b) => nameCompareFr(a.title, b.title));
  const scopeIds = getStrategyScopeTeamIds();
  const scopeCollabs = getStrategyScopeCollabs(scopeIds);
  let h = `${sharepointStrategyWarningHtml()}
  <div class="filters">
    <select onchange="strategyTeamFilter=this.value;renderStrategy()">
      <option value="">${hasDroit('toutes_consultation') ? 'Toutes les équipes accessibles' : 'Mes équipes'}</option>
      ${teamOptions.map(t => `<option value="${t.id}"${String(strategyTeamFilter)===String(t.id)?' selected':''}>${escapeHtml(t.name)}</option>`).join('')}
    </select>
    ${canManageStrategy() ? `<select onchange="strategyStatusFilter=this.value;renderStrategy()">
      <option value="active"${strategyStatusFilter==='active'?' selected':''}>Axes actifs</option>
      <option value="all"${strategyStatusFilter==='all'?' selected':''}>Tous les axes</option>
      <option value="inactive"${strategyStatusFilter==='inactive'?' selected':''}>Axes inactifs</option>
    </select>` : ''}
    <span class="stat-pill">${escapeHtml(strategyScopeLabel(scopeIds))}</span>
    <span class="stat-pill">${scopeCollabs.length} personne(s)</span>
  </div>
  <div class="legend">
    <span class="legend-item"><span class="strategy-tag"><i class="ti ti-target-arrow"></i><span>Axe stratégique</span></span></span>
    <span class="legend-item" style="font-size:11px;color:#aaa">Progression calculée sur les personnes dont le niveau est égal ou supérieur au niveau visé.</span>
  </div>`;
  if (!list.length) {
    h += `<div class="empty"><i class="ti ti-target-arrow"></i>Aucun axe stratégique trouvé.</div>`;
  } else {
    h += `<div class="strategy-grid">`;
    list.forEach(axis => {
      const progress = getStrategyAxisProgress(axis, scopeIds);
      const levelDist = strategyAxisLevelDistribution(axis, scopeCollabs);
      const totalLinks = (axis.skills || []).length;
      const skillPreview = (axis.skills || []).slice(0, 3).map(link => {
        const sk = skillById(link.skillId);
        return `<button class="formation-skill" style="cursor:pointer;font-family:inherit" onclick="openStrategySkillFormations('${link.skillId}',${Number(link.niveau)||0},'${axis.id}')" title="Voir les formations liées"><span>${escapeHtml(sk ? sk.name : link.skillId)}</span><span class="ldot l${link.niveau}" style="width:16px;height:16px;font-size:9px">${link.niveau}</span></button>`;
      }).join('');
      const more = totalLinks > 3 ? `<span class="formation-chip">+${totalLinks - 3}</span>` : '';
      h += `<div class="strategy-card${axis.actif === false ? ' inactive' : ''}">
        <div class="strategy-title">
          <span style="display:flex;gap:8px;align-items:flex-start"><span class="strategy-dot" style="background:${escapeHtml(axis.couleur || '#534AB7')}"></span>${escapeHtml(axis.title || 'Sans titre')}</span>
          ${axis.actif === false ? `<span class="formation-chip warn">Inactif</span>` : ''}
        </div>
        ${axis.description ? `<div class="strategy-desc">${escapeHtml(truncateText(axis.description, 180))}</div>` : ''}
        <div class="strategy-kpis">
          <div class="strategy-kpi"><b>${totalLinks}</b><span>compétence(s)</span></div>
          <div class="strategy-kpi"><b>${progress.target || '—'}</b><span>objectif</span></div>
          <div class="strategy-kpi"><button class="strategy-hit" onclick="showStrategyAchievers('${axis.id}')"><b>${progress.actual}</b></button><span>atteints</span></div>
        </div>
        ${progress.pct != null ? `<div><div class="strategy-progress"><div class="strategy-progress-fill" style="width:${progress.pct}%;background:${escapeHtml(axis.couleur || '#534AB7')}"></div></div><div style="font-size:11px;color:#5F5E5A;margin-top:3px">${progress.pct}% de progression</div></div>` : `<div class="lock-note">Aucun objectif chiffré sur le périmètre sélectionné.</div>`}
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11px;color:#5F5E5A">
          <span>Niveaux sur compétences liées</span>
          ${[1,2,3,4].map(n => `<span class="lb l${n}" style="width:20px;height:20px;font-size:10px" title="Niveau ${n}">${levelDist[n]}</span>`).join('')}
        </div>
        <div class="strategy-skill-list">${skillPreview}${more}</div>
        <div class="strategy-actions">
          <button class="btn btn-sm" onclick="openStrategyDetail('${axis.id}')"><i class="ti ti-eye"></i>Détails</button>
          ${canManageStrategy() ? `<button class="btn btn-sm" onclick="openStrategyModal('${axis.id}')"><i class="ti ti-edit"></i>Modifier</button>` : ''}
        </div>
      </div>`;
    });
    h += `</div>`;
  }
  document.getElementById('content').innerHTML = h;
}

function openStrategyDetail(id) {

  const scopeIds = getStrategyScopeTeamIds();
  const scopeCollabs = getStrategyScopeCollabs(scopeIds);
  const progress = getStrategyAxisProgress(axis, scopeIds);
  document.getElementById('m-av').innerHTML = '<i class="ti ti-target-arrow" style="font-size:20px"></i>';
  document.getElementById('m-title').textContent = axis.title || 'Axe stratégique';
  document.getElementById('m-sub').textContent = `${strategyScopeLabel(scopeIds)} · ${scopeCollabs.length} personne(s)`;
  let body = `${axis.description ? `<div class="projection-note" style="white-space:pre-line"><i class="ti ti-info-circle"></i> ${escapeHtml(axis.description)}</div>` : ''}

      <div class="strategy-kpi"><b>${progress.target || '—'}</b><span>objectif</span></div>
      <div class="strategy-kpi"><b>${progress.actual}</b><span>atteints</span></div>
      <div class="strategy-kpi"><b>${progress.pct != null ? progress.pct + '%' : '—'}</b><span>progression</span></div>
    </div>`;
  if (progress.pct != null) body += `<div class="strategy-progress" style="margin-bottom:14px"><div class="strategy-progress-fill" style="width:${progress.pct}%;background:${escapeHtml(axis.couleur || '#534AB7')}"></div></div>`;

      <th>Compétence</th><th>Niveau visé</th><th>Atteints</th><th>Objectif</th><th>Progression</th><th>Niveaux actuels</th>
    </tr></thead><tbody>`;
    (axis.skills || []).forEach(link => {

      body += `<tr>
        <td><button class="strategy-skill-link" onclick="openStrategySkillFormations('${link.skillId}',${Number(link.niveau)||0},'${axis.id}')"><b>${escapeHtml(sk ? sk.name : link.skillId)}</b></button>${sk ? `<div style="font-size:11px;color:#aaa">${escapeHtml(getSortedDomains().find(d => d.id === sk.did)?.name || '')}</div>` : ''}</td>
        <td><span class="lb l${link.niveau}" style="width:22px;height:22px;font-size:11px">${link.niveau}</span></td>
        <td><button class="strategy-hit" onclick="showStrategyAchievers('${axis.id}','${link.skillId}',${Number(link.niveau)||0})">${lp.actual}</button></td>
        <td>${lp.target || '<span style="color:#aaa">—</span>'}</td>
        <td>${lp.pct != null ? `<div class="strategy-progress" style="min-width:80px"><div class="strategy-progress-fill" style="width:${lp.pct}%;background:${escapeHtml(axis.couleur || '#534AB7')}"></div></div><div style="font-size:11px;color:#5F5E5A;margin-top:2px">${lp.pct}%</div>` : '<span style="color:#aaa">—</span>'}</td>
        <td><div style="display:flex;gap:4px;flex-wrap:wrap">${[1,2,3,4].map(n => `<span class="lb l${n}" style="width:20px;height:20px;font-size:10px" title="Niveau ${n}">${dist[n]}</span>`).join('')}</div></td>
      </tr>`;
    });
    body += `</tbody></table></div>`;
  }
  const teamOptions = getStrategyTeamOptions();
  if (teamOptions.length) {
    body += `<div class="csect"><div class="csect-lbl"><i class="ti ti-layout-grid"></i>Objectifs par équipe</div>`;
    teamOptions.forEach(t => {
      const p = getStrategyAxisProgress(axis, [String(t.id)]);
      const people = getStrategyScopeCollabs([String(t.id)]).length;
      body += `<div style="display:grid;grid-template-columns:1fr 70px 70px 90px;gap:8px;align-items:center;padding:7px 0;border-bottom:.5px solid #f0efe8;font-size:12px">
        <div><b>${escapeHtml(t.name)}</b><div style="font-size:11px;color:#aaa">${people} personne(s)</div></div>
        <div><button class="strategy-hit" onclick="showStrategyAchievers('${axis.id}','',0,'${String(t.id)}')">${p.actual}</button> atteints</div><div>${p.target || '—'} obj.</div>
        <div>${p.pct != null ? `<div class="strategy-progress"><div class="strategy-progress-fill" style="width:${p.pct}%;background:${escapeHtml(axis.couleur || '#534AB7')}"></div></div><div style="font-size:10px;color:#5F5E5A;margin-top:2px">${p.pct}%</div>` : '<span style="color:#aaa">—</span>'}</div>
      </div>`;
    });
    body += `</div>`;
  }
  document.getElementById('m-body').innerHTML = body;

    ${canManageStrategy() ? `<button class="btn" style="margin-right:auto" onclick="openStrategyModal('${axis.id}')"><i class="ti ti-edit"></i>Modifier</button>` : ''}
    <button class="btn" onclick="closeModal()">Fermer</button>`;
  document.getElementById('modal').style.display = 'flex';
}

function strategyLevelHelpHtml(skillId, selectedLevel = 1) {

  return `<div class="strategy-level-help">${[1,2,3,4].map(n => `<div class="strategy-level-item${Number(selectedLevel)===n?' sel':''}"><span class="lb l${n}" style="width:18px;height:18px;font-size:10px;flex-shrink:0">${n}</span><span>${escapeHtml(getLevelDesc(sk, n) || '—')}</span></div>`).join('')}</div>`;
}
function strategyAchieverRows(axis, skillId = '', niveau = 0, teamIds = getStrategyScopeTeamIds()) {
  if (!axis) return [];
  const links = (axis.skills || []).filter(link => {
    if (skillId && String(link.skillId) !== String(skillId)) return false;
    if (niveau && Number(link.niveau) !== Number(niveau)) return false;
    return true;
  });
  const collabs = getStrategyScopeCollabs(teamIds);
  const rows = [];
  links.forEach(link => {
    const sk = skillById(link.skillId);
    collabs.forEach(c => {
      const lvl = getCollabComps(c.Id)[link.skillId] || 0;
      if (lvl >= Number(link.niveau || 0)) rows.push({ c, lvl, link, sk });
    });
  });
  return rows.sort((a,b) => nameCompareFr(a.sk?.name || a.link.skillId, b.sk?.name || b.link.skillId) || collabAlphaKey(a.c).localeCompare(collabAlphaKey(b.c), 'fr', { sensitivity:'base' }));
}

  let body = rows.length ? '' : `<div class="empty"><i class="ti ti-users"></i>Personne n'a encore atteint cet objectif dans le périmètre sélectionné.</div>`;
  const grouped = {};
  rows.forEach(r => {

async function saveStrategyAxis(id) {
  if (!canManageStrategy()) { alert('Accès réservé aux administrateurs et directeurs autorisés.'); return; }
  const title = document.getElementById('s-title').value.trim();
  if (!title) return alert('Nom de l’axe requis.');
  const links = buildStrategyPayloadLinks();
  const objectifs = {};
  const objectifsEquipes = {};
  links.forEach(link => {
    const k = strategyKey(link.skillId, link.niveau);
    if (link.objectif > 0) objectifs[k] = link.objectif;
    const teams = normalizeTeamTargetObject(link.equipes || {});
    if (Object.keys(teams).length) objectifsEquipes[k] = teams;
  });
  showSave('Enregistrement de l’axe stratégique...');
  try {
    const data = {
      Title: title,
      Description: document.getElementById('s-description').value.trim(),
      Couleur: document.getElementById('s-color').value || '#534AB7',
      CompetencesNiveaux: JSON.stringify(links.map(l => ({ skillId:l.skillId, niveau:l.niveau }))),
      Objectifs: JSON.stringify(objectifs),
      ObjectifsEquipes: JSON.stringify(objectifsEquipes),
      Actif: document.getElementById('s-actif').value === '1'
    };
    if (id) await spPatch(CONFIG.lists.axesStrategiques, id, data);
    else await spPost(CONFIG.lists.axesStrategiques, data);
    await loadData();
    hideSave('Axe stratégique enregistré ✓');
    closeModal();
    if (currentView === 'strategy') renderStrategy();
    else applyFilters();
  } catch(e) {
    hideSave('Erreur !');
    alert('Erreur lors de l’enregistrement de l’axe stratégique : ' + e.message);
  }
}
async function deleteStrategyAxis(id) {
  if (!canManageStrategy()) { alert('Accès réservé aux administrateurs et directeurs autorisés.'); return; }
  if (!confirm('Supprimer cet axe stratégique ?')) return;
  showSave('Suppression de l’axe stratégique...');
  try {
    await spDelete(CONFIG.lists.axesStrategiques, id);
    await loadData();
    hideSave('Axe stratégique supprimé ✓');
    closeModal();
    if (currentView === 'strategy') renderStrategy();
  } catch(e) {
    hideSave('Erreur !');
    alert('Erreur lors de la suppression : ' + e.message);
  }
}

function renderFormationSkillLinksEditor() {
  const wrap = document.getElementById('f-skill-links');
  if (!wrap) return;
  if (!formationEdit.skills.length) {
    wrap.innerHTML = `<div style="font-size:12px;color:#aaa;padding:4px">Aucune compétence liée.</div>`;
    return;
  }
  wrap.innerHTML = formationEdit.skills.map((link, i) => `
    <div class="form-link-row" style="align-items:flex-start;flex-wrap:wrap">
      <select onchange="formationEdit.skills[${i}].skillId=this.value;renderFormationSkillLinksEditor()">${skillOptionsHtml(link.skillId)}</select>
      <select onchange="formationEdit.skills[${i}].niveau=parseInt(this.value,10)||0;renderFormationSkillLinksEditor()">
        <option value="0"${!link.niveau?' selected':''}>Niveau non précisé</option>
        ${[1,2,3,4].map(n => `<option value="${n}"${Number(link.niveau)===n?' selected':''}>Niveau ${n}</option>`).join('')}
      </select>
      <button class="btn btn-sm btn-danger" onclick="removeFormationSkillLink(${i})"><i class="ti ti-trash"></i></button>
      ${strategyLevelHelpHtml(link.skillId, link.niveau || 0)}
    </div>`).join('');
}
function addFormationSkillLink() {
  formationEdit.skills.push({ skillId: SKILLS[0]?.id || '', niveau: 1 });
  renderFormationSkillLinksEditor();
}
function removeFormationSkillLink(i) {
  formationEdit.skills.splice(i, 1);
  renderFormationSkillLinksEditor();
}

async function saveFormation(id) {
  if (!canManageFormations()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  const title = document.getElementById('f-title').value.trim();
  if (!title) return alert('Intitulé requis.');
  const links = normalizeFormationSkillLinks(formationEdit.skills);
  showSave('Enregistrement formation...');
  try {
    const data = {
      Title: title,
      Prestataire: document.getElementById('f-prestataire').value.trim(),
      TypeFormation: document.getElementById('f-type').value,
      Format: document.getElementById('f-format').value.trim(),
      Duree: document.getElementById('f-duree').value.trim(),
      Tarif: document.getElementById('f-tarif').value.trim(),
      LienInscription: document.getElementById('f-lien').value.trim(),
      CompetencesNiveaux: JSON.stringify(links),
      Objectifs: document.getElementById('f-objectifs').value.trim(),
      Programme: getRichTextValue('f-programme'),
      Actif: !!document.getElementById('f-actif').checked
    };
    if (id) await spPatch(CONFIG.lists.formations, id, data);
    else await spPost(CONFIG.lists.formations, data);
    await loadData();
    hideSave('Formation enregistrée ✓');
    closeModal();
    if (currentView === 'formations') renderFormations();
  } catch(e) {
    hideSave('Erreur !');
    alert('Erreur lors de l’enregistrement de la formation : ' + e.message);
  }
}

async function deleteFormation(id) {
  if (!canManageFormations()) { alert('Accès réservé aux rôles disposant du droit requis.'); return; }
  if (!confirm('Supprimer cette fiche formation ?')) return;
  showSave('Suppression formation...');
  try {
    await spDelete(CONFIG.lists.formations, id);
    await loadData();
    hideSave('Formation supprimée ✓');
    closeModal();
    if (currentView === 'formations') renderFormations();
  } catch(e) {
    hideSave('Erreur !');
    alert('Erreur lors de la suppression : ' + e.message);
  }
}

function renderCollabs() {
  const q = (document.getElementById('search-input') || {value:''}).value.toLowerCase();
  let list = getVisibleCollabs().filter(c => {
    const fn = ((c.prenom||'') + ' ' + (c.Nom||'')).toLowerCase();
    const functions = collabFunctionLabel(c).toLowerCase();
    return (!filterTeam || c.teamIds && c.teamIds.includes(filterTeam))
        && (!filterPoste || collabHasFunction(c, filterPoste))
        && (!q || fn.includes(q) || functions.includes(q));
  });
  list = sortCollabsForCards(list);
  let h = `<div class="filters">
    <select onchange="filterTeam=this.value;applyFilters()">
      <option value="">Toutes les équipes</option>
      ${db.equipes.map(t => `<option value="${t.id}"${filterTeam===t.id?' selected':''}>${escapeHtml(t.name)}</option>`).join('')}
    </select>
    <select onchange="filterPoste=this.value;applyFilters()">
      <option value="">Toutes les fonctions</option>
      ${POSTES.map(p => `<option value="${p.id}"${filterPoste===p.id?' selected':''}>${escapeHtml(p.name)}</option>`).join('')}
    </select>
    <select onchange="collabSort=this.value;applyFilters()">
      <option value="alpha"${collabSort==='alpha'?' selected':''}>Tri : ordre alphabétique</option>
      <option value="team"${collabSort==='team'?' selected':''}>Tri : équipe</option>
      <option value="mastery"${collabSort==='mastery'?' selected':''}>Tri : maîtrise de la fonction</option>
    </select>
  </div><div class="collab-grid">`;
  list.forEach(c => {
    const funcs = collabFunctionLabel(c, true);
    const comps = getCollabComps(c.Id);
    const pct = getCollabMastery(c);
    const teams = (c.teamIds||[]).map(tid => { const t = teamById(tid); return t ? `<span class="team-tag">${escapeHtml(t.name)}</span>` : ''; }).join('');
    h += `<div class="collab-card" onclick="openCollabModal('${c.Id}')">
      <div class="av">${escapeHtml((c.prenom||'?')[0])}${escapeHtml((c.Nom||'?')[0])}</div>
      <div class="cname">${escapeHtml(c.prenom||'')} ${escapeHtml(c.Nom||'')}</div>
      <div class="cposte">${escapeHtml(funcs)}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px">${teams}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <span class="stat-pill">${Object.keys(comps).length} compétences</span>
        ${pct != null ? `<span class="stat-pill">${pct}% objectifs</span>` : ''}
      </div>
      ${pct != null ? `<div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>` : ''}
    </div>`;
  });
  if (!list.length) h += `<div class="empty" style="grid-column:1/-1"><i class="ti ti-users"></i>Aucun collaborateur trouvé</div>`;
  h += `</div>`;
  document.getElementById('content').innerHTML = h;
}
